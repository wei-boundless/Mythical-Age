<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 投篮大挑战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', 'PingFang SC', sans-serif;
    user-select: none;
    overflow: hidden;
  }
  .game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .scoreboard {
    display: flex;
    align-items: center;
    gap: 24px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 12px 28px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .score-item {
    text-align: center;
    color: #e0e0e0;
  }
  .score-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.7;
  }
  .score-value {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .streak-value {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #f857a6, #ff5858);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .shots-value {
    font-size: 32px;
    font-weight: 800;
    color: #ccc;
  }
  .divider {
    width: 1px;
    height: 40px;
    background: rgba(255,255,255,0.2);
  }
  canvas {
    border-radius: 24px;
    cursor: crosshair;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.08);
  }
  .hint {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    letter-spacing: 1px;
  }
  .power-indicator {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    pointer-events: none;
  }
  .power-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.05s linear;
    width: 0%;
  }
  .game-over-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    border-radius: 24px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .game-over-overlay.active {
    opacity: 1;
    pointer-events: all;
  }
  .game-over-title {
    font-size: 48px;
    font-weight: 900;
    color: #ffd200;
    margin-bottom: 8px;
  }
  .game-over-score {
    font-size: 28px;
    color: #fff;
    margin-bottom: 24px;
  }
  .game-over-grade {
    font-size: 20px;
    color: #ccc;
    margin-bottom: 24px;
    padding: 8px 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
  }
  .btn {
    padding: 14px 40px;
    font-size: 18px;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover {
    transform: scale(1.04);
  }
  .btn:active {
    transform: scale(0.96);
  }
  .btn-primary {
    background: linear-gradient(135deg, #f7971e, #ff5858);
    color: #fff;
    box-shadow: 0 8px 24px rgba(247, 151, 30, 0.4);
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="scoreboard">
    <div class="score-item">
      <div class="score-label">得分</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div class="divider"></div>
    <div class="score-item">
      <div class="score-label">连中</div>
      <div class="streak-value" id="streakDisplay">0 🔥</div>
    </div>
    <div class="divider"></div>
    <div class="score-item">
      <div class="score-label">剩余</div>
      <div class="shots-value" id="shotsDisplay">10</div>
    </div>
  </div>

  <canvas id="gameCanvas" width="500" height="600"></canvas>

  <div class="power-indicator" id="powerBar">
    <div class="power-fill" id="powerFill"></div>
  </div>

  <p class="hint">🖱️ 移动鼠标瞄准 · 按住蓄力 · 松手投篮</p>

  <div class="game-over-overlay" id="gameOverOverlay">
    <div class="game-over-title" id="gameOverTitle">🏆</div>
    <div class="game-over-score" id="gameOverScore"></div>
    <div class="game-over-grade" id="gameOverGrade"></div>
    <button class="btn btn-primary" id="restartBtn">🔄 再来一局</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // --- DOM refs ---
  const scoreDisplay = document.getElementById('scoreDisplay');
  const streakDisplay = document.getElementById('streakDisplay');
  const shotsDisplay = document.getElementById('shotsDisplay');
  const powerFill = document.getElementById('powerFill');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const gameOverTitle = document.getElementById('gameOverTitle');
  const gameOverScore = document.getElementById('gameOverScore');
  const gameOverGrade = document.getElementById('gameOverGrade');
  const restartBtn = document.getElementById('restartBtn');

  // --- Game state ---
  const TOTAL_SHOTS = 10;
  let score = 0;
  let streak = 0;
  let bestStreak = 0;
  let shotsTaken = 0;
  let gameActive = true;

  // --- Ball state ---
  const BALL_RADIUS = 18;
  let ballX = W / 2;
  let ballY = H - 100;
  let ballVX = 0;
  let ballVY = 0;
  let ballFlying = false;
  const GRAVITY = 0.30;

  // --- Hoop ---
  const HOOP_X = W / 2;
  const HOOP_Y = 160;
  const RIM_RADIUS = 32;
  const RIM_THICKNESS = 4;

  // --- Power charge ---
  let mouseDown = false;
  let chargeStart = 0;
  let chargePower = 0;
  let mouseX = W / 2;       // 当前鼠标X（用于自由瞄准）
  let mouseY = H / 2;       // 当前鼠标Y（用于直接控制投篮角度）
  const MAX_POWER = 16;
  const CHARGE_SPEED = 18; // units per second

  // --- Particles ---
  let particles = [];

  // --- Audio (simple oscillator beeps) ---
  function playBeep(freq, duration, type) {
    try {
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ac.currentTime);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + duration);
      setTimeout(() => ac.close(), duration * 1000 + 100);
    } catch(e) { /* silent */ }
  }

  function sfxShoot() { playBeep(300, 0.15, 'triangle'); }
  function sfxScore() { playBeep(600, 0.1, 'square'); setTimeout(() => playBeep(900, 0.1, 'square'), 100); }
  function sfxMiss() { playBeep(120, 0.3, 'sawtooth'); }
  function sfxGameOver() { playBeep(200, 0.15, 'triangle'); setTimeout(() => playBeep(150, 0.2, 'triangle'), 200); }

  // --- Reset ---
  function resetGame() {
    score = 0;
    streak = 0;
    bestStreak = 0;
    shotsTaken = 0;
    gameActive = true;
    ballFlying = false;
    particles = [];
    ballX = W / 2;
    ballY = H - 100;
    ballVX = 0;
    ballVY = 0;
    chargePower = 0;
    powerFill.style.width = '0%';
    powerFill.style.background = 'linear-gradient(90deg, #4ecb71, #f7971e)';
    gameOverOverlay.classList.remove('active');
    updateUI();
  }

  function updateUI() {
    scoreDisplay.textContent = score;
    streakDisplay.textContent = streak + ' 🔥';
    shotsDisplay.textContent = TOTAL_SHOTS - shotsTaken;
  }

  function endGame() {
    gameActive = false;
    sfxGameOver();

    let grade, title;
    const pct = score / (TOTAL_SHOTS * 2);
    if (pct >= 0.9) { grade = 'S 级 · 神射手！🏆'; title = '🏆'; }
    else if (pct >= 0.7) { grade = 'A 级 · 精准射手 🎯'; title = '🎯'; }
    else if (pct >= 0.5) { grade = 'B 级 · 手感不错 👌'; title = '👌'; }
    else if (pct >= 0.3) { grade = 'C 级 · 还需练习 💪'; title = '💪'; }
    else { grade = 'D 级 · 篮筐加盖了？😅'; title = '😅'; }

    gameOverTitle.textContent = title;
    gameOverScore.textContent = '最终得分: ' + score + ' / ' + (TOTAL_SHOTS * 2);
    gameOverGrade.textContent = grade + '  |  最长连中: ' + bestStreak;
    gameOverOverlay.classList.add('active');
  }

  // --- Shoot: 使用二次方力量映射，让低力量区域更好控制 ---
  function getMappedPower(rawPower) {
    if (rawPower <= 0) return 0;
    const ratio = rawPower / MAX_POWER;
    // 二次方曲线：低力量区增长平缓，高力量区加速
    const mappedRatio = Math.pow(ratio, 0.65);
    return mappedRatio * MAX_POWER;
  }

  function shoot(angleDeg, rawPower) {
    if (!gameActive || ballFlying || shotsTaken >= TOTAL_SHOTS) return;

    const power = getMappedPower(rawPower);
    const angleRad = angleDeg * Math.PI / 180;
    ballVX = Math.cos(angleRad) * power;
    ballVY = Math.sin(angleRad) * power * (-1);
    ballFlying = true;
    shotsTaken++;
    sfxShoot();
    updateUI();
  }

  // --- Particles ---
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        life: 0.6 + Math.random() * 0.8,
        maxLife: 0.6 + Math.random() * 0.8,
        color,
        radius: 2 + Math.random() * 4
      });
    }
  }

  // --- Update ---
  function update(dt) {
    if (!ballFlying) return;

    const cappedDT = Math.min(dt, 0.05);

    ballVY += GRAVITY * cappedDT * 60;
    ballX += ballVX * cappedDT * 60;
    ballY += ballVY * cappedDT * 60;

    // ===== 得分检测（独立于碰撞，球从上方穿过篮筐平面即得分）=====
    if (ballVY > 0 && Math.abs(ballX - HOOP_X) < RIM_RADIUS * 0.75 &&
        ballY > HOOP_Y - 6 && ballY < HOOP_Y + 28) {
      score += 2;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      sfxScore();
      spawnParticles(HOOP_X, HOOP_Y + 10, '#ffd200', 30);
      spawnParticles(HOOP_X, HOOP_Y + 10, '#f7971e', 20);
      ballFlying = false;
      resetBall();
      updateUI();
      if (shotsTaken >= TOTAL_SHOTS) endGame();
      return;
    }

    // ===== Rim collision（纯物理反弹，不再拦截得分）=====
    const dx = ballX - HOOP_X;
    const dy = ballY - HOOP_Y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < RIM_RADIUS + BALL_RADIUS && dist > RIM_RADIUS - BALL_RADIUS - RIM_THICKNESS) {
      const nx = dx / dist;
      const ny = dy / dist;
      const dot = ballVX * nx + ballVY * ny;
      ballVX -= 2 * dot * nx;
      ballVY -= 2 * dot * ny;
      ballVX *= 0.6;
      ballVY *= 0.6;
      const overlap = (RIM_RADIUS + BALL_RADIUS) - dist;
      ballX += nx * (overlap + 2);
      ballY += ny * (overlap + 2);
      playBeep(180, 0.05, 'square');
    }

    // Out of bounds
    if (ballY > H + 50 || ballX < -50 || ballX > W + 50) {
      streak = 0;
      sfxMiss();
      ballFlying = false;
      resetBall();
      updateUI();
      if (shotsTaken >= TOTAL_SHOTS) endGame();
    }

    // Backboard bounce
    if (ballX > W - 30 && ballY < HOOP_Y + 80 && ballY > HOOP_Y - 80) {
      ballX = W - 30 - BALL_RADIUS;
      ballVX *= -0.5;
      ballVY *= 0.7;
    }
    if (ballX < 30 && ballY < HOOP_Y + 80 && ballY > HOOP_Y - 80) {
      ballX = 30 + BALL_RADIUS;
      ballVX *= -0.5;
      ballVY *= 0.7;
    }
  }

  function resetBall() {
    ballX = W / 2;
    ballY = H - 100;
    ballVX = 0;
    ballVY = 0;
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      p.vy += 0.1 * dt * 60;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // --- Render ---
  function drawCourt() {
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#0f0c29');
    skyGrad.addColorStop(0.5, '#302b63');
    skyGrad.addColorStop(1, '#24243e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    const starSeed = 42;
    for (let i = 0; i < 50; i++) {
      const sx = ((i * 137 + starSeed) % W);
      const sy = ((i * 89 + starSeed * 3) % (H * 0.7));
      const sr = 1 + (i % 2);
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Court floor
    const floorGrad = ctx.createLinearGradient(0, H - 80, 0, H);
    floorGrad.addColorStop(0, '#c2783a');
    floorGrad.addColorStop(0.3, '#d4944a');
    floorGrad.addColorStop(1, '#8b5a2b');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, H - 80, W, 80);

    // Floor line
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H - 80);
    ctx.lineTo(W, H - 80);
    ctx.stroke();

    // Three-point arc hint
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 12]);
    ctx.beginPath();
    ctx.arc(W / 2, H - 80, 160, Math.PI, 0);
    ctx.stroke();
    ctx.setLineDash([]);

    // Free throw line
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W / 2 - 50, H - 130);
    ctx.lineTo(W / 2 + 50, H - 130);
    ctx.stroke();
  }

  function drawBackboard() {
    // Pole
    ctx.fillStyle = '#555';
    ctx.fillRect(HOOP_X - 4, HOOP_Y - 30, 8, H - HOOP_Y + 30);

    // Backboard
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    const bx = HOOP_X - 45;
    const by = HOOP_Y - 60;
    const bw = 90;
    const bh = 70;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 6);
    ctx.fill();
    ctx.stroke();

    // Inner rectangle on backboard
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(HOOP_X - 22, HOOP_Y - 42, 44, 34, 3);
    ctx.stroke();
  }

  function drawRim() {
    // Net (simple lines)
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 0.5;
    const netDepth = 28;
    const netBottom = 14;
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const x1 = HOOP_X + Math.cos(angle) * RIM_RADIUS;
      const y1 = HOOP_Y + Math.sin(angle) * 2;
      const x2 = HOOP_X + Math.cos(angle) * (RIM_RADIUS - netBottom);
      const y2 = HOOP_Y + netDepth;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    // Cross lines
    for (let j = 0; j < 3; j++) {
      const yOff = 8 + j * 8;
      ctx.beginPath();
      ctx.ellipse(HOOP_X, HOOP_Y + yOff, RIM_RADIUS - j * 4, 2, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Rim
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = RIM_THICKNESS;
    ctx.beginPath();
    ctx.arc(HOOP_X, HOOP_Y, RIM_RADIUS, 0, Math.PI * 2);
    ctx.stroke();

    // Rim highlight
    ctx.strokeStyle = '#ff8888';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(HOOP_X, HOOP_Y, RIM_RADIUS, -0.3, Math.PI * 0.8);
    ctx.stroke();
  }

  function drawBall(x, y) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.arc(x + 3, y + 4, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Ball body
    const ballGrad = ctx.createRadialGradient(x - 4, y - 4, 2, x, y, BALL_RADIUS);
    ballGrad.addColorStop(0, '#f7971e');
    ballGrad.addColorStop(0.5, '#e67e00');
    ballGrad.addColorStop(1, '#b85c00');
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(x, y, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Ball lines
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - BALL_RADIUS, y);
    ctx.lineTo(x + BALL_RADIUS, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y - BALL_RADIUS);
    ctx.lineTo(x, y + BALL_RADIUS);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x, y, BALL_RADIUS * 0.7, -Math.PI * 0.7, Math.PI * 0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x, y, BALL_RADIUS * 0.7, Math.PI * 0.3, Math.PI * 1.7);
    ctx.stroke();
  }

  function drawAimLine() {
    if (ballFlying || !gameActive) return;

    const mx = ballX;
    const my = ballY;
    const angleDeg = getAimAngle();
    const angleRad = angleDeg * Math.PI / 180;
    const power = getMappedPower(chargePower);

    // Dotted trajectory preview
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    let px = mx, py = my;
    let vx = Math.cos(angleRad) * power;
    let vy = Math.sin(angleRad) * power * (-1);
    for (let i = 0; i < 30; i++) {
      vy += GRAVITY;
      px += vx;
      py += vy;
      if (py > H || px < 0 || px > W) break;
      if (i % 3 === 0) {
        ctx.beginPath();
        ctx.arc(px, py, 2 + (30 - i) / 15, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Aim arrow
    const arrowLen = 40 + power * 3;
    const ax = Math.cos(angleRad) * arrowLen;
    const ay = Math.sin(angleRad) * arrowLen * (-1);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(mx, my);
    ctx.lineTo(mx + ax, my + ay);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrowhead
    const tipX = mx + ax;
    const tipY = my + ay;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX - 8 * Math.cos(angleRad - 2.5), tipY - 8 * Math.sin(angleRad - 2.5) * (-1));
    ctx.lineTo(tipX - 8 * Math.cos(angleRad + 2.5), tipY - 8 * Math.sin(angleRad + 2.5) * (-1));
    ctx.closePath();
    ctx.fill();
  }

  function drawParticles() {
    for (const p of particles) {
      const alpha = p.life / p.maxLife;
      const r = parseInt(p.color.slice(1,3), 16);
      const g = parseInt(p.color.slice(3,5), 16);
      const b = parseInt(p.color.slice(5,7), 16);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function getAimAngle() {
    // 完全自由的瞄准：鼠标相对于球的位置直接决定投篮方向
    // 鼠标在球左边 → 往左投；鼠标在球右边 → 往右投
    // 鼠标在球上方 → 高抛弧线；鼠标在球下方 → 平投
    const dx = mouseX - ballX;
    const dy = ballY - mouseY;
    // dy 直接作为 Y 分量：鼠标越高 → dy 越大 → 角度越接近 90° → 球越往上飞
    // 注：shoot() 中对 sin 分量做了 *(-1) 以适配屏幕坐标系（Y轴向下）
    return Math.atan2(dy, dx) * 180 / Math.PI;
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawCourt();
    drawBackboard();
    drawRim();
    drawAimLine();
    drawParticles();
    drawBall(ballX, ballY);
  }

  // --- Input ---
  canvas.addEventListener('mousemove', (e) => {
    if (ballFlying) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    mouseX = (e.clientX - rect.left) * scaleX;
    mouseY = (e.clientY - rect.top) * scaleY;
    // 未蓄力时：球员位置跟随鼠标（模拟人移动站位 + 高度调节）
    if (!mouseDown) {
      ballX = Math.max(40, Math.min(W - 40, mouseX));
      ballY = Math.max(H - 180, Math.min(H - 50, mouseY));
    }
    // 蓄力时：球员位置锁定，鼠标自由移动来瞄准
  });

  canvas.addEventListener('mousedown', (e) => {
    if (!gameActive || ballFlying || shotsTaken >= TOTAL_SHOTS) return;
    e.preventDefault();
    mouseDown = true;
    chargeStart = performance.now();
    chargePower = 0;
  });

  canvas.addEventListener('mouseup', (e) => {
    if (!mouseDown) return;
    e.preventDefault();
    mouseDown = false;
    if (chargePower > 1) {
      shoot(getAimAngle(), chargePower);
    }
    chargePower = 0;
    powerFill.style.width = '0%';
    powerFill.style.background = 'linear-gradient(90deg, #4ecb71, #f7971e)';
  });

  canvas.addEventListener('mouseleave', () => {
    if (mouseDown) {
      mouseDown = false;
      if (chargePower > 1) {
        shoot(getAimAngle(), chargePower);
      }
      chargePower = 0;
      powerFill.style.width = '0%';
      powerFill.style.background = 'linear-gradient(90deg, #4ecb71, #f7971e)';
    }
  });

  // Touch support
  canvas.addEventListener('touchmove', (e) => {
    if (ballFlying) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    mouseX = (e.touches[0].clientX - rect.left) * scaleX;
    mouseY = (e.touches[0].clientY - rect.top) * scaleY;
    // 未蓄力时：球员位置跟随手指（模拟人移动站位 + 高度调节）
    if (!mouseDown) {
      ballX = Math.max(40, Math.min(W - 40, mouseX));
      ballY = Math.max(H - 180, Math.min(H - 50, mouseY));
    }
    // 蓄力时：球员位置锁定，手指自由移动来瞄准
  }, { passive: false });

  canvas.addEventListener('touchstart', (e) => {
    if (!gameActive || ballFlying || shotsTaken >= TOTAL_SHOTS) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    mouseX = (e.touches[0].clientX - rect.left) * scaleX;
    mouseY = (e.touches[0].clientY - rect.top) * scaleY;
    ballX = Math.max(40, Math.min(W - 40, mouseX));
    ballY = Math.max(H - 180, Math.min(H - 50, mouseY));
    mouseDown = true;
    chargeStart = performance.now();
    chargePower = 0;
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    if (!mouseDown) return;
    e.preventDefault();
    mouseDown = false;
    if (chargePower > 1) {
      shoot(getAimAngle(), chargePower);
    }
    chargePower = 0;
    powerFill.style.width = '0%';
    powerFill.style.background = 'linear-gradient(90deg, #4ecb71, #f7971e)';
  });

  restartBtn.addEventListener('click', () => resetGame());

  // --- Game loop ---
  let lastTime = performance.now();

  function gameLoop(time) {
    let dt = (time - lastTime) / 1000;
    if (dt <= 0) dt = 0.016;
    lastTime = time;

    // Charge power
    if (mouseDown && gameActive && !ballFlying && shotsTaken < TOTAL_SHOTS) {
      chargePower = Math.min(MAX_POWER, chargePower + CHARGE_SPEED * dt);
      const pct = (chargePower / MAX_POWER) * 100;
      powerFill.style.width = pct + '%';
      // 力量条三色渐变：绿→橙→红
      if (pct < 40) {
        powerFill.style.background = 'linear-gradient(90deg, #4ecb71, #7ecb4e)';
      } else if (pct < 75) {
        powerFill.style.background = 'linear-gradient(90deg, #f7971e, #f7b01e)';
      } else {
        powerFill.style.background = 'linear-gradient(90deg, #f7971e, #ff5858)';
      }
    }

    update(dt);
    updateParticles(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  requestAnimationFrame(gameLoop);
  updateUI();
})();
</script>
</body>
</html>
