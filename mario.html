<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mario Bros - World 1-1</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; width: 768px; height: 672px; }
@media (max-width: 768px) { canvas { width: 100vw; height: auto; } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ─── CANVAS ───
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 256;
canvas.height = 224;

// ─── CONSTANTS ───
const TILE = 16;
const GRAVITY = 0.6;
const FRICTION = 0.8;
const MAX_SPEED = 2.5;
const JUMP_FORCE = -6.5;
const MARIO_WIDTH = 16;
const MARIO_HEIGHT_SMALL = 16;
const MARIO_HEIGHT_BIG = 32;
const SCREEN_WIDTH = canvas.width;
const SCREEN_HEIGHT = canvas.height;
const LEVEL_LENGTH = 212; // tiles horizontally

// ─── LEVEL MAP (Super Mario Bros 1-1, 16x13 grid truncated to 14 rows, index y=13 is ground top) ───
// 0=empty, 1=ground (not used in map, ground auto-filled), 2=brick, 3=question, 4=empty (air), 5=pipe-top-left, 6=pipe-top-right,
// 7=pipe-body-left, 8=pipe-body-right, 9=flagpole, 10=flag, 11=hard-block

// Predefined map data (ground layer generated separately)
const MAP_COLS = LEVEL_LENGTH;
const MAP_ROWS = 13; // rows above ground
let map = Array.from({length: MAP_ROWS}, () => Array(MAP_COLS).fill(0));

// Helper to set blocks
function setBlock(col, row, type) {
  if (col >= 0 && col < MAP_COLS && row >= 0 && row < MAP_ROWS) map[row][col] = type;
}

// Ground tiles (auto from col 0 to LEVEL_LENGTH - 2, then gap from 69-71 is pit, 86-88 pit, 153-155 pit)
// Hard-coded ground is at y=13 (screen coordinate y=208)
const GROUND_Y = 13;

// Build map manually per SMB 1-1
// Row indices: 0 = top, 12 = just above ground

// Brick rows (row 9 = y=144) and ? blocks
// First section (question blocks)
setBlock(16, 9, 3);
setBlock(20, 9, 3);
setBlock(21, 9, 2);
setBlock(22, 9, 2);
setBlock(23, 9, 2);
setBlock(24, 9, 2);
setBlock(25, 9, 3);

// Second question
setBlock(77, 9, 3);
setBlock(78, 9, 2);
setBlock(79, 9, 2);

// high bricks at row 5
setBlock(94, 5, 2);
setBlock(95, 5, 2);
setBlock(100, 5, 2);
setBlock(101, 5, 2);

// more bricks
for (let i = 106; i <= 110; i++) setBlock(i, 5, 2);
setBlock(106, 9, 2);
setBlock(109, 9, 2);
setBlock(118, 5, 2);
setBlock(119, 5, 2);
setBlock(120, 5, 2);
setBlock(121, 5, 2);
setBlock(122, 9, 2);
setBlock(123, 9, 2);
setBlock(124, 5, 2);
setBlock(125, 5, 2);
setBlock(126, 5, 2);
setBlock(127, 5, 2);

// Question block with mushroom
setBlock(128, 9, 3);
setBlock(129, 9, 3);

// More bricks
setBlock(131, 9, 2);
setBlock(132, 9, 3);
setBlock(133, 9, 2);
setBlock(134, 9, 3);
setBlock(135, 9, 2);

// Staircase
setBlock(140, 12, 2);
setBlock(141, 11, 2); setBlock(141, 12, 2);
setBlock(142, 10, 2); setBlock(142, 11, 2); setBlock(142, 12, 2);
setBlock(143, 9, 2); setBlock(143, 10, 2); setBlock(143, 11, 2); setBlock(143, 12, 2);
setBlock(148, 12, 2);
setBlock(149, 11, 2); setBlock(149, 12, 2);
setBlock(150, 10, 2); setBlock(150, 11, 2); setBlock(150, 12, 2);
setBlock(151, 9, 2); setBlock(151, 10, 2); setBlock(151, 11, 2); setBlock(151, 12, 2);

// More ?
setBlock(154, 9, 3);
setBlock(155, 9, 3);
setBlock(156, 9, 2);

// high bricks
for (let i = 168; i <= 172; i++) setBlock(i, 5, 2);
setBlock(168, 9, 3);
setBlock(169, 9, 2);
setBlock(170, 9, 2);
setBlock(171, 9, 2);
setBlock(172, 9, 3);

// flagpole
setBlock(198, 12, 9); // flagpole base
// flag on top
setBlock(196, 9, 11); // top block

// Pipes
// First pipe (cols 28-29)
setBlock(28, 12, 5); setBlock(29, 12, 6);
setBlock(28, 11, 7); setBlock(29, 11, 8);
// Second pipe (cols 38-40)
setBlock(37, 12, 5); setBlock(38, 12, 6);
setBlock(37, 11, 7); setBlock(38, 11, 8);
setBlock(37, 10, 7); setBlock(38, 10, 8);
// Third pipe (cols 46-48)
setBlock(46, 12, 5); setBlock(47, 12, 6);
setBlock(46, 11, 7); setBlock(47, 11, 8);
setBlock(46, 10, 7); setBlock(47, 10, 8);
setBlock(46, 9, 7); setBlock(47, 9, 8);
// Fourth pipe (cols 57-59)
setBlock(57, 12, 5); setBlock(58, 12, 6);
setBlock(57, 11, 7); setBlock(58, 11, 8);
// Fifth pipe (cols 163-164)
setBlock(163, 12, 5); setBlock(164, 12, 6);
setBlock(163, 11, 7); setBlock(164, 11, 8);
setBlock(163, 10, 7); setBlock(164, 10, 8);
// Sixth pipe (cols 179-180)
setBlock(179, 12, 5); setBlock(180, 12, 6);
setBlock(179, 11, 7); setBlock(180, 11, 8);

// Ground holes (pit)
const PITS = [
  {start: 69, end: 71},
  {start: 86, end: 88},
  {start: 153, end: 155}
];

// Enemies list (x in tiles)
let enemySpawns = [
  {type: 'goomba', x: 22, y: 12},
  {type: 'goomba', x: 40, y: 12},
  {type: 'goomba', x: 51, y: 12},
  {type: 'goomba', x: 56, y: 12},
  {type: 'goomba', x: 65, y: 12},
  {type: 'koopa', x: 82, y: 12},
  {type: 'goomba', x: 97, y: 12},
  {type: 'goomba', x: 103, y: 12},
  {type: 'goomba', x: 114, y: 12},
  {type: 'goomba', x: 130, y: 12},
  {type: 'goomba', x: 140, y: 12},
  {type: 'goomba', x: 150, y: 12},
  {type: 'goomba', x: 174, y: 12},
  {type: 'koopa', x: 185, y: 12},
];

// ─── GAME STATE ───
let timeLeft = 400; // seconds
let coins = 0;
let score = 0;
let lives = 3;
let gameState = 'playing'; // playing, win, dead

// Mario
let mario = {
  x: 32, y: 176,
  vx: 0, vy: 0,
  width: MARIO_WIDTH,
  height: MARIO_HEIGHT_SMALL,
  onGround: false,
  big: false,
  invincible: 0,
  direction: 1, // 1:right, -1:left
  animFrame: 0,
};

// Enemies
let enemies = [];

// Items
let items = [];

// Camera
let cameraX = 0;

// ─── INPUT ───
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

// ─── INIT ───
function initEnemies() {
  enemies = enemySpawns.map(s => ({
    type: s.type,
    x: s.x * TILE,
    y: (s.y) * TILE,
    vx: -0.8,
    vy: 0,
    alive: true,
    width: 16,
    height: s.type === 'koopa' ? 24 : 16,
    onGround: false,
    direction: -1,
    animFrame: 0,
    shellMoving: false,
    timer: 0,
  }));
}
initEnemies();

// ─── COLLISION HELPER ───
function getTileAt(x, y) {
  const col = Math.floor(x / TILE);
  const row = Math.floor(y / TILE);
  if (col < 0 || col >= MAP_COLS || row < 0 || row > GROUND_Y) return 0;
  if (row === GROUND_Y) {
    // Check if pit
    for (let p of PITS) {
      if (col >= p.start && col <= p.end) return 0;
    }
    return 1; // ground
  }
  return (map[row] && map[row][col]) || 0;
}

function isSolid(tile) {
  return tile !== 0 && tile !== 9 && tile !== 10; // flagpole/flag not solid
}

function resolveCollision(rect, prevY) {
  // Check horizontal collisions
  const left = Math.floor(rect.x / TILE);
  const right = Math.floor((rect.x + rect.width - 1) / TILE);
  const top = Math.floor(rect.y / TILE);
  const bottom = Math.floor((rect.y + rect.height - 1) / TILE);
  
  for (let row = top; row <= bottom; row++) {
    for (let col = left; col <= right; col++) {
      const tile = getTileAt(col * TILE, row * TILE);
      if (isSolid(tile)) {
        const tileLeft = col * TILE;
        const tileRight = tileLeft + TILE;
        const tileTop = row * TILE;
        const tileBottom = tileTop + TILE;
        
        // Overlap
        const overlapLeft = rect.x + rect.width - tileLeft;
        const overlapRight = tileRight - rect.x;
        const overlapTop = rect.y + rect.height - tileTop;
        const overlapBottom = tileBottom - rect.y;
        
        // Determine direction
        if (overlapLeft < overlapRight && overlapLeft < overlapTop && overlapLeft < overlapBottom) {
          // Hit from right side of entity
          rect.x = tileLeft - rect.width;
          rect.vx = 0;
        } else if (overlapRight < overlapLeft && overlapRight < overlapTop && overlapRight < overlapBottom) {
          rect.x = tileRight;
          rect.vx = 0;
        } else if (overlapTop < overlapBottom && overlapTop < overlapLeft && overlapTop < overlapRight) {
          // Hit from below
          rect.y = tileTop - rect.height;
          rect.vy = 0;
          rect.onGround = true;
        } else if (overlapBottom < overlapTop && overlapBottom < overlapLeft && overlapBottom < overlapRight) {
          rect.y = tileBottom;
          rect.vy = 0;
        }
      }
    }
  }
}

// ─── UPDATE ───
let lastTime = performance.now();
function update(dt) {
  if (gameState !== 'playing') return;
  
  // Time limit
  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    gameState = 'dead';
  }
  
  // Mario input
  if (keys['ArrowRight'] || keys['KeyD']) {
    mario.vx += 0.4;
    mario.direction = 1;
  }
  if (keys['ArrowLeft'] || keys['KeyA']) {
    mario.vx -= 0.4;
    mario.direction = -1;
  }
  if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && mario.onGround) {
    mario.vy = JUMP_FORCE;
    mario.onGround = false;
  }
  
  // Friction
  mario.vx *= FRICTION;
  if (Math.abs(mario.vx) < 0.05) mario.vx = 0;
  if (Math.abs(mario.vx) > MAX_SPEED) mario.vx = Math.sign(mario.vx) * MAX_SPEED;
  
  // Gravity
  mario.vy += GRAVITY;
  
  // Update position
  const prevY = mario.y;
  mario.x += mario.vx;
  mario.y += mario.vy;
  mario.onGround = false;
  
  // Clamp left
  if (mario.x < 0) mario.x = 0;
  
  // Collision
  resolveCollision(mario, prevY);
  
  // Fall into pit
  if (mario.y > SCREEN_HEIGHT) {
    gameState = 'dead';
  }
  
  // Enemies
  for (let e of enemies) {
    if (!e.alive) continue;
    e.vy += GRAVITY;
    e.x += e.vx;
    e.y += e.vy;
    e.onGround = false;
    
    // Simple enemy collision with ground
    const col = Math.floor(e.x / TILE);
    const row = Math.floor((e.y + e.height) / TILE);
    if (getTileAt(col * TILE, row * TILE) === 0) {
      // No ground below, fall
    } else {
      // Snap to ground
      e.y = row * TILE - e.height;
      e.vy = 0;
      e.onGround = true;
    }
    
    // Edge detection: turn around at edges or walls
    if (e.vx !== 0) {
      const nextX = e.x + Math.sign(e.vx);
      const nextCol = Math.floor(nextX / TILE);
      const frontRow = Math.floor(e.y / TILE);
      const tileFront = getTileAt(nextCol * TILE, frontRow * TILE);
      if (isSolid(tileFront)) {
        e.vx *= -1;
        e.direction *= -1;
      }
      // Check for cliff
      const belowCol = Math.floor((nextX + e.width/2) / TILE);
      const belowRow = Math.floor((e.y + e.height + 2) / TILE);
      if (getTileAt(belowCol * TILE, belowRow * TILE) === 0) {
        // Reverse if on edge
        e.vx *= -1;
        e.direction *= -1;
      }
    }
    
    // Die if fallen off
    if (e.y > SCREEN_HEIGHT + 50) e.alive = false;
    
    e.timer++;
  }
  
  // Mario-enemy collision
  for (let e of enemies) {
    if (!e.alive) continue;
    if (mario.invincible > 0) continue;
    const overlap = mario.x < e.x + e.width && mario.x + mario.width > e.x &&
                    mario.y < e.y + e.height && mario.y + mario.height > e.y;
    if (!overlap) continue;
    
    // Check if Mario is falling onto enemy
    if (mario.vy > 0 && mario.y + mario.height - e.y < 10) {
      // Stomp enemy
      if (e.type === 'koopa' && !e.shellMoving) {
        e.shellMoving = true;
        e.vx = 0;
        e.height = 16;
        e.y += 8;
        e.type = 'koopa-shell';
      } else if (e.type === 'koopa-shell' && e.vx === 0) {
        e.vx = mario.vx >= 0 ? 4 : -4;
        e.shellMoving = true;
      } else {
        e.alive = false;
        score += 100;
      }
      mario.vy = -4; // bounce
    } else {
      // Mario hit
      if (mario.big) {
        mario.big = false;
        mario.height = MARIO_HEIGHT_SMALL;
        mario.y += 16; // shrink down
        mario.invincible = 60;
      } else {
        gameState = 'dead';
      }
    }
  }
  
  // Items (coins, mushrooms)
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.vy += GRAVITY;
    it.x += it.vx;
    it.y += it.vy;
    
    const overlap = mario.x < it.x + 16 && mario.x + mario.width > it.x &&
                    mario.y < it.y + 16 && mario.y + mario.height > it.y;
    if (overlap) {
      if (it.type === 'coin') {
        coins++;
        score += 200;
      } else if (it.type === 'mushroom') {
        if (!mario.big) {
          mario.big = true;
          // Adjust position: move up so feet stay same
          mario.y -= 16;
          mario.height = MARIO_HEIGHT_BIG;
        }
        score += 1000;
      }
      items.splice(i, 1);
      continue;
    }
    // Remove off-screen
    if (it.y > SCREEN_HEIGHT + 20) items.splice(i, 1);
  }
  
  // Break bricks (Mario big and hitting from below)
  if (mario.big && mario.vy < 0) {
    const checkCol = Math.floor((mario.x + mario.width/2) / TILE);
    const checkRow = Math.floor((mario.y - 2) / TILE);
    const tile = getTileAt(checkCol * TILE, checkRow * TILE);
    if (tile === 2) {
      map[checkRow][checkCol] = 0;
      items.push({type: 'coin', x: checkCol * TILE, y: checkRow * TILE, vx: 0, vy: -3});
    }
  }
  
  // Hit ? block
  if (mario.vy < 0) {
    const checkCol = Math.floor((mario.x + mario.width/2) / TILE);
    const checkRow = Math.floor((mario.y - 2) / TILE);
    const tile = getTileAt(checkCol * TILE, checkRow * TILE);
    if (tile === 3) {
      map[checkRow][checkCol] = 2; // turn to empty brick
      // Spawn item
      if (checkCol === 128 || checkCol === 168) {
        items.push({type: 'mushroom', x: checkCol * TILE, y: checkRow * TILE - 16, vx: 2, vy: -3});
      } else {
        items.push({type: 'coin', x: checkCol * TILE, y: checkRow * TILE - 16, vx: 0, vy: -4});
      }
    }
  }
  
  // Invincibility timer
  if (mario.invincible > 0) mario.invincible--;
  
  // Camera
  cameraX = mario.x - SCREEN_WIDTH / 3;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > (MAP_COLS * TILE) - SCREEN_WIDTH) cameraX = (MAP_COLS * TILE) - SCREEN_WIDTH;
  
  // Win condition (reaching flagpole)
  if (mario.x > 195 * TILE) {
    gameState = 'win';
    score += Math.floor(timeLeft) * 50;
  }
}

// ─── RENDER ───
function draw() {
  ctx.clearRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
  
  // Sky
  ctx.fillStyle = '#5c94fc';
  ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
  
  // Draw tiles
  for (let col = Math.floor(cameraX / TILE); col <= Math.floor((cameraX + SCREEN_WIDTH) / TILE); col++) {
    for (let row = 0; row <= GROUND_Y; row++) {
      const tile = getTileAt(col * TILE, row * TILE);
      if (tile === 0) continue;
      const screenX = col * TILE - cameraX;
      const screenY = row * TILE;
      drawTile(tile, screenX, screenY);
    }
  }
  
  // Draw items
  for (let it of items) {
    const sx = it.x - cameraX;
    if (it.type === 'coin') {
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(sx + 4, it.y + 4, 8, 8);
    } else if (it.type === 'mushroom') {
      ctx.fillStyle = '#e06060';
      ctx.fillRect(sx + 2, it.y, 12, 12);
      ctx.fillStyle = '#f0d0b0';
      ctx.fillRect(sx + 2, it.y + 12, 12, 4);
    }
  }
  
  // Draw enemies
  for (let e of enemies) {
    if (!e.alive) continue;
    const sx = e.x - cameraX;
    if (e.type === 'goomba') {
      ctx.fillStyle = '#a86020';
      ctx.fillRect(sx, e.y, 16, 16);
      ctx.fillStyle = '#000';
      ctx.fillRect(sx + 4, e.y + 4, 3, 3);
      ctx.fillRect(sx + 10, e.y + 4, 3, 3);
      ctx.fillRect(sx + 2, e.y + 8, 3, 2);
      ctx.fillRect(sx + 12, e.y + 8, 2, 2);
    } else if (e.type === 'koopa') {
      ctx.fillStyle = '#70b050';
      ctx.fillRect(sx, e.y, 16, 24);
      ctx.fillStyle = '#e0b040';
      ctx.fillRect(sx + 2, e.y + 4, 12, 8);
      ctx.fillStyle = '#000';
      ctx.fillRect(sx + 4, e.y + 6, 3, 3);
      ctx.fillRect(sx + 10, e.y + 6, 3, 3);
      // Feet
      ctx.fillStyle = '#e0b040';
      ctx.fillRect(sx + 2, e.y + 18, 5, 6);
      ctx.fillRect(sx + 9, e.y + 18, 5, 6);
    } else if (e.type === 'koopa-shell') {
      ctx.fillStyle = '#70b050';
      ctx.fillRect(sx, e.y, 16, 16);
      ctx.fillStyle = '#e0b040';
      ctx.fillRect(sx + 2, e.y + 2, 12, 4);
    }
  }
  
  // Draw Mario
  const mx = mario.x - cameraX;
  const my = mario.y;
  if (!mario.big) {
    ctx.fillStyle = '#e04040';
    ctx.fillRect(mx, my, 16, 16);
    ctx.fillStyle = '#f0a060';
    ctx.fillRect(mx + 2, my + 4, 12, 8);
    ctx.fillStyle = '#805030';
    ctx.fillRect(mx + 4, my + 12, 3, 4);
    ctx.fillRect(mx + 9, my + 12, 3, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(mx + 4, my + 6, 2, 2);
    ctx.fillRect(mx + 10, my + 6, 2, 2);
  } else {
    ctx.fillStyle = '#e04040';
    ctx.fillRect(mx, my, 16, 32);
    ctx.fillStyle = '#f0a060';
    ctx.fillRect(mx + 2, my + 4, 12, 12);
    ctx.fillStyle = '#805030';
    ctx.fillRect(mx + 4, my + 28, 4, 4);
    ctx.fillRect(mx + 9, my + 28, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(mx + 4, my + 8, 3, 3);
    ctx.fillRect(mx + 10, my + 8, 3, 3);
    // Mustache
    ctx.fillStyle = '#6b3a1f';
    ctx.fillRect(mx + 2, my + 16, 12, 2);
  }
  
  // UI
  ctx.fillStyle = '#000';
  ctx.font = '8px monospace';
  ctx.fillText(`MARIO`, 8, 14);
  ctx.fillText(String(score).padStart(6, '0'), 8, 24);
  
  ctx.fillText(`COINS`, 64, 14);
  ctx.fillText(`x${String(coins).padStart(2, '0')}`, 64, 24);
  
  ctx.fillText(`WORLD`, 136, 14);
  ctx.fillText(`1-1`, 136, 24);
  
  ctx.fillText(`TIME`, 200, 14);
  ctx.fillText(Math.ceil(Math.max(0, timeLeft)), 200, 24);
  
  // Game over / win
  if (gameState === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.fillText('GAME OVER', 80, 110);
  } else if (gameState === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.fillText('YOU WIN!', 90, 110);
  }
}

function drawTile(type, x, y) {
  switch (type) {
    case 1: // ground
      ctx.fillStyle = '#c84c0c';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#e87830';
      ctx.fillRect(x, y, TILE, 2);
      break;
    case 2: // brick
      ctx.fillStyle = '#c84c0c';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#e0a060';
      ctx.fillRect(x, y, TILE, 2);
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(x, y + 8, TILE, 2);
      break;
    case 3: // question
      ctx.fillStyle = '#e0a030';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#f0d060';
      ctx.fillRect(x + 2, y + 2, 12, 12);
      ctx.fillStyle = '#000';
      ctx.fillText('?', x + 4, y + 12);
      break;
    case 5: // pipe top left
      ctx.fillStyle = '#20a020';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#30f030';
      ctx.fillRect(x, y, TILE, 4);
      ctx.fillStyle = '#104010';
      ctx.fillRect(x, y, 4, TILE);
      break;
    case 6: // pipe top right
      ctx.fillStyle = '#20a020';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#30f030';
      ctx.fillRect(x, y, TILE, 4);
      break;
    case 7: // pipe body left
      ctx.fillStyle = '#20a020';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#104010';
      ctx.fillRect(x, y, 4, TILE);
      break;
    case 8: // pipe body right
      ctx.fillStyle = '#20a020';
      ctx.fillRect(x, y, TILE, TILE);
      break;
    case 9: // flagpole
      ctx.fillStyle = '#808080';
      ctx.fillRect(x + 6, y - TILE*3, 4, TILE*3);
      ctx.fillStyle = '#40e040';
      ctx.fillRect(x + 2, y - TILE*3, 12, 8); // flag
      break;
    case 11: // hard block
      ctx.fillStyle = '#808080';
      ctx.fillRect(x, y, TILE, TILE);
      break;
    default:
      // empty
      break;
  }
}

// ─── GAME LOOP ───
function gameLoop(now) {
  const dt = (now - lastTime) / 1000; // seconds
  lastTime = now;
  // Clamp dt to avoid huge jumps
  const clampedDt = Math.min(dt, 0.05);
  update(clampedDt);
  draw();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame((t) => {
  lastTime = t;
  gameLoop(t);
});
</script>
