<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2D 足球对战 - 红队 VS 蓝队</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #1a1a2e; 
    display: flex; 
    flex-direction: column;
    align-items: center; 
    justify-content: center; 
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow-y: auto;
  }
  canvas { 
    border: 2px solid #444; 
    border-radius: 8px;
    background: #2d5a27;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
  }
  #info {
    margin-top: 12px;
    color: #ddd;
    font-size: 16px;
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  #info span { margin: 0 8px; }
  .score { font-weight: bold; font-size: 20px; }
  #red-score { color: #e74c3c; }
  #blue-score { color: #3498db; }
  #timer { color: #f1c40f; font-weight: bold; }
  #controls {
    margin-top: 8px;
    color: #aaa;
    font-size: 14px;
  }
  #message {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 24px 40px;
    border-radius: 12px;
    font-size: 24px;
    font-weight: bold;
    z-index: 10;
    text-align: center;
    display: none;
  }
</style>
</head>
<body>
<canvas id="pitch"></canvas>
<div id="info">
  <span>🔴 红队 <span id="red-score" class="score">0</span></span>
  <span>⚽</span>
  <span>🔵 蓝队 <span id="blue-score" class="score">0</span></span>
  <span>⏱️ <span id="timer">03:00</span></span>
</div>
<div id="controls">
  方向键移动选中的红队球员 | 空格键切换球员 | 赛事 3 分钟
</div>
<div id="message"></div>

<script>
(function() {
  const canvas = document.getElementById('pitch');
  const ctx = canvas.getContext('2d');
  
  // 深绿色场地，尺寸 800x500
  const W = 800, H = 500;
  canvas.width = W;
  canvas.height = H;
  
  // 游戏状态
  let redScore = 0;
  let blueScore = 0;
  let gameTime = 3 * 60; // 3分钟 = 180秒
  let gameActive = true;
  let gameOver = false;
  
  // 时间计时器
  let lastTimestamp = 0;
  let frameCount = 0;
  
  // 物理参数
  const PLAYER_SPEED = 3.0;
  const AI_SPEED = 2.2;
  const BALL_FRICTION = 0.98;
  const KICK_POWER = 8.0;
  const PLAYER_RADIUS = 14;
  const BALL_RADIUS = 8;
  const GOAL_WIDTH = 100;
  const GOAL_DEPTH = 30;
  
  // 球门位置 (y坐标)
  const LEFT_GOAL_Y = H/2;
  const RIGHT_GOAL_Y = H/2;
  
  // 球员数组
  let redPlayers = [];
  let bluePlayers = [];
  let ball = null;
  
  // 玩家选中的红队球员索引 (0,1,2 为普通球员，3 为门将)
  let selectedPlayerIdx = 0;
  
  // 键盘状态
  const keys = {};
  
  // 初始化球员和球
  function initGame() {
    redPlayers = [];
    bluePlayers = [];
    
    // 红队球员（3 普通 + 1 门将）
    redPlayers.push({ x: 250, y: 180, team: 'red', role: 'field' });
    redPlayers.push({ x: 350, y: 320, team: 'red', role: 'field' });
    redPlayers.push({ x: 200, y: 400, team: 'red', role: 'field' });
    redPlayers.push({ x: 60, y: H/2, team: 'red', role: 'goalkeeper' }); // 门将
    
    // 蓝队球员（3 普通 + 1 门将）
    bluePlayers.push({ x: 550, y: 150, team: 'blue', role: 'field' });
    bluePlayers.push({ x: 480, y: 300, team: 'blue', role: 'field' });
    bluePlayers.push({ x: 620, y: 380, team: 'blue', role: 'field' });
    bluePlayers.push({ x: W - 60, y: H/2, team: 'blue', role: 'goalkeeper' });
    
    // 球初始位置在中圈
    ball = {
      x: W/2,
      y: H/2,
      vx: 0, vy: 0,
      radius: BALL_RADIUS
    };
    
    selectedPlayerIdx = 0;
  }
  
  // 重置比赛
  function resetMatch() {
    redScore = 0;
    blueScore = 0;
    gameTime = 180;
    gameActive = true;
    gameOver = false;
    document.getElementById('message').style.display = 'none';
    initGame();
  }
  
  // 进球处理
  function goalScored(team) {
    if (!gameActive) return;
    if (team === 'red') {
      redScore++;
    } else {
      blueScore++;
    }
    // 重新开球
    ball.x = W/2;
    ball.y = H/2;
    ball.vx = 0;
    ball.vy = 0;
    // 球员归位简版
    initGame();
    updateScoreDisplay();
  }
  
  function updateScoreDisplay() {
    document.getElementById('red-score').textContent = redScore;
    document.getElementById('blue-score').textContent = blueScore;
  }
  
  // 结束比赛
  function endGame() {
    gameActive = false;
    gameOver = true;
    let msg = '';
    if (redScore > blueScore) {
      msg = '🔴 红队获胜！';
    } else if (blueScore > redScore) {
      msg = '🔵 蓝队获胜！';
    } else {
      msg = '⚖️ 平局！';
    }
    document.getElementById('message').innerHTML = `${msg}<br><small>红队 ${redScore} - ${blueScore} 蓝队</small><br><small style="font-size:14px">按 R 键重新开始</small>`;
    document.getElementById('message').style.display = 'block';
  }
  
  // 碰撞检测
  function circlesCollide(c1, r1, c2, r2) {
    const dx = c1.x - c2.x;
    const dy = c1.y - c2.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    return dist < (r1 + r2);
  }
  
  // 推动解决碰撞
  function resolveCollision(a, ra, b, rb) {
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist === 0) {
      dx = (Math.random() - 0.5) * 0.1;
      dy = (Math.random() - 0.5) * 0.1;
      dist = Math.sqrt(dx*dx + dy*dy);
    }
    const overlap = (ra + rb) - dist;
    if (overlap > 0) {
      const nx = dx / dist;
      const ny = dy / dist;
      a.x -= nx * overlap * 0.5;
      a.y -= ny * overlap * 0.5;
      b.x += nx * overlap * 0.5;
      b.y += ny * overlap * 0.5;
    }
  }
  
  // 球与球员碰撞 (踢球)
  function playerKickBall(player, ball) {
    if (circlesCollide(player, PLAYER_RADIUS, ball, BALL_RADIUS)) {
      // 踢球冷却：防止多名球员同时抢球导致卡死
      if (player.lastKickFrame && frameCount - player.lastKickFrame < 12) return;
      player.lastKickFrame = frameCount;
      // 计算踢球方向：从球员指向球的方向（给球加速）
      let dx = ball.x - player.x;
      let dy = ball.y - player.y;
      let dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const nx = dx / dist;
      const ny = dy / dist;
      // 给球一个速度
      ball.vx = nx * KICK_POWER;
      ball.vy = ny * KICK_POWER;
      // 同时把球推出以避免卡住
      const overlap = PLAYER_RADIUS + BALL_RADIUS - dist;
      if (overlap > 0) {
        ball.x += nx * overlap;
        ball.y += ny * overlap;
      }
    }
  }
  
  // AI 蓝队行为 — 逼抢者/接应者/补位者 三角色分工
  function aiControl() {
    if (!gameActive) return;
    const fieldPlayers = bluePlayers.filter(p => p.role === 'field');
    const goalkeeper = bluePlayers.find(p => p.role === 'goalkeeper');
    
    if (fieldPlayers.length < 3) return;
    
    // 按离球距离排序，分配三角色
    const sorted = [...fieldPlayers].sort((a, b) => 
      Math.hypot(a.x - ball.x, a.y - ball.y) - Math.hypot(b.x - ball.x, b.y - ball.y)
    );
    const chaser = sorted[0];     // 逼抢者：离球最近
    const supporter = sorted[1];  // 接应者：离球第二近
    const cover = sorted[2];      // 补位者：离球最远
    
    // === 逼抢者：1.35 倍速度高速追球，靠近后向红方球门射门 ===
    if (chaser) {
      let dx = ball.x - chaser.x;
      let dy = ball.y - chaser.y;
      let dist = Math.hypot(dx, dy);
      if (dist > 1) {
        // 有其他球员也在抢球时稍微偏移角度，避免挤在一起
        const othersNear = fieldPlayers.filter(p => 
          p !== chaser && Math.hypot(p.x - ball.x, p.y - ball.y) < 55
        ).length;
        let ox = 0, oy = 0;
        if (othersNear > 0) {
          ox = Math.sin(frameCount * 0.25 + chaser.y * 0.1) * 14;
          oy = Math.cos(frameCount * 0.25 + chaser.x * 0.1) * 14;
        }
        const spd = othersNear > 1 ? 1.15 : 1.35;
        chaser.x += ((dx + ox) / (dist + 0.01)) * AI_SPEED * spd;
        chaser.y += ((dy + oy) / (dist + 0.01)) * AI_SPEED * spd;
      }
      if (dist < PLAYER_RADIUS + BALL_RADIUS + 6) {
        let goalDx = 0 - ball.x;
        let goalDy = LEFT_GOAL_Y + (Math.random() - 0.5) * 80 - ball.y;
        let goalDist = Math.hypot(goalDx, goalDy) || 1;
        ball.vx = (goalDx / goalDist) * KICK_POWER * 1.15;
        ball.vy = (goalDy / goalDist) * KICK_POWER * 1.15;
      }
    }
    
    // === 接应者：在球与红方球门之间找空档，正弦动态跑位，球到脚下也能射门 ===
    if (supporter) {
      let tx = ball.x * 0.35 + 30;
      let ty = ball.y + Math.sin(Date.now() / 900 + supporter.y * 0.08) * 70;
      tx = Math.max(80, Math.min(W * 0.55, tx));
      ty = Math.max(PLAYER_RADIUS + 10, Math.min(H - PLAYER_RADIUS - 10, ty));
      let dx = tx - supporter.x;
      let dy = ty - supporter.y;
      let dist = Math.hypot(dx, dy);
      if (dist > 1) {
        supporter.x += (dx / dist) * AI_SPEED * 0.92;
        supporter.y += (dy / dist) * AI_SPEED * 0.92;
      }
      let dBall = Math.hypot(supporter.x - ball.x, supporter.y - ball.y);
      if (dBall < PLAYER_RADIUS + BALL_RADIUS + 5) {
        let gx = 0 - ball.x;
        let gy = LEFT_GOAL_Y + (Math.random() - 0.5) * 100 - ball.y;
        let gd = Math.hypot(gx, gy) || 1;
        ball.vx = (gx / gd) * KICK_POWER;
        ball.vy = (gy / gd) * KICK_POWER;
      }
    }
    
    // === 补位者：本方半场横向游走，球入本方半场主动卡位，近身向中场解围 ===
    if (cover) {
      if (ball.x > W * 0.55) {
        // 球在本方半场，迎前卡位
        let tx = ball.x - 55;
        let ty = Math.max(60, Math.min(H - 60, ball.y + (cover.y > H / 2 ? -35 : 35)));
        let dx = tx - cover.x;
        let dy = ty - cover.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 1) {
          cover.x += (dx / dist) * AI_SPEED * 0.95;
          cover.y += (dy / dist) * AI_SPEED * 0.95;
        }
        let dBall = Math.hypot(cover.x - ball.x, cover.y - ball.y);
        if (dBall < PLAYER_RADIUS + BALL_RADIUS + 6) {
          let cx = W * 0.6;
          let cy = H / 2 + (Math.random() - 0.5) * 120;
          let cd = Math.hypot(cx - ball.x, cy - ball.y) || 1;
          ball.vx = (cx - ball.x) / cd * KICK_POWER * 0.9;
          ball.vy = (cy - ball.y) / cd * KICK_POWER * 0.9;
        }
      } else {
        // 球在对方半场，本方半场横向游走防守
        let tx = W * 0.72;
        let ty = H / 2 + Math.sin(Date.now() / 750 + cover.x * 0.04) * (H * 0.32);
        ty = Math.max(60, Math.min(H - 60, ty));
        let dx = tx - cover.x;
        let dy = ty - cover.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 1) {
          cover.x += (dx / dist) * AI_SPEED * 0.5;
          cover.y += (dy / dist) * AI_SPEED * 0.5;
        }
      }
    }
    
    // 门将 AI：在门线附近横向移动跟随球
    if (goalkeeper) {
      const baseX = W - 55;
      const targetY = Math.max(60, Math.min(H - 60, ball.y + (Math.random() - 0.5) * 20));
      let dy = targetY - goalkeeper.y;
      goalkeeper.y += Math.sign(dy) * Math.min(Math.abs(dy), AI_SPEED * 0.7);
      goalkeeper.x += (baseX - goalkeeper.x) * 0.1;
      goalkeeper.x = Math.max(W - 80, Math.min(W - 10, goalkeeper.x));
      goalkeeper.y = Math.max(H / 2 - 60, Math.min(H / 2 + 60, goalkeeper.y));
    }
  }

  // 红队未选中球员 AI — 未被玩家选中的红队场上球员自动跑位接应
  function redFieldAI() {
    if (!gameActive) return;
    
    redPlayers.forEach((player, idx) => {
      // 跳过玩家当前操控的球员和门将
      if (idx === selectedPlayerIdx || player.role === 'goalkeeper') return;
      
      const dxBall = ball.x - player.x;
      const dyBall = ball.y - player.y;
      const distBall = Math.hypot(dxBall, dyBall);
      
      if (distBall < 90 && distBall > 0.1) {
        // 球在附近：加速追球并朝蓝方球门推进
        player.x += (dxBall / distBall) * PLAYER_SPEED * 1.15;
        player.y += (dyBall / distBall) * PLAYER_SPEED * 1.15;
      } else {
        // 远离球时：按编号在不同区域站位，随球的位置动态偏移
        let baseX, baseY;
        switch (idx) {
          case 0:
            baseX = W * 0.38;
            baseY = H * 0.3;
            break;
          case 1:
            baseX = W * 0.32;
            baseY = H * 0.5;
            break;
          case 2:
          default:
            baseX = W * 0.38;
            baseY = H * 0.7;
            break;
        }
        let targetX = baseX + (ball.x - W / 2) * 0.25;
        let targetY = baseY + (ball.y - H / 2) * 0.25;
        // 正弦/余弦动态偏移让跑位不僵硬
        targetX += Math.sin(Date.now() / 1000 + idx * 2.3) * 35;
        targetY += Math.cos(Date.now() / 1300 + idx * 1.7) * 45;
        targetX = Math.max(60, Math.min(W * 0.75, targetX));
        targetY = Math.max(PLAYER_RADIUS + 10, Math.min(H - PLAYER_RADIUS - 10, targetY));
        
        let dx = targetX - player.x;
        let dy = targetY - player.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 1) {
          player.x += (dx / dist) * PLAYER_SPEED * 0.72;
          player.y += (dy / dist) * PLAYER_SPEED * 0.72;
        }
      }
    });
  }

  // 玩家控制红队
  function playerControl() {
    if (!gameActive) return;
    if (selectedPlayerIdx < 0 || selectedPlayerIdx >= redPlayers.length) return;
    const player = redPlayers[selectedPlayerIdx];
    
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
    if (keys['ArrowUp'] || keys['KeyW']) dy -= 1;
    if (keys['ArrowDown'] || keys['KeyS']) dy += 1;
    
    if (dx !== 0 || dy !== 0) {
      const len = Math.sqrt(dx*dx + dy*dy);
      player.x += (dx / len) * PLAYER_SPEED;
      player.y += (dy / len) * PLAYER_SPEED;
    }
    
    // 球员边界限制（场地内）
    player.x = Math.max(PLAYER_RADIUS, Math.min(W - PLAYER_RADIUS, player.x));
    player.y = Math.max(PLAYER_RADIUS, Math.min(H - PLAYER_RADIUS, player.y));
    
    // 红队门将简单跟随 (AI辅助)
    const redGK = redPlayers[3];
    if (redGK && selectedPlayerIdx !== 3) {
      // 门将自动守门
      const baseX = 55;
      redGK.x += (baseX - redGK.x) * 0.1;
      redGK.y += (Math.max(60, Math.min(H-60, ball.y)) - redGK.y) * 0.05;
      redGK.x = Math.max(10, Math.min(80, redGK.x));
    }
  }
  
  // 更新物理和逻辑
  function update() {
    if (!gameActive) return;
    
    // AI 控制
    aiControl();
    
    // 玩家控制
    playerControl();
    
    // 红队未选中球员 AI
    redFieldAI();
    
    // 所有球员边界限制（门将单独处理）
    const allPlayers = [...redPlayers, ...bluePlayers];
    allPlayers.forEach(p => {
      if (p.role !== 'goalkeeper') {
        p.x = Math.max(PLAYER_RADIUS, Math.min(W - PLAYER_RADIUS, p.x));
        p.y = Math.max(PLAYER_RADIUS, Math.min(H - PLAYER_RADIUS, p.y));
      }
    });
    
    // 球运动
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= BALL_FRICTION;
    ball.vy *= BALL_FRICTION;
    
    // 球边界处理 (上下界)
    if (ball.y - BALL_RADIUS < 0) {
      ball.y = BALL_RADIUS;
      ball.vy *= -0.5;
    }
    if (ball.y + BALL_RADIUS > H) {
      ball.y = H - BALL_RADIUS;
      ball.vy *= -0.5;
    }
    
    // 进球检测 (球越过左右球门线)
    // 左侧球门：x < 0, y 在球门范围内
    if (ball.x - BALL_RADIUS < 0 && ball.y > LEFT_GOAL_Y - GOAL_WIDTH/2 && ball.y < LEFT_GOAL_Y + GOAL_WIDTH/2) {
      goalScored('blue'); // 蓝队进球
      return;
    }
    // 右侧球门：x > W
    if (ball.x + BALL_RADIUS > W && ball.y > RIGHT_GOAL_Y - GOAL_WIDTH/2 && ball.y < RIGHT_GOAL_Y + GOAL_WIDTH/2) {
      goalScored('red'); // 红队进球
      return;
    }
    
    // 球在左右边界反弹（非球门区域）
    if (ball.x - BALL_RADIUS < 0 && (ball.y <= LEFT_GOAL_Y - GOAL_WIDTH/2 || ball.y >= LEFT_GOAL_Y + GOAL_WIDTH/2)) {
      ball.x = BALL_RADIUS;
      ball.vx *= -0.5;
    }
    if (ball.x + BALL_RADIUS > W && (ball.y <= RIGHT_GOAL_Y - GOAL_WIDTH/2 || ball.y >= RIGHT_GOAL_Y + GOAL_WIDTH/2)) {
      ball.x = W - BALL_RADIUS;
      ball.vx *= -0.5;
    }
    
    // 抢球拥挤时推开多余球员，防止卡死
    const nearCheck = allPlayers.filter(p => 
      p.role !== 'goalkeeper' && Math.hypot(p.x - ball.x, p.y - ball.y) < 50
    );
    if (nearCheck.length > 2) {
      nearCheck.sort((a, b) => 
        Math.hypot(a.x - ball.x, a.y - ball.y) - Math.hypot(b.x - ball.x, b.y - ball.y)
      );
      for (let k = 2; k < nearCheck.length; k++) {
        const cp = nearCheck[k];
        const pdx = cp.x - ball.x;
        const pdy = cp.y - ball.y;
        const pdist = Math.hypot(pdx, pdy) || 1;
        cp.x += (pdx / pdist) * 4;
        cp.y += (pdy / pdist) * 4;
      }
    }

    // 球员间碰撞推离
    for (let i = 0; i < allPlayers.length; i++) {
      for (let j = i+1; j < allPlayers.length; j++) {
        if (circlesCollide(allPlayers[i], PLAYER_RADIUS, allPlayers[j], PLAYER_RADIUS)) {
          resolveCollision(allPlayers[i], PLAYER_RADIUS, allPlayers[j], PLAYER_RADIUS);
        }
      }
    }
    
    // 球员踢球
    allPlayers.forEach(p => playerKickBall(p, ball));
    
    // 门将额外踢球范围（门将可以手抛）
    [redPlayers[3], bluePlayers[3]].forEach(gk => {
      if (gk && circlesCollide(gk, PLAYER_RADIUS + 6, ball, BALL_RADIUS)) {
        // 门将抢到球，向中场踢出
        let tx = gk.team === 'red' ? W*0.4 : W*0.6;
        let dx = tx - ball.x;
        let dy = (H/2 + (Math.random()-0.5)*100) - ball.y;
        let dist = Math.sqrt(dx*dx + dy*dy) || 1;
        ball.vx = (dx / dist) * KICK_POWER * 1.3;
        ball.vy = (dy / dist) * KICK_POWER * 1.3;
        const overlap = (PLAYER_RADIUS+6 + BALL_RADIUS) - Math.hypot(ball.x - gk.x, ball.y - gk.y);
        if (overlap > 0) {
          ball.x += (dx/dist) * overlap;
          ball.y += (dy/dist) * overlap;
        }
      }
    });
  }
  
  // 渲染
  function draw() {
    ctx.clearRect(0, 0, W, H);
    
    // 绘制草地纹理
    ctx.fillStyle = '#2d5a27';
    ctx.fillRect(0, 0, W, H);
    
    // 场地线
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    ctx.strokeRect(10, 10, W-20, H-20);
    
    // 中线
    ctx.beginPath();
    ctx.moveTo(W/2, 10);
    ctx.lineTo(W/2, H-10);
    ctx.stroke();
    
    // 中圈
    ctx.beginPath();
    ctx.arc(W/2, H/2, 60, 0, Math.PI*2);
    ctx.stroke();
    
    // 点球点
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(W/2, H/2, 4, 0, Math.PI*2);
    ctx.fill();
    
    // 左侧球门区域
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.strokeRect(10, LEFT_GOAL_Y - GOAL_WIDTH/2, GOAL_DEPTH, GOAL_WIDTH);
    // 球门网
    ctx.fillStyle = 'rgba(200,200,200,0.2)';
    ctx.fillRect(2, LEFT_GOAL_Y - GOAL_WIDTH/2, 10, GOAL_WIDTH);
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 3;
    ctx.strokeRect(2, LEFT_GOAL_Y - GOAL_WIDTH/2, 10, GOAL_WIDTH);
    
    // 右侧球门区域
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 2;
    ctx.strokeRect(W-10-GOAL_DEPTH, RIGHT_GOAL_Y - GOAL_WIDTH/2, GOAL_DEPTH, GOAL_WIDTH);
    ctx.fillStyle = 'rgba(200,200,200,0.2)';
    ctx.fillRect(W-12, RIGHT_GOAL_Y - GOAL_WIDTH/2, 10, GOAL_WIDTH);
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 3;
    ctx.strokeRect(W-12, RIGHT_GOAL_Y - GOAL_WIDTH/2, 10, GOAL_WIDTH);
    
    // 绘制球员
    const allPlayers = [...redPlayers, ...bluePlayers];
    allPlayers.forEach(p => {
      // 阴影
      ctx.beginPath();
      ctx.arc(p.x+2, p.y+2, PLAYER_RADIUS, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fill();
      
      // 球员身体
      ctx.beginPath();
      ctx.arc(p.x, p.y, PLAYER_RADIUS, 0, Math.PI*2);
      ctx.fillStyle = p.team === 'red' ? '#e74c3c' : '#3498db';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // 门将标识
      if (p.role === 'goalkeeper') {
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.arc(p.x, p.y, PLAYER_RADIUS-4, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('GK', p.x, p.y);
      } else {
        // 球员号码
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const idx = p.team === 'red' ? redPlayers.indexOf(p) : bluePlayers.indexOf(p);
        ctx.fillText(idx+1, p.x, p.y);
      }
      
      // 红队选中球员高亮
      if (p.team === 'red' && redPlayers.indexOf(p) === selectedPlayerIdx && gameActive) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PLAYER_RADIUS+4, 0, Math.PI*2);
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 3;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    });
    
    // 绘制足球
    ctx.beginPath();
    ctx.arc(ball.x-2, ball.y-2, ball.radius, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.stroke();
    // 足球花纹
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI;
      ctx.beginPath();
      ctx.arc(ball.x + Math.cos(angle)*4, ball.y + Math.sin(angle)*4, 2, 0, Math.PI*2);
      ctx.fillStyle = '#222';
      ctx.fill();
    }
  }
  
  // 游戏循环
  function gameLoop(timestamp) {
    if (!lastTimestamp) lastTimestamp = timestamp;
    const dt = (timestamp - lastTimestamp) / 1000;
    const cappedDt = Math.min(dt, 0.05);
    frameCount++;
    
    if (gameActive && dt > 0) {
      // 更新计时器
      gameTime -= cappedDt;
      if (gameTime <= 0) {
        gameTime = 0;
        endGame();
      }
      updateScoreDisplay();
      
      // 更新计时器显示
      const mins = Math.floor(gameTime / 60);
      const secs = Math.floor(gameTime % 60);
      document.getElementById('timer').textContent = 
        String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
      
      update();
    }
    
    lastTimestamp = timestamp;
    draw();
    requestAnimationFrame(gameLoop);
  }
  
  // 事件监听
  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    
    // 空格切换球员
    if (e.code === 'Space') {
      e.preventDefault();
      if (gameActive) {
        // 只在非门将之间切换 (0-2)
        let next = selectedPlayerIdx;
        do {
          next = (next + 1) % 3; // 只切换前3个普通球员
        } while (next !== selectedPlayerIdx && next >= 3);
        selectedPlayerIdx = next;
      }
    }
    
    // R 键重新开始
    if (e.code === 'KeyR' && gameOver) {
      e.preventDefault();
      resetMatch();
    }
  });
  
  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });
  
  // 初始化
  initGame();
  updateScoreDisplay();
  requestAnimationFrame(gameLoop);
  
})();
</script>
</body>
