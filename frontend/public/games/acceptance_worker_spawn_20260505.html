<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worker Spawn 调度台</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    color: #d0d0d0;
    font-family: 'Courier New', 'Source Code Pro', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
  }
  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 20px;
  }
  .title {
    font-size: 1.8rem;
    letter-spacing: 0.1em;
    color: #00f0ff;
    text-shadow: 0 0 10px #00f0ff88, 0 0 30px #00f0ff44;
  }
  .score-panel {
    display: flex; align-items: baseline; gap: 8px;
    background: #101018; border: 1px solid #252540;
    border-radius: 4px; padding: 6px 22px;
  }
  .score-label { font-size: 0.85rem; color: #777; }
  .score-value {
    font-size: 1.6rem; font-weight: bold; color: #00ff88;
    text-shadow: 0 0 8px #00ff88; min-width: 48px; text-align: right;
  }
  .canvas-container {
    border: 2px solid #1a1a2a; border-radius: 4px;
    box-shadow: 0 0 14px #00f0ff18; line-height: 0;
  }
  canvas { display: block; background: #0a0a14; }
  .controls { display: flex; gap: 14px; }
  .ctrl-btn {
    font-family: inherit; font-size: 0.95rem; letter-spacing: 0.05em;
    padding: 10px 26px; border: 2px solid; border-radius: 4px;
    background: transparent; cursor: pointer; transition: all 0.12s ease;
  }
  .btn-start { color: #00ff88; border-color: #00ff88; box-shadow: 0 0 8px #00ff8844; }
  .btn-start:hover { background: #00ff8811; box-shadow: 0 0 18px #00ff8866; }
  .btn-restart { color: #ff6ec7; border-color: #ff6ec7; box-shadow: 0 0 8px #ff6ec744; }
  .btn-restart:hover { background: #ff6ec711; box-shadow: 0 0 18px #ff6ec766; }
  .ctrl-btn:active { transform: scale(0.96); }
  .hint { font-size: 0.8rem; color: #444; }
  .status-line {
    font-size: 0.85rem; color: #666; min-height: 1.2em;
    text-align: center; letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <h1 class="title">Worker Spawn 调度台</h1>

  <div class="score-panel">
    <span class="score-label">已调度 Worker</span>
    <span class="score-value" id="scoreDisplay">0</span>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="480" height="600"></canvas>
  </div>

  <div class="controls">
    <button id="btnStart" class="ctrl-btn btn-start">开始调度</button>
    <button id="btnRestart" class="ctrl-btn btn-restart">重置</button>
  </div>

  <div class="hint">← → 移动调度器 &nbsp;|&nbsp; 接住绿色 Worker &nbsp;|&nbsp; 避开红色错误</div>
  <div class="status-line" id="statusLine"></div>
</div>

<script>
(function () {
  /* === DOM 引用 === */
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var scoreDisplay = document.getElementById('scoreDisplay');
  var btnStart = document.getElementById('btnStart');
  var btnRestart = document.getElementById('btnRestart');
  var statusLine = document.getElementById('statusLine');

  var W = canvas.width;
  var H = canvas.height;

  /* === 状态机 === */
  var STATE = { START: 0, PLAYING: 1, OVER: 2 };
  var gameState = STATE.START;

  /* === 调度器（玩家） === */
  var PAD_W = 72;
  var PAD_H = 18;
  var PAD_Y = H - 60;
  var PAD_SPEED = 420;
  var pad = { x: W / 2 - PAD_W / 2, y: PAD_Y, w: PAD_W, h: PAD_H };

  /* === 掉落物 === */
  var BASE_FALL_SPEED = 190;
  var SPEED_PER_SCORE = 5;
  var BASE_SPAWN_MS = 900;
  var MIN_SPAWN_MS = 280;
  var SPAWN_SHRINK_PER_POINT = 6;
  var ERROR_CHANCE = 0.18; // 18% 概率生成错误请求

  var items = [];
  var spawnTimer = 0;
  var score = 0;

  /* === 输入 === */
  var keys = { ArrowLeft: false, ArrowRight: false };

  /* === 时间 === */
  var lastTime = 0;

  /* === 工具函数 === */
  function rand(min, max) { return Math.random() * (max - min) + min; }
  function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

  function currentFallSpeed() { return BASE_FALL_SPEED + score * SPEED_PER_SCORE; }
  function currentSpawnMs() { return Math.max(MIN_SPAWN_MS, BASE_SPAWN_MS - score * SPAWN_SHRINK_PER_POINT); }

  /* === 重置 === */
  function resetGame() {
    pad.x = W / 2 - PAD_W / 2;
    items = [];
    spawnTimer = 0;
    score = 0;
    updateScore();
    statusLine.textContent = '';
  }

  function updateScore() { scoreDisplay.textContent = score; }

  /* === 碰撞（矩形） === */
  function hit(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  /* === 生成掉落物 === */
  function spawnItem() {
    var w = rand(28, 60);
    var h = rand(16, 28);
    var isError = Math.random() < ERROR_CHANCE;
    items.push({
      x: rand(4, W - w - 4),
      y: -h - rand(0, 40),
      w: w,
      h: h,
      error: isError
    });
  }

  /* === 更新 === */
  function update(dt) {
    if (gameState !== STATE.PLAYING) return;
    var sec = Math.min(dt, 0.12);

    /* 调度器移动 */
    var dx = 0;
    if (keys.ArrowLeft)  dx -= 1;
    if (keys.ArrowRight) dx += 1;
    pad.x += dx * PAD_SPEED * sec;
    pad.x = clamp(pad.x, 0, W - pad.w);

    /* 掉落物移动 */
    var speed = currentFallSpeed();
    for (var i = items.length - 1; i >= 0; i--) {
      items[i].y += speed * sec;
    }

    /* 碰撞检测 */
    for (var j = 0; j < items.length; j++) {
      if (hit(items[j], pad)) {
        if (items[j].error) {
          /* 撞到错误 → 失败 */
          gameState = STATE.OVER;
          statusLine.textContent = '⚠ 捕获到错误请求！Worker 调度中止。';
          return;
        } else {
          /* 接住 Worker → 加分 */
          items.splice(j, 1);
          score += 1;
          updateScore();
          j--; /* 调整索引 */
        }
      }
    }

    /* 移除飞出屏幕的掉落物 */
    for (var k = items.length - 1; k >= 0; k--) {
      if (items[k].y > H + 40) {
        var missed = items[k];
        items.splice(k, 1);
        /* 漏掉绿色 Worker 不算失败，只是没分；漏掉红色的也不算失败（没撞到） */
      }
    }

    /* 生成新掉落物 */
    spawnTimer += dt * 1000;
    var interval = currentSpawnMs();
    while (spawnTimer >= interval) {
      spawnTimer -= interval;
      spawnItem();
    }
  }

  /* === 绘制 === */
  function drawGrid() {
    ctx.strokeStyle = '#14142a';
    ctx.lineWidth = 0.5;
    var step = 40;
    for (var x = step; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (var y = step; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  function drawPad() {
    var p = pad;
    /* 光晕 */
    ctx.fillStyle = '#00f0ff22';
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 14;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.shadowBlur = 0;
    /* 主体 */
    ctx.fillStyle = '#00d4e0';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    /* 高光条 */
    ctx.fillStyle = '#60f8ff';
    ctx.fillRect(p.x + 3, p.y + 2, p.w - 6, 4);
    /* 标签 */
    ctx.fillStyle = '#ffffffcc';
    ctx.font = '9px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DISPATCHER', p.x + p.w / 2, p.y + 14);
    ctx.textAlign = 'start';
  }

  function drawItem(it) {
    if (it.error) {
      /* 错误请求：红色 */
      ctx.fillStyle = '#ff2d5533';
      ctx.shadowColor = '#ff2d55';
      ctx.shadowBlur = 12;
      ctx.fillRect(it.x, it.y, it.w, it.h);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ee3355';
      ctx.fillRect(it.x, it.y, it.w, it.h);
      ctx.fillStyle = '#ff8899';
      ctx.fillRect(it.x, it.y, it.w, 3);
      /* 标签 */
      ctx.fillStyle = '#ffffffcc';
      ctx.font = '8px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ERROR', it.x + it.w / 2, it.y + it.h / 2 + 3);
    } else {
      /* Worker 请求：绿色 */
      ctx.fillStyle = '#00ff8833';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 12;
      ctx.fillRect(it.x, it.y, it.w, it.h);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#00dd66';
      ctx.fillRect(it.x, it.y, it.w, it.h);
      ctx.fillStyle = '#66ffaa';
      ctx.fillRect(it.x, it.y, it.w, 3);
      /* 标签 */
      ctx.fillStyle = '#ffffffcc';
      ctx.font = '8px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('WORKER', it.x + it.w / 2, it.y + it.h / 2 + 3);
    }
    ctx.textAlign = 'start';
  }

  function drawOverlay(title, sub) {
    ctx.fillStyle = 'rgba(4,4,16,0.80)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#00f0ff';
    ctx.font = 'bold 32px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 18;
    ctx.fillText(title, W / 2, H / 2 - 18);
    ctx.shadowBlur = 0;
    if (sub) {
      ctx.fillStyle = '#aaa';
      ctx.font = '15px "Courier New", monospace';
      ctx.fillText(sub, W / 2, H / 2 + 26);
    }
    ctx.textAlign = 'start';
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawGrid();

    if (gameState === STATE.START) {
      drawPad();
      drawOverlay('Worker Spawn', '点击「开始调度」启动');
    } else if (gameState === STATE.PLAYING) {
      for (var i = 0; i < items.length; i++) drawItem(items[i]);
      drawPad();
      /* HUD */
      ctx.fillStyle = '#ffffff55';
      ctx.font = '13px "Courier New", monospace';
      ctx.textAlign = 'right';
      ctx.fillText('WORKERS: ' + score, W - 14, 22);
      ctx.textAlign = 'start';
    } else if (gameState === STATE.OVER) {
      for (var i = 0; i < items.length; i++) drawItem(items[i]);
      drawPad();
      ctx.fillStyle = '#ffffff55';
      ctx.font = '13px "Courier New", monospace';
      ctx.textAlign = 'right';
      ctx.fillText('WORKERS: ' + score, W - 14, 22);
      ctx.textAlign = 'start';
      drawOverlay('调度失败', '最终调度 ' + score + ' 个 Worker — 点击「重置」');
      /* 失败提示展现在状态行 + overlay */
    }
  }

  /* === 游戏循环 === */
  function gameLoop(timestamp) {
    if (lastTime === 0) lastTime = timestamp;
    var dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  /* === 事件绑定 === */
  window.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      e.preventDefault();
      keys[e.key] = true;
    }
  });
  window.addEventListener('keyup', function (e) {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      e.preventDefault();
      keys[e.key] = false;
    }
  });

  btnStart.addEventListener('click', function () {
    if (gameState === STATE.PLAYING) return;
    resetGame();
    gameState = STATE.PLAYING;
    lastTime = 0;
    btnStart.textContent = '运行中…';
    statusLine.textContent = '调度进行中 — 接住绿色 Worker，避开红色错误';
  });

  btnRestart.addEventListener('click', function () {
    resetGame();
    gameState = STATE.PLAYING;
    lastTime = 0;
    btnStart.textContent = '开始调度';
    statusLine.textContent = '调度进行中 — 接住绿色 Worker，避开红色错误';
  });

  /* === 启动 === */
  render();
  requestAnimationFrame(gameLoop);
})();
</script>

</body>
</html>
