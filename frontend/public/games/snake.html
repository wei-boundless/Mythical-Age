<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Snake</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(7, 16, 31, 0.78);
      --panel-border: rgba(142, 208, 255, 0.18);
      --grid: rgba(139, 217, 255, 0.08);
      --text: #e6f4ff;
      --muted: #8da6c3;
      --accent: #6ef2ff;
      --accent-2: #8bff9b;
      --danger: #ff6e9e;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(110, 242, 255, 0.15), transparent 32%),
        radial-gradient(circle at bottom right, rgba(139, 255, 155, 0.12), transparent 26%),
        linear-gradient(180deg, #09111f 0%, #050a13 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(320px, 1fr);
      gap: 20px;
      align-items: stretch;
    }

    .panel {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(18px);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 28%),
        linear-gradient(0deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0));
    }

    .sidebar {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      width: fit-content;
      background: rgba(110, 242, 255, 0.08);
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 52px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .stat strong {
      display: block;
      font-size: 24px;
      font-weight: 700;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .control-card {
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .control-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .control-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 14px;
      transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), #58c0ff);
      color: #04101c;
      box-shadow: 0 14px 34px rgba(110, 242, 255, 0.26);
    }

    .secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .game-panel {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    .game-head {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .game-head strong {
      font-size: 18px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .canvas-wrap {
      width: min(100%, 620px);
      aspect-ratio: 1 / 1;
      padding: 12px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.018));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(5, 14, 27, 0.92), rgba(3, 9, 18, 0.96));
      box-shadow: inset 0 0 0 1px rgba(110, 242, 255, 0.08);
    }

    .hint-bar {
      width: min(100%, 620px);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .hint-chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    @media (max-width: 920px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        order: 2;
      }

      .game-panel {
        order: 1;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel sidebar">
      <div class="eyebrow">Playable Web Game</div>
      <div>
        <h1>Neon<br>Snake</h1>
      </div>
      <p class="subtitle">
        一个轻量、独立、可直接试玩的网页小游戏。方向键或 WASD 控制，吃到能量球就会增长并提速。
      </p>

      <div class="stats">
        <article class="stat">
          <span>当前分数</span>
          <strong id="score">0</strong>
        </article>
        <article class="stat">
          <span>历史最高</span>
          <strong id="best">0</strong>
        </article>
        <article class="stat">
          <span>当前速度</span>
          <strong id="speed">1x</strong>
        </article>
        <article class="stat">
          <span>状态</span>
          <strong id="stateLabel">待开始</strong>
        </article>
      </div>

      <div class="actions">
        <button class="primary" id="startButton" type="button">开始游戏</button>
        <button class="secondary" id="restartButton" type="button">重新开始</button>
      </div>

      <div class="controls">
        <article class="control-card">
          <strong>操作方式</strong>
          <p>方向键 / WASD 移动，空格键暂停或继续。</p>
        </article>
        <article class="control-card">
          <strong>胜负规则</strong>
          <p>撞墙或撞到自己就结束。每吃 4 个能量球会加快一点节奏。</p>
        </article>
        <article class="control-card">
          <strong>设计目标</strong>
          <p>做成一个结构清晰、直接打开就能玩的单文件小游戏，方便继续迭代成更复杂的版本。</p>
        </article>
      </div>
    </section>

    <section class="panel game-panel">
      <div class="game-head">
        <strong id="headline">准备开始</strong>
        <div class="status" id="statusText">点击“开始游戏”后进入运行状态</div>
      </div>

      <div class="canvas-wrap">
        <canvas id="game" width="640" height="640" aria-label="Snake game board"></canvas>
      </div>

      <div class="hint-bar">
        <div class="hint-chip">支持键盘操作</div>
        <div class="hint-chip">单文件 HTML / CSS / JS</div>
        <div class="hint-chip">可直接继续扩展音效、关卡、皮肤</div>
      </div>
    </section>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const speedEl = document.getElementById("speed");
    const stateLabelEl = document.getElementById("stateLabel");
    const headlineEl = document.getElementById("headline");
    const statusTextEl = document.getElementById("statusText");
    const startButton = document.getElementById("startButton");
    const restartButton = document.getElementById("restartButton");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    const storageKey = "neon-snake-best";

    let snake;
    let direction;
    let queuedDirection;
    let food;
    let score;
    let foodsEaten;
    let gameLoop = null;
    let tickMs;
    let running = false;
    let paused = false;
    let best = Number(localStorage.getItem(storageKey) || 0);

    function resetGame() {
      snake = [
        { x: 8, y: 10 },
        { x: 7, y: 10 },
        { x: 6, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      queuedDirection = { x: 1, y: 0 };
      score = 0;
      foodsEaten = 0;
      tickMs = 150;
      paused = false;
      running = false;
      spawnFood();
      syncHud();
      draw();
    }

    function spawnFood() {
      let next;
      do {
        next = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some((segment) => segment.x === next.x && segment.y === next.y));
      food = next;
    }

    function syncHud() {
      scoreEl.textContent = String(score);
      bestEl.textContent = String(best);
      speedEl.textContent = `${Math.max(1, Math.round((150 / tickMs) * 10) / 10)}x`;
      stateLabelEl.textContent = !running ? "待开始" : paused ? "已暂停" : "进行中";
      headlineEl.textContent = !running ? "准备开始" : paused ? "游戏暂停" : "正在游玩";
      statusTextEl.textContent = !running
        ? "点击“开始游戏”后进入运行状态"
        : paused
          ? "按空格键继续，或点击重新开始"
          : "吃掉能量球，避免撞墙和自撞";
    }

    function startGame() {
      if (running && paused) {
        paused = false;
        syncHud();
        return;
      }
      if (running) return;
      running = true;
      paused = false;
      syncHud();
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, tickMs);
    }

    function restartGame() {
      clearInterval(gameLoop);
      resetGame();
      startGame();
    }

    function gameOver() {
      running = false;
      paused = false;
      clearInterval(gameLoop);
      if (score > best) {
        best = score;
        localStorage.setItem(storageKey, String(best));
      }
      syncHud();
      headlineEl.textContent = "游戏结束";
      statusTextEl.textContent = "按“重新开始”再来一局";
      draw(true);
    }

    function tick() {
      if (!running || paused) return;
      direction = queuedDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount ||
        snake.some((segment) => segment.x === head.x && segment.y === head.y)
      ) {
        gameOver();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        foodsEaten += 1;
        if (foodsEaten % 4 === 0 && tickMs > 70) {
          tickMs -= 10;
          clearInterval(gameLoop);
          gameLoop = setInterval(tick, tickMs);
        }
        spawnFood();
      } else {
        snake.pop();
      }

      syncHud();
      draw();
    }

    function draw(showCrash = false) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < tileCount; y += 1) {
        for (let x = 0; x < tileCount; x += 1) {
          ctx.fillStyle = (x + y) % 2 === 0 ? "rgba(110, 242, 255, 0.035)" : "rgba(139, 255, 155, 0.02)";
          ctx.fillRect(x * gridSize, y * gridSize, gridSize - 1, gridSize - 1);
        }
      }

      ctx.save();
      const foodGradient = ctx.createRadialGradient(
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        2,
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        14
      );
      foodGradient.addColorStop(0, "#fff6d6");
      foodGradient.addColorStop(0.45, "#ff8fb8");
      foodGradient.addColorStop(1, "rgba(255, 110, 158, 0.14)");
      ctx.fillStyle = foodGradient;
      ctx.beginPath();
      ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      snake.forEach((segment, index) => {
        const isHead = index === 0;
        ctx.fillStyle = isHead ? "#8bff9b" : "#6ef2ff";
        ctx.shadowColor = isHead ? "rgba(139, 255, 155, 0.36)" : "rgba(110, 242, 255, 0.26)";
        ctx.shadowBlur = isHead ? 18 : 12;
        roundRect(
          ctx,
          segment.x * gridSize + 1,
          segment.y * gridSize + 1,
          gridSize - 3,
          gridSize - 3,
          isHead ? 8 : 6
        );
        ctx.fill();
        ctx.shadowBlur = 0;
      });

      if (!running && !showCrash) {
        overlay("点击开始", "方向键 / WASD 控制移动");
      }

      if (paused) {
        overlay("已暂停", "按空格继续");
      }

      if (showCrash) {
        overlay("游戏结束", "点击重新开始");
      }
    }

    function overlay(title, subtitle) {
      ctx.save();
      ctx.fillStyle = "rgba(4, 9, 18, 0.56)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = "center";
      ctx.fillStyle = "#e6f4ff";
      ctx.font = "700 40px Segoe UI";
      ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 8);
      ctx.fillStyle = "#8da6c3";
      ctx.font = "16px Segoe UI";
      ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 28);
      ctx.restore();
    }

    function roundRect(context, x, y, width, height, radius) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.arcTo(x + width, y, x + width, y + height, radius);
      context.arcTo(x + width, y + height, x, y + height, radius);
      context.arcTo(x, y + height, x, y, radius);
      context.arcTo(x, y, x + width, y, radius);
      context.closePath();
    }

    function queueDirection(nextX, nextY) {
      if (direction.x + nextX === 0 && direction.y + nextY === 0) return;
      queuedDirection = { x: nextX, y: nextY };
    }

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (key === "arrowup" || key === "w") queueDirection(0, -1);
      if (key === "arrowdown" || key === "s") queueDirection(0, 1);
      if (key === "arrowleft" || key === "a") queueDirection(-1, 0);
      if (key === "arrowright" || key === "d") queueDirection(1, 0);
      if (key === " ") {
        event.preventDefault();
        if (!running) {
          startGame();
        } else {
          paused = !paused;
          syncHud();
          draw();
        }
      }
    });

    startButton.addEventListener("click", () => {
      if (!running) {
        startGame();
        return;
      }
      paused = !paused;
      syncHud();
      draw();
    });

    restartButton.addEventListener("click", restartGame);

    resetGame();
  </script>
</body>
</html>
