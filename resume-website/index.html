console.log('[简历] 脚本已加载，版本 2026');

// ===== 安全 localStorage 包装（兼容 file:// 协议） =====
var ls = {
    get: function(key, fallback) {
        try { var v = localStorage.getItem(key); return v !== null ? v : fallback; }
        catch(e) { return fallback; }
    },
    set: function(key, value) {
        try { localStorage.setItem(key, value); } catch(e) { /* file:// 下静默 */ }
    },
    remove: function(key) {
        try { localStorage.removeItem(key); } catch(e) {}
    },
    parseJSON: function(key, fallback) {
        try {
            var v = localStorage.getItem(key);
            return v ? JSON.parse(v) : fallback;
        } catch(e) { return fallback; }
    }
};

// ===== 全局导出一级函数（HTML onclick 直接调用） =====
// 定义在最前面确保无论后面代码是否出错都存在
// openTemplateLibrary — 打开模板库模态框
window.openTemplateLibrary = function() {
    console.log('[简历] 点击模板库按钮');
    var modal = document.getElementById('template-library-modal');
    // 如果模态框 DOM 不存在，强制重建
    if (!modal) {
        console.warn('[简历] 模板库模态框DOM不存在，强制重建...');
        window.openTemplateLibraryLazy();
        modal = document.getElementById('template-library-modal');
        if (!modal) {
            console.error('[简历] 模板库模态框重建失败');
            return;
        }
    }
    // 关闭其他模态框
    var editorModal = document.getElementById('editor-modal');
    if (editorModal) editorModal.style.display = 'none';
    try {
        var templateKeys = Object.keys(TEMPLATES || {});
        var activeKey = ls.get('resume-template', 'classic-blue');
        var grid = modal.querySelector('.tpl-grid');
        if (grid) {
            grid.innerHTML = templateKeys.map(function(key) {
                var tpl = TEMPLATES[key];
                var isActive = (activeKey === key);
                var descMap = {
                    'classic-blue': '左侧边栏 + 右侧主内容，经典蓝色风格',
                    'full-width': '顶部通栏头部，技能/语言/内容纵向排列',
                    'card-grid': '顶部头部 + 自适应卡片网格布局',
                    'vertical-simple': '纯白极简，全纵向排列，干净利落',
                    'professional-left': '深色宽侧栏 + 金色强调，商务专业风',
                    'dual-timeline': '顶部通栏 + 左右双列内容，翡翠绿主题',
                    'luxury-gold': '深色渐变头部 + 帝王金点缀，高端奢华风'
                };
                return '<div class="tpl-card' + (isActive ? ' tpl-card-active' : '') + '" data-template="' + key + '" onclick="switchTemplate(\'' + key + '\')">' +
                    '<div class="tpl-card-preview tpl-preview-' + key + '">' +
                    '<div class="tpl-preview-bar" style="background:' + (tpl ? tpl.vars['--primary'] : '#888') + '"></div>' +
                    '<div class="tpl-preview-body">' +
                    '<div class="tpl-preview-title">' + (tpl ? tpl.name : key) + '</div>' +
                    '<div class="tpl-preview-desc">' + (descMap[key] || '') + '</div>' +
                    '</div></div>' +
                    (isActive ? '<div class="tpl-card-badge">使用中</div>' : '') +
                    '</div>';
            }).join('');
        }
    } catch(e) { console.error('[简历] openTemplateLibrary error:', e); }
    modal.style.display = 'flex';
};
// closeTemplateLibrary — 关闭模板库
window.closeTemplateLibrary = function() {
    var modal = document.getElementById('template-library-modal');
    if (modal) modal.style.display = 'none';
};
// openTemplateLibraryLazy — 懒重建模板库模态框（在 initTemplateLibrary 未执行时兜底）
window.openTemplateLibraryLazy = function() {
    if (document.getElementById('template-library-modal')) { window.openTemplateLibrary(); return; }
    try {
        var templateKeys = Object.keys(TEMPLATES || {});
        var activeKey = ls.get('resume-template', 'classic-blue');
        var descMap = {
            'classic-blue': '左侧边栏 + 右侧主内容，经典蓝色风格',
            'full-width': '顶部通栏头部，技能/语言/内容纵向排列',
            'card-grid': '顶部头部 + 自适应卡片网格布局',
            'vertical-simple': '纯白极简，全纵向排列，干净利落',
            'professional-left': '深色宽侧栏 + 金色强调，商务专业风',
            'dual-timeline': '顶部通栏 + 左右双列内容，翡翠绿主题',
            'luxury-gold': '深色渐变头部 + 帝王金点缀，高端奢华风'
        };
        var cardsHtml = templateKeys.map(function(key) {
            var tpl = TEMPLATES[key];
            var isActive = (activeKey === key);
            return '<div class="tpl-card' + (isActive ? ' tpl-card-active' : '') + '" data-template="' + key + '" onclick="switchTemplate(\'' + key + '\')">' +
                '<div class="tpl-card-preview tpl-preview-' + key + '">' +
                '<div class="tpl-preview-bar" style="background:' + (tpl ? tpl.vars['--primary'] : '#888') + '"></div>' +
                '<div class="tpl-preview-body">' +
                '<div class="tpl-preview-title">' + (tpl ? tpl.name : key) + '</div>' +
                '<div class="tpl-preview-desc">' + (descMap[key] || '') + '</div>' +
                '</div></div>' +
                (isActive ? '<div class="tpl-card-badge">使用中</div>' : '') +
                '</div>';
        }).join('');
        var modalHtml = '<div id="template-library-modal" class="modal tpl-modal" style="display:none;">' +
            '<div class="modal-backdrop" onclick="closeTemplateLibrary()"></div>' +
            '<div class="modal-panel tpl-modal-panel">' +
            '<div class="modal-header"><h2>选择模板</h2><button class="modal-close" onclick="closeTemplateLibrary()">\u2715</button></div>' +
            '<div class="modal-body tpl-modal-body"><div class="tpl-grid">' + cardsHtml + '</div></div>' +
            '<div class="modal-footer"><button class="btn-cancel" onclick="closeTemplateLibrary()">关闭</button></div>' +
            '</div></div>';
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('template-library-modal').style.display = 'flex';
    } catch(e) { console.error('[简历] openTemplateLibraryLazy error:', e); }
};
// switchTemplate — 切换模板
window.switchTemplate = function(key) {
    if (!TEMPLATES || !TEMPLATES[key]) return;
    ls.set('resume-template', key);
    if (typeof currentData !== 'undefined' && currentData) {
        if (typeof populateResumeData === 'function') populateResumeData(currentData);
        if (typeof showToast === 'function') showToast('已切换至「' + TEMPLATES[key].name + '」模板');
    }
    var cl = window.closeTemplateLibrary;
    if (typeof cl === 'function') cl();
};
// openResumeEditor — 打开编辑器
window.openResumeEditor = function() {
    try {
        console.log('[简历] 点击编辑按钮');
        // 确保编辑器模态框 DOM 存在，不存在则强制重建
        if (!document.getElementById('editor-modal')) {
            console.log('[简历] 编辑器模态框DOM不存在，强制重建');
            if (typeof initModalEditor === 'function') initModalEditor();
            // 重建后再次检查
            if (!document.getElementById('editor-modal')) {
                console.error('[简历] 编辑器模态框重建失败');
                return;
            }
        }
        // 关闭其他模态框
        var tplModal = document.getElementById('template-library-modal');
        if (tplModal) tplModal.style.display = 'none';
        // 确保至少有默认副本
        var copies = ls.parseJSON('resume-copies', null);
        if (!copies || !copies.length) {
            console.warn('[简历] 无可用副本，创建默认副本');
            copies = [{
                id: 'default',
                name: '默认副本',
                data: JSON.parse(JSON.stringify(DEFAULT_RESUME_DATA)),
                createdAt: new Date().toISOString()
            }];
            ls.set('resume-copies', JSON.stringify(copies));
            ls.set('resume-active-copy-id', 'default');
        }
        var activeId = ls.get('resume-active-copy-id', 'default');
        var active = copies.find(function(c) { return c.id === activeId; }) || copies[0];
        if (active && typeof openEditorModal === 'function') openEditorModal(active.data);
        else console.error('[简历] 无法找到可用副本');
    } catch(e) { console.error('[简历] openResumeEditor error:', e); }
};
// generatePDF — 生成并下载 PDF
window.generatePDF = async function() {
    var container = document.querySelector('#resume-root .container');
    if (!container) { if (typeof showToast === 'function') showToast('未找到简历内容'); return; }
    var editBar = document.querySelector('.edit-bar');
    if (editBar) editBar.style.display = 'none';
    var copyManager = document.getElementById('copy-manager');
    if (copyManager) copyManager.style.display = 'none';
    if (typeof showToast === 'function') showToast('正在生成 PDF...');
    try {
        var copies = ls.parseJSON('resume-copies', null);
        var activeId = ls.get('resume-active-copy-id', 'default');
        var active = copies ? copies.find(function(c) { return c.id === activeId; }) : null;
        var fileName = active ? active.name + '.pdf' : '个人简历.pdf';
        // 显式锁定容器宽度，避免 html2canvas 在居中布局下偏移裁剪
        var origWidth = container.style.width;
        container.style.width = container.scrollWidth + 'px';
        var opt = {
            margin: [0.4, 0.4, 0.4, 0.4],
            filename: fileName,
            image: { type: 'png' },
            html2canvas: { scale: 4, useCORS: true, letterRendering: true, logging: false },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        };
        if (typeof html2pdf !== 'undefined') {
            await html2pdf().set(opt).from(container).save();
            container.style.width = origWidth;
            if (typeof showToast === 'function') showToast('PDF 已下载');
        } else {
            if (typeof showToast === 'function') showToast('PDF 库未加载，请使用打印功能');
        }
    } catch(err) {
        console.error('[简历] PDF 生成失败:', err);
        if (typeof showToast === 'function') showToast('PDF 生成失败，请使用打印功能');
    } finally {
        if (editBar) editBar.style.display = '';
        if (copyManager) copyManager.style.display = '';
    }
};

// ===== 副本管理 =====
function getCopies() {
    try {
        return ls.parseJSON(COPIES_KEY, null);
    } catch (e) { /* ignore */ }
    return null;
}

function saveCopies(copies) {
    ls.set(COPIES_KEY, JSON.stringify(copies));
}

function getActiveCopyId() {
    return ls.get(ACTIVE_COPY_KEY, 'default');
}

function setActiveCopyId(id) {
    ls.set(ACTIVE_COPY_KEY, id);
}

function getActiveCopy() {
    const copies = getCopies();
    if (!copies || copies.length === 0) return null;
    const activeId = getActiveCopyId();
    return copies.find(c => c.id === activeId) || copies[0];
}

function initCopies() {
    let copies = getCopies();
    if (!copies || copies.length === 0) {
        copies = [{
            id: 'default',
            name: '默认副本',
            data: JSON.parse(JSON.stringify(DEFAULT_RESUME_DATA)),
            createdAt: new Date().toISOString()
        }];
        saveCopies(copies);
        setActiveCopyId('default');
    } else {
        // 迁移旧版单 key 数据
        const oldData = ls.get('resume-data', null);
        if (oldData) {
            try {
                const parsed = JSON.parse(oldData);
                const defaultCopy = copies.find(c => c.id === 'default');
                if (defaultCopy && parsed.name) {
                    defaultCopy.data.name = parsed.name || defaultCopy.data.name;
                    defaultCopy.data.subtitle = parsed.subtitle || defaultCopy.data.subtitle;
                    if (parsed.contacts) defaultCopy.data.contacts = parsed.contacts;
                    if (parsed.skills) defaultCopy.data.skills = parsed.skills;
                    if (parsed.about) defaultCopy.data.about = parsed.about;
                    saveCopies(copies);
                }
            } catch (e) { /* ignore */ }
            ls.remove('resume-data');
        }
    }

    const active = getActiveCopy();
    if (active) {
        populateResumeData(active.data);
    }
    refreshCopySelect();
    initCopyManagerUI();
}

function initCopyManagerUI() {
    const saveAsBtn = document.getElementById('btn-save-as');
    const deleteBtn = document.getElementById('btn-delete-copy');
    const copySelect = document.getElementById('copy-select');

    if (saveAsBtn) {
        saveAsBtn.addEventListener('click', () => {
            const name = prompt('请输入新副本名称：', '我的简历副本');
            if (name && name.trim()) {
                saveCopyAs(name.trim());
            }
        });
    }

    if (deleteBtn) {
        deleteBtn.addEventListener('click', () => {
            const copies = getCopies();
            if (!copies || copies.length <= 1) return;
            const activeId = getActiveCopyId();
            const active = copies.find(c => c.id === activeId);
            if (!active) return;
            if (confirm(`确定要删除副本「${active.name}」吗？此操作不可撤销。`)) {
                deleteCopy(activeId);
            }
        });
    }

    if (copySelect) {
        copySelect.addEventListener('change', () => {
            const newId = copySelect.value;
            if (newId !== getActiveCopyId()) {
                switchCopy(newId);
            }
        });
    }
}

function refreshCopySelect() {
    const select = document.getElementById('copy-select');
    const deleteBtn = document.getElementById('btn-delete-copy');
    if (!select) return;

    const copies = getCopies() || [];
    const activeId = getActiveCopyId();

    select.innerHTML = copies.map(c =>
        `<option value="${c.id}" ${c.id === activeId ? 'selected' : ''}>${escapeHtml(c.name)}</option>`
    ).join('');

    if (deleteBtn) {
        deleteBtn.disabled = copies.length <= 1;
    }
}

function collectFullResumeData() {

    return JSON.parse(JSON.stringify(DEFAULT_RESUME_DATA));

// ===== 核心渲染函数 =====
function populateResumeData(data) {
    if (!data) return;
    currentData = JSON.parse(JSON.stringify(data));
    currentData.savedAt = new Date().toISOString();

    const root = document.getElementById('resume-root');
    if (!root) return;

    const templateId = getCurrentTemplate();
    const template = TEMPLATES[templateId];
    if (!template) return;

    // 重新渲染（带异常保护）
    try {
        root.innerHTML = template.render(data);
    } catch(e) {
        console.error('Template render error:', e);
        root.innerHTML = '<p style="padding:40px;text-align:center;color:red">模板渲染出错，请重新加载页面</p>';
        return;
    }

    // 应用 CSS 变量
    const htmlRoot = document.documentElement;
    Object.entries(template.vars).forEach(([key, value]) => {
        htmlRoot.style.setProperty(key, value);
    });

    // 应用字体设置
    const typo = data.typography || { fontFamily: '', fontSize: 13, lineHeight: 'normal' };
    const container = root.querySelector('.container');
    if (container) {
        applyTypography(container, typo);
    }

    // 设置页面标题
    if (data.name) document.title = `个人简历 - ${data.name}`;

    // 刷新副本下拉选项
    refreshCopySelect();
}

function getCurrentTemplate() {

// ===== 副本 CRUD =====
function saveCopyAs(name) {
    const copies = getCopies() || [];
    const data = collectFullResumeData();
    const id = 'copy-' + Date.now();
    copies.push({
        id,
        name,
        data,
        createdAt: new Date().toISOString()
    });
    saveCopies(copies);
    setActiveCopyId(id);
    refreshCopySelect();
    showToast(`已创建副本「${name}」`);
}

function switchCopy(newId) {
    // 保存当前副本
    const currentId = getActiveCopyId();
    const copies = getCopies() || [];
    const current = copies.find(c => c.id === currentId);
    if (current && currentData) {
        current.data = JSON.parse(JSON.stringify(currentData));
        saveCopies(copies);
    }

    // 切换到新副本
    setActiveCopyId(newId);
    const active = copies.find(c => c.id === newId);
    if (active) {
        populateResumeData(active.data);
    }
    refreshCopySelect();
    showToast(`已切换到「${active ? active.name : '未知副本'}」`);
}

function deleteCopy(id) {
    let copies = getCopies() || [];
    if (copies.length <= 1) return;

    copies = copies.filter(c => c.id !== id);
    saveCopies(copies);

    if (getActiveCopyId() === id) {
        setActiveCopyId(copies[0].id);
        const active = copies[0];
        if (active) populateResumeData(active.data);
    }
    refreshCopySelect();
    showToast('副本已删除');
}

function escapeHtml(str) {
    const div = document.createElement('div');

    return div.innerHTML;
}

// ===== 安全 HTML 过滤（只允许白名单标签，用于富文本渲染） =====
function sanitizeHtml(html) {
    if (!html) return '';
    var div = document.createElement('div');
    div.innerHTML = html;
    var allowed = ['b','i','u','strong','em','span','font','p','br','ul','ol','li','img','svg','path','g','rect','circle','line','text','tspan','a'];
    function clean(node) {
        if (node.nodeType === 1) {
            var tag = node.tagName.toLowerCase();
            if (allowed.indexOf(tag) === -1) {
                while (node.firstChild) node.parentNode.insertBefore(node.firstChild, node);
                node.parentNode.removeChild(node);
                return;
            }
            var dangerous = ['onclick','onerror','onload','onmouseover','onchange','oninput','onfocus','onblur','onkeydown','onkeyup','onkeypress','onmousedown','onmouseup','onmousemove','onmouseout','onmouseenter','onmouseleave','onsubmit','onreset','onselect','onchange','ondblclick','oncontextmenu'];
            for (var a = 0; a < dangerous.length; a++) node.removeAttribute(dangerous[a]);
            if (tag === 'a') {
                var href = node.getAttribute('href');
                if (href && !href.startsWith('http') && !href.startsWith('https') && !href.startsWith('#')) {
                    node.removeAttribute('href');
                }
            }
            if (tag === 'img') {
                var src = node.getAttribute('src');
                if (src && !src.startsWith('data:') && !src.startsWith('http')) {
                    node.removeAttribute('src');
                }
            }
            Array.from(node.childNodes).forEach(clean);
        }
    }
    Array.from(div.childNodes).forEach(clean);
    return div.innerHTML;
}

function initRichToolbar(editorId) {
    var container = document.getElementById(editorId);
    if (!container) return;
    container.querySelectorAll('.rich-toolbar button[data-cmd]').forEach(function(btn) {
        btn.addEventListener('mousedown', function(e) {
            e.preventDefault();
            var editor = btn.closest('.rich-editor');
            var content = editor ? editor.querySelector('[contenteditable]') : null;
            if (content) content.focus();
            var cmd = btn.dataset.cmd;
            if (cmd === 'insertSVG') {
                var code = prompt('请输入SVG代码：', '<svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/></svg>');
                if (code) document.execCommand('insertHTML', false, sanitizeHtml(code));
            } else {
                document.execCommand(cmd, false, null);
            }
        });
    });
    container.querySelectorAll('.rich-toolbar select[data-cmd]').forEach(function(sel) {
        sel.addEventListener('change', function(e) {
            var editor = sel.closest('.rich-editor');
            var content = editor ? editor.querySelector('[contenteditable]') : null;
            if (content) content.focus();
            document.execCommand(sel.dataset.cmd, false, sel.value);
        });
    });
    container.querySelectorAll('.rich-toolbar input[type="color"][data-cmd]').forEach(function(inp) {
        inp.addEventListener('change', function(e) {
            var editor = inp.closest('.rich-editor');
            var content = editor ? editor.querySelector('[contenteditable]') : null;
            if (content) content.focus();
            document.execCommand('foreColor', false, inp.value);
        });
    });
}

function pointsToHtml(points) {
    return (points || []).map(function(p) { return '<p>' + sanitizeHtml(p) + '</p>'; }).join('');

function htmlToPoints(html) {
    var div = document.createElement('div');
    div.innerHTML = html;
    var result = [];
    div.querySelectorAll('p').forEach(function(p) {
        var t = p.innerHTML.trim();
        if (t) result.push(t);
    });
    if (result.length === 0) {
        var text = div.textContent.trim();
        if (text) result = text.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
    }
    return result;
}

window.handlePhotoFileSelect = function(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const url = e.target?.result;
        if (typeof url === 'string') {
            document.getElementById('edit-photo-url').value = url;
            updatePhotoPreview(url);
        }
    };
    reader.readAsDataURL(file);
};

function getPhotoRadius(shape) {
    var map = { circle: '50%', rounded: '8px', square: '0' };
    return map[shape] || '50%';
}

function getPhotoSizeValue(size) {
    var map = { small: null, medium: 150, large: 200 };
    return map[size] || null;
}

function getPhotoSizeStyle(size) {
    var px = getPhotoSizeValue(size);
    return px ? 'width:' + px + 'px;height:' + px + 'px;' : '';
}

window.updatePhotoPreview = function(url) {
    const preview = document.getElementById('edit-photo-preview');
    if (!preview) return;
    const show = document.getElementById('edit-photo-show');
    if (show && !show.checked) {
        preview.style.width = '48px';
        preview.style.height = '48px';
        preview.style.borderRadius = '50%';
        preview.innerHTML = '🚫 已隐藏';
        return;
    }
    const shape = document.getElementById('edit-photo-shape')?.value || 'circle';
    const size = document.getElementById('edit-photo-size')?.value || 'small';
    const radius = getPhotoRadius(shape);
    const px = getPhotoSizeValue(size);
    preview.style.borderRadius = radius;
    if (px) {
        preview.style.width = px + 'px';
        preview.style.height = px + 'px';
    } else {
        preview.style.width = '48px';
        preview.style.height = '48px';
    }
    if (url && url.trim()) {
        preview.innerHTML = `<img src="${escapeHtml(url.trim())}" style="width:100%;height:100%;object-fit:cover;border-radius:${radius}" />`;
    } else {
        preview.innerHTML = '📷';
    }
};

function saveEditorData() {
    const photoUrl = document.getElementById('edit-photo-url')?.value?.trim() || '';
    const fontFamily = document.getElementById('edit-font-family')?.value?.trim() || '';
    const fontSizeVal = parseInt(document.getElementById('edit-font-size')?.value) || 13;
    const lineHeight = document.getElementById('edit-line-height')?.value || 'normal';

    const data = {
        name: document.getElementById('edit-name')?.value?.trim() || '',
        subtitle: document.getElementById('edit-subtitle')?.value?.trim() || '',
        photo: photoUrl,
        photoShape: document.getElementById('edit-photo-shape')?.value || 'circle',
        photoSize: document.getElementById('edit-photo-size')?.value || 'small',
        showPhoto: document.getElementById('edit-photo-show')?.checked !== false,
        contacts: [],
        skills: [],
        languages: [],
        about: sanitizeHtml(document.getElementById('edit-about')?.innerHTML?.trim() || ''),
        experiences: [],
        education: [],
        projects: [],
        customSections: [],
        typography: {
            fontFamily: fontFamily,
            fontSize: fontSizeVal,
            lineHeight: lineHeight,
            primaryColor: document.getElementById('edit-color-primary')?.value || '',
            headingColor: document.getElementById('edit-color-heading')?.value || '',
            textColor: document.getElementById('edit-color-text')?.value || '',
            bgColor: document.getElementById('edit-color-bg')?.value || '',
            cardColor: document.getElementById('edit-color-card')?.value || ''
        }
    };

    document.querySelectorAll('#editor-contacts .form-row').forEach(row => {
        const icon = row.querySelector('.contact-icon')?.value?.trim() || '';
        const value = row.querySelector('.contact-value')?.value?.trim() || '';
        if (value) data.contacts.push({ icon, value });
    });

    document.querySelectorAll('#editor-skills .form-row').forEach(row => {
        const val = row.querySelector('.skill-value')?.value?.trim();
        if (val) data.skills.push(val);
    });

    document.querySelectorAll('#editor-languages .form-row').forEach(row => {
        const name = row.querySelector('.lang-name')?.value?.trim() || '';
        const level = row.querySelector('.lang-level')?.value?.trim() || '';
        if (name) data.languages.push({ name, level });
    });

    document.querySelectorAll('#editor-experiences .form-card').forEach(card => {
        var ptsEl = card.querySelector('.exp-points');
        var pts = ptsEl ? htmlToPoints(ptsEl.innerHTML) : [];
        data.experiences.push({
            title: card.querySelector('.exp-title')?.value?.trim() || '',
            company: card.querySelector('.exp-company')?.value?.trim() || '',
            date: card.querySelector('.exp-date')?.value?.trim() || '',
            points: pts
        });
    });

    document.querySelectorAll('#editor-educations .form-card').forEach(card => {
        data.education.push({
            title: card.querySelector('.edu-title')?.value?.trim() || '',
            school: card.querySelector('.edu-school')?.value?.trim() || '',
            date: card.querySelector('.edu-date')?.value?.trim() || '',
            note: card.querySelector('.edu-note')?.value?.trim() || ''
        });
    });

    document.querySelectorAll('#editor-projects .form-card').forEach(card => {
        var ptsEl = card.querySelector('.proj-points');
        var pts = ptsEl ? htmlToPoints(ptsEl.innerHTML) : [];
        data.projects.push({
            title: card.querySelector('.proj-title')?.value?.trim() || '',
            tech: card.querySelector('.proj-tech')?.value?.trim() || '',
            points: pts
        });
    });

    // 自定义区块
    data.customSections = [];
    document.querySelectorAll('#editor-custom-sections .form-card').forEach(card => {
        data.customSections.push({
            title: card.querySelector('.cs-title')?.value?.trim() || '',
            content: card.querySelector('.cs-content')?.value?.trim() || ''
        });
    });

    // 保存到当前副本
    const copies = getCopies() || [];
    const activeId = getActiveCopyId();
    const active = copies.find(c => c.id === activeId);
    if (active) {
        active.data = data;
        saveCopies(copies);
        populateResumeData(data);
        showToast('简历已保存');
    }
    closeEditorModal();
}

window.removeFormCard = function(btn, containerId) {
    const card = btn.closest('.form-card');
    const c = document.getElementById(containerId);
    if (c && card) { card.remove(); refreshMoveButtons(c); }
};

window.moveItem = function(btn, containerId, dir) {
    const card = btn.closest('.form-card');
    const c = document.getElementById(containerId);
    if (!c || !card) return;
    const cards = [...c.querySelectorAll('.form-card')];
    const idx = cards.indexOf(card);
    const target = idx + dir;
    if (target < 0 || target >= cards.length) return;
    if (dir < 0) c.insertBefore(card, cards[target]);
    else c.insertBefore(card, cards[target].nextSibling);
    refreshMoveButtons(c);
};

function refreshMoveButtons(container) {
    const cards = container.querySelectorAll('.form-card');
    cards.forEach((card, i) => {
        const up = card.querySelector('.btn-move-up');
        const down = card.querySelector('.btn-move-down');
        if (up) up.disabled = i === 0;
        if (down) down.disabled = i === cards.length - 1;
    });
}

// ===== Toast 提示 =====
function showToast(message) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    toast.style.cssText = `
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        color: white;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        z-index: 999;
        animation: fadeInUp 0.3s ease;
    `;

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
    }, 2000);
}

// ===== 一键配色预设按钮回调 =====
window.applyColorPreset = function(btn) {
    document.getElementById('edit-color-primary').value = btn.dataset.primary;
    document.getElementById('edit-color-heading').value = btn.dataset.heading;
    document.getElementById('edit-color-text').value = btn.dataset.text;
    document.getElementById('edit-color-bg').value = btn.dataset.bg;
    document.getElementById('edit-color-card').value = btn.dataset.card;
    // 实时预览应用到当前页面
    var typo = {
        primaryColor: btn.dataset.primary,
        headingColor: btn.dataset.heading,
        textColor: btn.dataset.text,
        bgColor: btn.dataset.bg,
        cardColor: btn.dataset.card
    };
    applyColors(typo);
    if (typeof showToast === 'function') showToast('已应用配色「' + btn.textContent + '」');
};

// ===== 应用全局配色到模板 =====
function applyColors(typo) {
    if (!typo) return;
    var root = document.documentElement;
    if (typo.primaryColor) root.style.setProperty('--primary', typo.primaryColor);
    if (typo.headingColor) root.style.setProperty('--heading', typo.headingColor);
    if (typo.textColor) root.style.setProperty('--text', typo.textColor);
    if (typo.bgColor) root.style.setProperty('--bg', typo.bgColor);
    if (typo.cardColor) root.style.setProperty('--white', typo.cardColor);
    // 根据背景色自动调整 primary-light
    if (typo.primaryColor) {
        root.style.setProperty('--primary-light', typo.primaryColor + '18');
    }
}

// ===== 字体/配色设置辅助函数 =====
function applyTypography(container, typo) {
    const lineHeightMap = { compact: '1.35', normal: '1.45', relaxed: '1.6' };
    // 自定义字体：设置到容器，子元素继承
    if (typo.fontFamily) {
        container.style.fontFamily = typo.fontFamily;
    }
    // 自定义字号：数字表示 px，直接应用到容器
    if (typo.fontSize && typeof typo.fontSize === 'number') {
        container.style.fontSize = typo.fontSize + 'px';
        // 强制标题、段落、列表等常见元素继承字号
        container.querySelectorAll('h1, h2, h3, h4, h5, h6, p, li, span, div, a').forEach(el => {
            el.style.fontSize = 'inherit';
        });
    }
    if (typo.lineHeight && lineHeightMap[typo.lineHeight]) {
        container.style.lineHeight = lineHeightMap[typo.lineHeight];
    }
    // 应用全局配色
    if (typo.primaryColor || typo.headingColor || typo.textColor || typo.bgColor || typo.cardColor) {
        applyColors(typo);
    }
}

// 注入 toast 动画样式 + --heading CSS 变量支持 + 一键配色按钮样式
const style = document.createElement('style');
style.textContent = `
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateX(-50%) translateY(10px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    /* --heading CSS 变量支持：所有标题默认使用 --heading，回退到 --text */
    .section-title,
    .sidebar-section h2,
    .sidebar h1, .sidebar h2,
    .fw-header h1,
    .cg-card h2,
    .vs-header h1,
    .pl-name, .pl-subtitle,
    .dt-header h1,
    .lg-name, .lg-subtitle,
    h1, h2, h3, h4 {
        color: var(--heading, var(--text)) !important;
    }
    .editor-section-title {
        color: var(--heading, var(--text));
    }
    .btn-preset:hover {
        opacity: 0.85;
        box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
`;
document.head.appendChild(style);
