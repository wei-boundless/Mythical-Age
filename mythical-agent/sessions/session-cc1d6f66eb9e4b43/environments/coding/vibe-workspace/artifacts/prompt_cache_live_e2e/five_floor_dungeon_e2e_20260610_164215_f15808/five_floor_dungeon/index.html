<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五层地下塔</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Microsoft YaHei', sans-serif; background: #0a0a1a; color: #ddd; height: 100vh; display: flex; flex-direction: column; }
  #game { display: flex; flex:1; }
  #left { width: 220px; background: #1a1a3e; padding: 15px; border-right: 2px solid #444; display: flex; flex-direction: column; }
  #left h3 { color: #ffcc00; margin-bottom: 10px; }
  .stat { margin: 6px 0; font-size: 14px; }
  .stat span { color: #66ccff; }
  #inventory { margin-top: 15px; font-size: 13px; }
  #inventory div { margin: 3px 0; }
  #map-container { flex:1; display: flex; align-items: center; justify-content: center; background: #0f0f2e; }
  #map { display: inline-grid; gap: 8px; padding: 20px; }
  .room { width: 70px; height: 70px; background: #2a2a5a; border: 2px solid #555; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: default; color: #aaa; }
  .room.current { border-color: #ffaa00; background: #4a3a1a; color: white; font-weight: bold; }
  .room.visited { background: #3a3a6a; }
  .room.connectable { border-color: #00ff88; cursor: pointer; }
  .room.stairs { background: #555500; }
  .room.cleared { background: #1a3a1a; }
  #right-panel { width: 250px; background: #1a1a3e; border-left: 2px solid #444; display: flex; flex-direction: column; }
  #log { flex:1; padding: 10px; overflow-y: auto; font-size: 12px; line-height: 1.5; background: #0a0a1a; }
  #action-area { padding: 10px; border-top: 1px solid #444; }
  .btn { background: #cc3366; border: none; color: white; padding: 8px 12px; margin: 3px; cursor: pointer; border-radius: 4px; font-size: 13px; }
  .btn:hover { background: #ee5588; }
  .btn:disabled { background: #555; cursor: not-allowed; }
  #combat-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 10; }
  #combat-box { background: #1a1a3e; border: 2px solid #ff5500; padding: 30px; border-radius: 10px; text-align: center; min-width: 300px; }
  #combat-box h2 { color: #ff5500; margin-bottom: 15px; }
  .hp-bar { background: #400; height: 16px; border-radius: 4px; margin: 5px 0; overflow: hidden; }
  .hp-fill { background: #e03030; height: 100%; }
  .stats-row { display: flex; justify-content: space-between; margin: 10px 0; }
</style>
</head>
<body>
<div id="game">
  <div id="left">
    <h3>冒险者</h3>
    <div class="stat">等级: <span id="level">1</span></div>
    <div class="stat">生命: <span id="hp">100</span>/<span id="maxHp">100</span></div>
    <div class="stat">攻击: <span id="atk">10</span></div>
    <div class="stat">防御: <span id="def">5</span></div>
    <div class="stat">金币: <span id="gold">0</span></div>
    <div class="stat">经验: <span id="xp">0</span></div>
    <div id="inventory">
      <strong>装备/物品:</strong>
      <div>武器: <span id="weapon">无</span></div>
      <div>护甲: <span id="armor">无</span></div>
      <div>药水: <span id="potions">0</span></div>
      <button class="btn" id="use-potion" onclick="usePotion()">使用药水</button>
    </div>
  </div>
  <div id="map-container">
    <div id="map"></div>
  </div>
  <div id="right-panel">
    <div id="log"></div>
    <div id="action-area">
      <button class="btn" id="descend-btn" onclick="descend()" style="display:none;">下楼梯</button>
    </div>
  </div>
</div>
<div id="combat-overlay" style="display:none;">
  <div id="combat-box">
    <h2 id="enemy-name"></h2>
    <div>敌人生命: <span id="enemy-hp"></span>/<span id="enemy-maxHp"></span></div>
    <div class="hp-bar"><div class="hp-fill" id="enemy-hp-bar" style="width:100%;"></div></div>
    <div>你的生命: <span id="combat-player-hp"></span>/<span id="combat-player-maxHp"></span></div>
    <div class="hp-bar"><div class="hp-fill" id="player-hp-bar" style="width:100%;"></div></div>
    <div class="stats-row">
      <button class="btn" id="attack-btn" onclick="playerAttack()">攻击</button>
      <button class="btn" onclick="playerDefend()">防御</button>
    </div>
    <div id="combat-log" style="font-size:12px; margin-top:10px; min-height:40px;"></div>
  </div>
</div>
<script>
(function() {
  const itemDB = {
    '铁剑': {type:'weapon', stat:5},
    '钢剑': {type:'weapon', stat:10},
    '魔杖': {type:'weapon', stat:15},
    '皮甲': {type:'armor', stat:5},
    '锁子甲': {type:'armor', stat:10},
    '治疗药水': {type:'potion', heal:30}
  };
  let player = {
    hp: 100, maxHp: 100, atk: 10, def: 5, level: 1, xp: 0, gold: 0,
    weapon: null, armor: null, potions: 0, inventory: []
  };
  let floorNum = 1;
  let currentFloor = null;
  let currentRoomId = null;
  let combatState = null; // {room, enemy, isDefending:false}

  function addLog(msg) {
    let log = document.getElementById('log');
    log.innerHTML += '<div>' + msg + '</div>';
    log.scrollTop = log.scrollHeight;
  }

  function equipItem(name) {
    let t = itemDB[name];
    if (!t) return;
    if (t.type === 'weapon') {
      if (player.weapon) { let old = itemDB[player.weapon]; if (old) player.atk -= old.stat; }
      player.weapon = name;
      player.atk += t.stat;
    } else if (t.type === 'armor') {
      if (player.armor) { let old = itemDB[player.armor]; if (old) player.def -= old.stat; }
      player.armor = name;
      player.def += t.stat;
    }
    player.inventory.push(name);
  }

  function usePotion() {
    if (player.potions <= 0) { addLog('没有药水！'); return; }
    if (player.hp >= player.maxHp) { addLog('生命已满'); return; }
    player.potions--;
    player.hp = Math.min(player.maxHp, player.hp + 30);
    addLog('使用治疗药水，恢复30生命');
    refreshUI();
  }

  function generateFloor(f) {
    let size = 4 + Math.floor(f/2);
    let roomCount = 5 + Math.floor(Math.random()*3);
    let rooms = [];
    let grid = Array.from({length:size}, ()=>Array(size).fill(null));
    grid[0][0] = {id:'start', x:0, y:0, type:'start', connections:[], visited:true, cleared:true};
    rooms.push(grid[0][0]);
    let stairs = {id:'stairs', x:size-1, y:size-1, type:'stairs', connections:[], visited:false, cleared:false};
    grid[size-1][size-1] = stairs;
    rooms.push(stairs);
    let attempts = 0;
    while (rooms.length < roomCount && attempts < 200) {
      let src = rooms[Math.floor(Math.random()*rooms.length)];
      let dirs = [[0,1],[1,0],[0,-1],[-1,0]].sort(()=>Math.random()-0.5);
      let placed = false;
      for (let [dx,dy] of dirs) {
        let nx = src.x+dx, ny = src.y+dy;
        if (nx>=0 && nx<size && ny>=0 && ny<size && grid[ny][nx]===null) {
          let type = Math.random()<0.15 ? 'treasure' : 'enemy';
          if (rooms.length === roomCount-1) type = 'enemy';
          let room = {id:'r'+rooms.length, x:nx, y:ny, type, connections:[], visited:false, cleared:false};
          src.connections.push(room.id);
          room.connections.push(src.id);
          grid[ny][nx] = room;
          rooms.push(room);
          placed = true;
          break;
        }
      }
      if (!placed) attempts++;
    }
    // ensure stairs connected
    if (stairs.connections.length === 0) {
      let nearest = null, minDist = Infinity;
      for (let r of rooms) {
        if (r.id === 'stairs') continue;
        let d = Math.abs(r.x-stairs.x)+Math.abs(r.y-stairs.y);
        if (d < minDist) { minDist = d; nearest = r; }
      }
      if (nearest) {
        nearest.connections.push('stairs');
        stairs.connections.push(nearest.id);
      }
    }
    // assign enemies/treasures
    for (let r of rooms) {
      if (r.type==='start'||r.type==='stairs') continue;
      if (r.type==='enemy') {
        let level = f + Math.floor(Math.random()*2);
        let names = ['骷髅兵','哥布林','暗影法师','石像鬼','食人魔'];
        let name = f===5 ? '魔王' : names[Math.floor(Math.random()*names.length)];
        r.enemy = {
          name, hp: 20+level*10, maxHp: 20+level*10,
          atk: 5+level*3, def: 2+level*2,
          xp: 10+level*5, gold: 5+level*5,
          drops: []
        };
        if (Math.random()<0.3) r.enemy.drops.push(['铁剑','钢剑','皮甲','治疗药水'][Math.floor(Math.random()*4)]);
      } else if (r.type==='treasure') {
        r.treasure = {
          gold: 10+f*5,
          items: Math.random()<0.4 ? [['治疗药水','铁剑','皮甲'][Math.floor(Math.random()*3)]] : []
        };
      }
    }
    return {rooms, size};
  }

  function startFloor(f) {
    floorNum = f;
    currentFloor = generateFloor(f);
    let start = currentFloor.rooms.find(r=>r.type==='start');
    currentRoomId = start.id;
    addLog('进入第 '+f+' 层');
    render();
  }

  function moveToRoom(roomId) {
    if (combatState) return;
    let room = currentFloor.rooms.find(r=>r.id===roomId);
    if (!room) return;
    let curRoom = currentFloor.rooms.find(r=>r.id===currentRoomId);
    if (!curRoom.connections.includes(roomId)) {
      addLog('无法到达那个房间');
      return;
    }
    room.visited = true;
    currentRoomId = roomId;
    if (room.type==='enemy' && !room.cleared) {
      startCombat(room);
    } else if (room.type==='treasure' && !room.cleared) {
      let t = room.treasure;
      player.gold += t.gold;
      for (let item of t.items) equipItem(item);
      room.cleared = true;
      addLog('发现宝箱：获得'+t.gold+'金币'+(t.items.length?'，物品：'+t.items.join('，'):''));
    }
    render();
  }

  function startCombat(room) {
    combatState = {room, enemy:{...room.enemy}, isDefending:false};
    document.getElementById('combat-overlay').style.display = 'flex';
    updateCombatUI();
  }

  function playerAttack() {
    if (!combatState) return;
    let cb = combatState;
    let dmg = Math.max(0, player.atk - cb.enemy.def + Math.floor(Math.random()*6));
    cb.enemy.hp -= dmg;
    let logEl = document.getElementById('combat-log');
    logEl.textContent = '你对 '+cb.enemy.name+' 造成 '+dmg+' 点伤害';
    if (cb.enemy.hp <= 0) {
      endCombat(true);
      return;
    }
    enemyTurn();
  }

  function playerDefend() {
    if (!combatState) return;
    combatState.isDefending = true;
    document.getElementById('combat-log').textContent = '你进入防御姿态，受到的伤害减半';
    enemyTurn();
    combatState.isDefending = false;
  }

  function enemyTurn() {
    let cb = combatState;
    if (!cb) return;
    let dmg = Math.max(0, cb.enemy.atk - player.def + Math.floor(Math.random()*6));
    if (cb.isDefending) dmg = Math.floor(dmg/2);
    player.hp -= dmg;
    document.getElementById('combat-log').textContent += ' --- '+cb.enemy.name+' 对你造成 '+dmg+' 点伤害';
    if (player.hp <= 0) {
      endCombat(false);
      return;
    }
    updateCombatUI();
  }

  function endCombat(victory) {
    let cb = combatState;
    combatState = null;
    document.getElementById('combat-overlay').style.display = 'none';
    let room = cb.room;
    if (victory) {
      room.cleared = true;
      player.xp += room.enemy.xp;
      player.gold += room.enemy.gold;
      for (let item of room.enemy.drops) equipItem(item);
      addLog('击败了 '+room.enemy.name+'！获得 '+room.enemy.xp+' 经验，'+room.enemy.gold+' 金币'+(room.enemy.drops.length?'，掉落：'+room.enemy.drops.join('，'):''));
      if (player.xp >= player.level*30) {
        player.level++;
        player.maxHp += 20;
        player.hp = player.maxHp;
        player.atk += 3;
        player.def += 2;
        player.xp = 0;
        addLog('升级！当前等级 '+player.level);
      }
    } else {
      addLog('你被打败了……游戏结束');
      alert('游戏结束，重新开始');
      player = {hp:100,maxHp:100,atk:10,def:5,level:1,xp:0,gold:0,weapon:null,armor:null,potions:0,inventory:[]};
      startFloor(1);
      return;
    }
    render();
  }

  function updateCombatUI() {
    let cb = combatState;
    if (!cb) return;
    document.getElementById('enemy-name').textContent = cb.enemy.name;
    document.getElementById('enemy-hp').textContent = cb.enemy.hp;
    document.getElementById('enemy-maxHp').textContent = cb.enemy.maxHp;
    document.getElementById('enemy-hp-bar').style.width = (cb.enemy.hp/cb.enemy.maxHp*100)+'%';
    document.getElementById('combat-player-hp').textContent = player.hp;
    document.getElementById('combat-player-maxHp').textContent = player.maxHp;
    document.getElementById('player-hp-bar').style.width = (player.hp/player.maxHp*100)+'%';
  }

  function descend() {
    let room = currentFloor.rooms.find(r=>r.id===currentRoomId);
    if (!room || room.type !== 'stairs') {
      addLog('你不在楼梯旁边');
      return;
    }
    if (floorNum >= 5) {
      alert('恭喜！你打败了魔王，获得自由！');
      addLog('胜利！');
      player = {hp:100,maxHp:100,atk:10,def:5,level:1,xp:0,gold:0,weapon:null,armor:null,potions:0,inventory:[]};
      startFloor(1);
      return;
    }
    startFloor(floorNum+1);
  }

  function refreshUI() {
    document.getElementById('level').textContent = player.level;
    document.getElementById('hp').textContent = player.hp;
    document.getElementById('maxHp').textContent = player.maxHp;
    document.getElementById('atk').textContent = player.atk;
    document.getElementById('def').textContent = player.def;
    document.getElementById('gold').textContent = player.gold;
    document.getElementById('xp').textContent = player.xp;
    document.getElementById('weapon').textContent = player.weapon || '无';
    document.getElementById('armor').textContent = player.armor || '无';
    document.getElementById('potions').textContent = player.potions;
    let curRoom = currentFloor.rooms.find(r=>r.id===currentRoomId);
    let isStairs = curRoom && curRoom.type==='stairs';
    document.getElementById('descend-btn').style.display = isStairs ? 'inline-block' : 'none';
  }

  function render() {
    refreshUI();
    let mapEl = document.getElementById('map');
    let size = currentFloor.size;
    mapEl.style.gridTemplateColumns = 'repeat('+size+', 1fr)';
    mapEl.style.gridTemplateRows = 'repeat('+size+', 1fr)';
    let html = '';
    for (let y=0; y<size; y++) {
      for (let x=0; x<size; x++) {
        let room = currentFloor.rooms.find(r=>r.x===x&&r.y===y);
        if (room) {
          let cls = 'room';
          let label = '';
          if (room.id === currentRoomId) { cls += ' current'; }
          if (room.visited && room.id!==currentRoomId) { cls += ' visited'; }
          if (room.type==='start') label = '入口';
          else if (room.type==='stairs') { label = '楼梯'; cls += ' stairs'; }
          else if (room.type==='enemy') { label = room.cleared ? '已清理' : '敌人'; if (room.cleared) cls += ' cleared'; }
          else if (room.type==='treasure') { label = room.cleared ? '宝箱(开)' : '宝箱'; if (!room.cleared) cls += ' connectable'; }
          let cur = currentFloor.rooms.find(r=>r.id===currentRoomId);
          if (cur && cur.connections.includes(room.id) && !room.visited) { cls += ' connectable'; }
          let onclick = '';
          if (cur && cur.connections.includes(room.id) && !room.visited) {
            onclick = 'moveToRoom(\''+room.id+'\')';
          } else if (cur && cur.connections.includes(room.id) && room.visited && room.type==='stairs') {
            onclick = 'moveToRoom(\''+room.id+'\')';
          }
          html += '<div class="'+cls+'" onclick="'+onclick+'">'+label+'</div>';
        } else {
          html += '<div></div>';
        }
      }
    }
    mapEl.innerHTML = html;
  }

  // expose globals
  window.moveToRoom = moveToRoom;
  window.playerAttack = playerAttack;
  window.playerDefend = playerDefend;
  window.descend = descend;
  window.usePotion = usePotion;

  startFloor(1);
})();
</script>
</body>
</html>
