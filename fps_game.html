<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 第一人称射击游戏 - 方案B自由瞄准</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 32px;
  height: 32px;
  pointer-events: none;
  z-index: 10;
}
#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.85);
}
#crosshair::before { top: 14px; left: 0; width: 32px; height: 4px; }
#crosshair::after  { top: 0; left: 14px; width: 4px; height: 32px; }
#crosshair .dot {
  position: absolute;
  top: 14px; left: 14px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(255,50,50,0.9);
}

#hud {
  position: absolute; top: 16px; left: 16px; color: #fff; font-size: 16px;
  z-index: 20; pointer-events: none; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
  line-height: 1.6;
}
#hud .health-bar {
  width: 200px; height: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.3);
  margin: 4px 0; border-radius: 2px; overflow: hidden;
}
#hud .health-fill { height: 100%; background: #e74c3c; transition: width 0.3s; }
#hud .ammo { color: #f1c40f; }

#message {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: #fff; font-size: 28px; z-index: 30; pointer-events: none;
  text-align: center; text-shadow: 2px 2px 6px rgba(0,0,0,0.9); display: none;
}

#overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 25;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-size: 20px;
}
#overlay button {
  margin-top: 20px; padding: 12px 36px; font-size: 20px; cursor: pointer;
  background: #e74c3c; color: #fff; border: none; border-radius: 4px;
}
#overlay button:hover { background: #c0392b; }
</style>
</head>
<body>

<div id="crosshair"><div class="dot"></div></div>

<div id="hud">
  <div>❤️ 生命值</div>
  <div class="health-bar"><div class="health-fill" style="width:100%"></div></div>
  <div>🔫 击杀: <span id="killCount">0</span></div>
  <div>🌊 波次: <span id="waveNum">1</span></div>
  <div class="ammo">🔋 弹药: <span id="ammoCount">30</span> / 30</div>
  <div>🔄 换弹中...</div>
</div>

<div id="message">按鼠标左键开始</div>
<div id="overlay">
  <div style="font-size:36px;margin-bottom:12px;">🎯 3D 第一人称射击</div>
  <div style="margin-bottom:8px;">准心自由移动 | 靠近边缘转动镜头</div>
  <div style="font-size:14px;color:#aaa;margin-bottom:6px;">WASD 移动 | 鼠标移动瞄准 | 左键射击 | R 换弹 | 空格跳跃</div>
  <button id="startBtn">开始游戏</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ==================== DOM 元素 ====================
const crosshairEl = document.getElementById('crosshair');
const messageEl  = document.getElementById('message');
const overlayEl  = document.getElementById('overlay');
const startBtn   = document.getElementById('startBtn');
const healthFill = document.querySelector('.health-fill');
const killCountEl = document.getElementById('killCount');
const waveNumEl   = document.getElementById('waveNum');
const ammoCountEl = document.getElementById('ammoCount');

// ==================== 常量 ====================
const PLAYER_RADIUS = 0.4;
const PLAYER_HEIGHT = 1.6;
const PLAYER_SPEED = 8;
const MOUSE_SENSITIVITY = 0.002;
const GRAVITY = 20;
const JUMP_VELOCITY = 8;
const MAX_AMMO = 30;
const RELOAD_TIME = 2.0;
const FIRE_RATE = 0.12;
const DAMAGE = 25;
const ENEMY_SPEED = 3.5;
const SPAWN_RADIUS_MIN = 12;
const SPAWN_RADIUS_MAX = 25;
const GROUND_Y = 0;

// 方案B：镜头边缘转动阈值（像素）
const EDGE_MARGIN = 60;
const EDGE_ROTATE_SPEED = 2.5;

// ==================== 游戏状态 ====================
const playerState = {
  health: 100,
  maxHealth: 100,
  kills: 0,
  wave: 1,
  score: 0,
  alive: true,
  velocity: new THREE.Vector3(),
  onGround: true,
  ammo: MAX_AMMO,
  reloading: false,
  reloadTimer: 0,
  fireCooldown: 0,
};

// 移动输入
const keys = {};

// ==================== 方案B：准心自由移动状态 ====================
const crosshairState = {
  // 准心在屏幕上的位置（像素，原点为屏幕左上角）
  screenX: window.innerWidth / 2,
  screenY: window.innerHeight / 2,
  // 准心偏离屏幕中心的比例（-1 到 1）
  offsetX: 0,
  offsetY: 0,
};

// ==================== Three.js 初始化 ====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, PLAYER_HEIGHT, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// 光照
const ambientLight = new THREE.AmbientLight(0x8899bb, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
sunLight.position.set(30, 40, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.left = -50;
sunLight.shadow.camera.right = 50;
sunLight.shadow.camera.top = 50;
sunLight.shadow.camera.bottom = -50;
sunLight.shadow.camera.far = 100;
scene.add(sunLight);

// ==================== 地面 ====================
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7d3a, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// 装饰格子线
const gridHelper = new THREE.GridHelper(100, 50, 0x44aa44, 0x338833);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ==================== 障碍物 ====================
const obstacles = [];
const obstacleGeos = [
  new THREE.BoxGeometry(2, 3, 2),
  new THREE.BoxGeometry(3, 1.5, 1.5),
  new THREE.CylinderGeometry(0.5, 0.5, 3, 8),
];

function createObstacle(x, z, geoIndex) {
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(Math.random() * 0.1 + 0.05, 0.3, 0.4 + Math.random() * 0.3),
    roughness: 0.7
  });
  const mesh = new THREE.Mesh(obstacleGeos[geoIndex % obstacleGeos.length], mat);
  mesh.position.set(x, (obstacleGeos[geoIndex % obstacleGeos.length].parameters.height || 1.5) / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = { isObstacle: true, radius: Math.max(
    (obstacleGeos[geoIndex % obstacleGeos.length].parameters.width || 1) / 2,
    (obstacleGeos[geoIndex % obstacleGeos.length].parameters.depth || 1) / 2
  ) * 1.3 };
  scene.add(mesh);
  obstacles.push(mesh);
  return mesh;
}

for (let i = 0; i < 18; i++) {
  const angle = (i / 18) * Math.PI * 2 + Math.random() * 0.5;
  const dist = 10 + Math.random() * 20;
  createObstacle(Math.cos(angle) * dist, Math.sin(angle) * dist, i);
}

// ==================== 武器模型 ====================
const gunGroup = new THREE.Group();
camera.add(gunGroup);
gunGroup.position.set(0.35, -0.28, -0.6);

const gunBodyGeo = new THREE.BoxGeometry(0.08, 0.15, 0.4);
const gunBodyMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.8 });
const gunBody = new THREE.Mesh(gunBodyGeo, gunBodyMat);
gunBody.position.y = 0.05;
gunGroup.add(gunBody);

const gunBarrelGeo = new THREE.CylinderGeometry(0.02, 0.025, 0.25, 8);
const gunBarrelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.9 });
const gunBarrel = new THREE.Mesh(gunBarrelGeo, gunBarrelMat);
gunBarrel.rotation.x = Math.PI / 2;
gunBarrel.position.set(0, 0.08, -0.3);
gunBarrel.name = 'gunBarrel';
gunGroup.add(gunBarrel);

const gunGripGeo = new THREE.BoxGeometry(0.05, 0.12, 0.08);
const gunGripMat = new THREE.MeshStandardMaterial({ color: 0x2a1f0e, roughness: 0.8 });
const gunGrip = new THREE.Mesh(gunGripGeo, gunGripMat);
gunGrip.position.set(0, -0.1, 0.02);
gunGrip.rotation.x = 0.2;
gunGroup.add(gunGrip);

// 枪口闪光
const muzzleFlashGeo = new THREE.SphereGeometry(0.04, 8, 8);
const muzzleFlashMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0 });
const muzzleFlash = new THREE.Mesh(muzzleFlashGeo, muzzleFlashMat);
muzzleFlash.position.set(0, 0.08, -0.42);
gunGroup.add(muzzleFlash);

// ==================== 敌人系统 ====================
const enemies = [];
const enemyGeo = new THREE.CapsuleGeometry(0.35, 1.2, 4, 8);
const enemyMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.6 });

// 敌人弹孔效果
const hitGeo = new THREE.SphereGeometry(0.08, 4, 4);
const hitMat = new THREE.MeshBasicMaterial({ color: 0xff4400 });

function spawnEnemy() {
  const angle = Math.random() * Math.PI * 2;
  const dist = SPAWN_RADIUS_MIN + Math.random() * (SPAWN_RADIUS_MAX - SPAWN_RADIUS_MIN);
  const x = camera.position.x + Math.cos(angle) * dist;
  const z = camera.position.z + Math.sin(angle) * dist;

  // 检查与障碍物的碰撞
  for (const obs of obstacles) {
    const dx = x - obs.position.x;
    const dz = z - obs.position.z;
    if (Math.sqrt(dx * dx + dz * dz) < obs.userData.radius + 1) return;
  }

  const enemy = new THREE.Mesh(enemyGeo, enemyMat);
  enemy.position.set(x, 0.9, z);
  enemy.castShadow = true;
  enemy.userData = {
    health: 100,
    speed: ENEMY_SPEED + Math.random() * 1.5 + playerState.wave * 0.3,
    damage: 8 + playerState.wave * 2,
    attackCooldown: 0,
    attackRate: 0.8,
  };
  scene.add(enemy);
  enemies.push(enemy);
}

function spawnWave() {
  const count = 4 + playerState.wave * 2;
  for (let i = 0; i < count; i++) {
    spawnEnemy();
  }
}

// ==================== 碰撞检测 ====================
function checkObstacleCollision(x, z, radius) {
  for (const obs of obstacles) {
    const dx = x - obs.position.x;
    const dz = z - obs.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < obs.userData.radius + radius) {
      return { hit: true, pushX: dx / dist * (obs.userData.radius + radius - dist), pushZ: dz / dist * (obs.userData.radius + radius - dist) };
    }
  }
  return { hit: false };
}

function checkEnemyObstacleCollision(enemy, dx, dz) {
  const newX = enemy.position.x + dx;
  const newZ = enemy.position.z + dz;
  for (const obs of obstacles) {
    const ox = newX - obs.position.x;
    const oz = newZ - obs.position.z;
    if (Math.sqrt(ox * ox + oz * oz) < obs.userData.radius + 0.5) return true;
  }
  // 检查与其他敌人的碰撞
  for (const other of enemies) {
    if (other === enemy) continue;
    const ex = newX - other.position.x;
    const ez = newZ - other.position.z;
    if (Math.sqrt(ex * ex + ez * ez) < 0.8) return true;
  }
  return false;
}

// ==================== 射线命中 ====================
function raycasterHitTest(origin, direction, maxDist = 100) {
  const raycaster = new THREE.Raycaster(origin, direction, 0.1, maxDist);
  const enemyIntersects = raycaster.intersectObjects(enemies);
  if (enemyIntersects.length > 0) {
    return { type: 'enemy', object: enemyIntersects[0].object, point: enemyIntersects[0].point };
  }
  const obstacleIntersects = raycaster.intersectObjects(obstacles);
  if (obstacleIntersects.length > 0) {
    return { type: 'obstacle', point: obstacleIntersects[0].point };
  }
  return null;
}

// ==================== HUD 更新 ====================
function updateHUD() {
  healthFill.style.width = (playerState.health / playerState.maxHealth * 100) + '%';
  killCountEl.textContent = playerState.kills;
  waveNumEl.textContent = playerState.wave;
  ammoCountEl.textContent = playerState.ammo + ' / ' + MAX_AMMO;
}

// ==================== 显示消息 ====================
let messageTimeout;
function showMessage(text, duration = 1500) {
  messageEl.textContent = text;
  messageEl.style.display = 'block';
  clearTimeout(messageTimeout);
  messageTimeout = setTimeout(() => { messageEl.style.display = 'none'; }, duration);
}

// ==================== 击杀计数 ====================
function onEnemyKilled(enemy) {
  // 生成弹孔效果
  const hitEffect = new THREE.Mesh(hitGeo, hitMat);
  hitEffect.position.copy(enemy.position);
  scene.add(hitEffect);
  setTimeout(() => scene.remove(hitEffect), 200);

  scene.remove(enemy);
  const idx = enemies.indexOf(enemy);
  if (idx !== -1) enemies.splice(idx, 1);

  playerState.kills++;
  playerState.score += 100;

  // 检查波次
  if (enemies.length === 0) {
    playerState.wave++;
    showMessage('🌊 第 ' + playerState.wave + ' 波！', 2000);
    setTimeout(spawnWave, 1000);
  }
  updateHUD();
}

// ==================== 方案B：更新准心与镜头 ====================
function updateCrosshairAndCamera(deltaTime) {
  // 准心自由移动 —— 使用鼠标累积偏移
  // mouseDX / mouseDY 在 mousemove 事件中累积

  // 读取并清零累积偏移
  const dx = window._mouseDX || 0;
  const dy = window._mouseDY || 0;
  window._mouseDX = 0;
  window._mouseDY = 0;

  // 更新准心屏幕位置
  crosshairState.screenX += dx;
  crosshairState.screenY += dy;

  // 钳制到屏幕范围内
  crosshairState.screenX = Math.max(0, Math.min(window.innerWidth, crosshairState.screenX));
  crosshairState.screenY = Math.max(0, Math.min(window.innerHeight, crosshairState.screenY));

  // 更新准心 DOM 元素位置
  crosshairEl.style.left = crosshairState.screenX + 'px';
  crosshairEl.style.top = crosshairState.screenY + 'px';
  crosshairEl.style.transform = 'translate(-50%, -50%)';

  // 计算准心偏离屏幕中心的比例
  const halfW = window.innerWidth / 2;
  const halfH = window.innerHeight / 2;
  crosshairState.offsetX = (crosshairState.screenX - halfW) / halfW;
  crosshairState.offsetY = (crosshairState.screenY - halfH) / halfH;

  // 镜头边缘转动：准心靠近边缘时转动相机
  const edgeX = crosshairState.screenX;
  const edgeY = crosshairState.screenY;

  let rotateH = 0;
  let rotateV = 0;

  if (edgeX < EDGE_MARGIN) {
    rotateH = -EDGE_ROTATE_SPEED * deltaTime * (1 - edgeX / EDGE_MARGIN);
  } else if (edgeX > window.innerWidth - EDGE_MARGIN) {
    rotateH = EDGE_ROTATE_SPEED * deltaTime * (1 - (window.innerWidth - edgeX) / EDGE_MARGIN);
  }

  if (edgeY < EDGE_MARGIN) {
    rotateV = EDGE_ROTATE_SPEED * deltaTime * (1 - edgeY / EDGE_MARGIN);
  } else if (edgeY > window.innerHeight - EDGE_MARGIN) {
    rotateV = -EDGE_ROTATE_SPEED * deltaTime * (1 - (window.innerHeight - edgeY) / EDGE_MARGIN);
  }

  // 应用镜头旋转
  if (rotateH !== 0) {
    camera.rotateY(-rotateH);
  }
  if (rotateV !== 0) {
    // 限制垂直旋转角度
    const currentRotX = camera.rotation.x;
    const newRotX = currentRotX + rotateV;
    if (newRotX > -Math.PI / 2.2 && newRotX < Math.PI / 2.2) {
      camera.rotateX(rotateV);
    }
  }
}

// ==================== 射击 ====================
function shoot() {
  if (playerState.reloading) return;
  if (playerState.fireCooldown > 0) return;
  if (playerState.ammo <= 0) {
    showMessage('🔋 弹药耗尽！按 R 换弹', 1200);
    return;
  }

  playerState.ammo--;
  playerState.fireCooldown = FIRE_RATE;

  // 枪口闪光
  muzzleFlash.material.opacity = 1;
  setTimeout(() => { muzzleFlash.material.opacity = 0; }, 50);

  // 后坐力动画
  gunGroup.position.z += 0.05;
  setTimeout(() => { gunGroup.position.z -= 0.05; }, 60);

  // 方案B：射击射线从准心实际屏幕位置发出
  // 将准心屏幕坐标转换为 NDC（归一化设备坐标，范围 -1 到 1）
  const ndcX = (crosshairState.screenX / window.innerWidth) * 2 - 1;
  const ndcY = -(crosshairState.screenY / window.innerHeight) * 2 + 1;

  // 使用 NDC 坐标设置 raycaster
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);

  const enemyIntersects = raycaster.intersectObjects(enemies);
  if (enemyIntersects.length > 0) {
    const enemy = enemyIntersects[0].object;
    enemy.userData.health -= DAMAGE;

    // 伤害闪烁
    enemy.material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6, emissive: 0xff0000, emissiveIntensity: 0.5 });
    setTimeout(() => {
      if (enemy.parent) enemy.material = enemyMat;
    }, 80);

    if (enemy.userData.health <= 0) {
      onEnemyKilled(enemy);
    }
  }

  // 如打到障碍物，显示火花
  const obstacleIntersects = raycaster.intersectObjects(obstacles);
  if (obstacleIntersects.length > 0 && enemyIntersects.length === 0) {
    const sparkGeo = new THREE.SphereGeometry(0.04, 4, 4);
    const sparkMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
    const spark = new THREE.Mesh(sparkGeo, sparkMat);
    spark.position.copy(obstacleIntersects[0].point);
    scene.add(spark);
    setTimeout(() => scene.remove(spark), 100);
  }

  updateHUD();

  // 自动换弹
  if (playerState.ammo <= 0) {
    startReload();
  }
}

// ==================== 换弹 ====================
function startReload() {
  if (playerState.reloading) return;
  if (playerState.ammo >= MAX_AMMO) return;

  playerState.reloading = true;
  playerState.reloadTimer = RELOAD_TIME;
  showMessage('🔄 换弹中...', 2000);
}

function finishReload() {
  playerState.reloading = false;
  playerState.ammo = MAX_AMMO;
  showMessage('✅ 装填完毕！', 1000);
  updateHUD();
}

// ==================== 玩家受伤 ====================
function damagePlayer(amount) {
  if (!playerState.alive) return;
  playerState.health -= amount;

  // 屏幕红闪效果
  renderer.domElement.style.filter = 'brightness(0.6) sepia(1) hue-rotate(-30deg)';
  setTimeout(() => { renderer.domElement.style.filter = ''; }, 150);

  if (playerState.health <= 0) {
    playerState.health = 0;
    playerState.alive = false;
    showMessage('💀 你阵亡了！点击重新开始', 3000);
    document.exitPointerLock();
    overlayEl.style.display = 'flex';
    startBtn.textContent = '重新开始';
  }
  updateHUD();
}

// ==================== 游戏循环 ====================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const deltaTime = Math.min(clock.getDelta(), 0.1);

  if (!playerState.alive) return;

  // 方案B：更新准心与镜头
  updateCrosshairAndCamera(deltaTime);

  // 更新冷却
  if (playerState.fireCooldown > 0) playerState.fireCooldown -= deltaTime;
  if (playerState.reloading) {
    playerState.reloadTimer -= deltaTime;
    if (playerState.reloadTimer <= 0) finishReload();
  }

  // 玩家移动
  const moveDir = new THREE.Vector3();
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();
  const right = new THREE.Vector3();
  right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

  if (keys['KeyW']) moveDir.add(forward);
  if (keys['KeyS']) moveDir.sub(forward);
  if (keys['KeyA']) moveDir.sub(right);
  if (keys['KeyD']) moveDir.add(right);

  if (moveDir.length() > 0) {
    moveDir.normalize();
    const newX = camera.position.x + moveDir.x * PLAYER_SPEED * deltaTime;
    const newZ = camera.position.z + moveDir.z * PLAYER_SPEED * deltaTime;

    const collision = checkObstacleCollision(newX, newZ, PLAYER_RADIUS);
    if (collision.hit) {
      camera.position.x += moveDir.x * PLAYER_SPEED * deltaTime + collision.pushX;
      camera.position.z += moveDir.z * PLAYER_SPEED * deltaTime + collision.pushZ;
    } else {
      camera.position.x = newX;
      camera.position.z = newZ;
    }
  }

  // 重力与跳跃
  if (!playerState.onGround) {
    playerState.velocity.y -= GRAVITY * deltaTime;
  }
  camera.position.y += playerState.velocity.y * deltaTime;
  if (camera.position.y <= PLAYER_HEIGHT) {
    camera.position.y = PLAYER_HEIGHT;
    playerState.velocity.y = 0;
    playerState.onGround = true;
  }

  if (keys['Space'] && playerState.onGround) {
    playerState.velocity.y = JUMP_VELOCITY;
    playerState.onGround = false;
  }

  // 限制玩家在地图范围内
  const MAP_BOUND = 48;
  camera.position.x = Math.max(-MAP_BOUND, Math.min(MAP_BOUND, camera.position.x));
  camera.position.z = Math.max(-MAP_BOUND, Math.min(MAP_BOUND, camera.position.z));

  // 更新敌人
  for (let i = enemies.length - 1; i >= 0; i--) {
    const enemy = enemies[i];
    const toPlayer = new THREE.Vector3(
      camera.position.x - enemy.position.x,
      0,
      camera.position.z - enemy.position.z
    );
    const dist = toPlayer.length();

    if (dist > 0.8) {
      toPlayer.normalize();
      const moveX = toPlayer.x * enemy.userData.speed * deltaTime;
      const moveZ = toPlayer.z * enemy.userData.speed * deltaTime;
      if (!checkEnemyObstacleCollision(enemy, moveX, moveZ)) {
        enemy.position.x += moveX;
        enemy.position.z += moveZ;
      }
      enemy.lookAt(camera.position.x, enemy.position.y, camera.position.z);
    }

    // 攻击玩家
    if (dist < 1.5) {
      enemy.userData.attackCooldown -= deltaTime;
      if (enemy.userData.attackCooldown <= 0) {
        damagePlayer(enemy.userData.damage);
        enemy.userData.attackCooldown = enemy.userData.attackRate;
      }
    }
  }

  // 渲染
  renderer.render(scene, camera);
  updateHUD();
}

// ==================== 输入处理 ====================
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (e.code === 'KeyR' && !playerState.reloading) {
    startReload();
  }
});
window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// ==================== 鼠标移动（累积偏移，供 updateCrosshairAndCamera 消费）====================
window._mouseDX = 0;
window._mouseDY = 0;

document.addEventListener('mousemove', (e) => {
  if (document.pointerLockElement === renderer.domElement) {
    window._mouseDX += e.movementX * 0.8;
    window._mouseDY += e.movementY * 0.8;
  }
});

// ==================== 射击 ====================
document.addEventListener('mousedown', (e) => {
  if (e.button === 0 && document.pointerLockElement === renderer.domElement && playerState.alive) {
    shoot();
  }
});

// ==================== PointerLock ====================
startBtn.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === renderer.domElement) {
    // 方案B：锁定指针后，重置准心到屏幕中央
    crosshairState.screenX = window.innerWidth / 2;
    crosshairState.screenY = window.innerHeight / 2;
    crosshairEl.style.left = crosshairState.screenX + 'px';
    crosshairEl.style.top = crosshairState.screenY + 'px';
    crosshairEl.style.transform = 'translate(-50%, -50%)';

    overlayEl.style.display = 'none';
    messageEl.style.display = 'none';

    // 重新开始逻辑
    if (!playerState.alive) {
      resetGame();
    }
  } else {
    if (playerState.alive) {
      overlayEl.style.display = 'flex';
    }
  }
});

// ==================== 重置游戏 ====================
function resetGame() {
  playerState.health = playerState.maxHealth;
  playerState.kills = 0;
  playerState.wave = 1;
  playerState.score = 0;
  playerState.alive = true;
  playerState.ammo = MAX_AMMO;
  playerState.reloading = false;
  playerState.reloadTimer = 0;
  playerState.fireCooldown = 0;
  playerState.velocity.set(0, 0, 0);
  playerState.onGround = true;

  camera.position.set(0, PLAYER_HEIGHT, 0);
  camera.rotation.set(0, 0, 0);

  // 清除敌人
  for (const enemy of enemies) {
    scene.remove(enemy);
  }
  enemies.length = 0;

  spawnWave();
  updateHUD();
}

// ==================== 窗口调整 ====================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);

  // 窗口变化后重设准心到中央
  crosshairState.screenX = window.innerWidth / 2;
  crosshairState.screenY = window.innerHeight / 2;
  crosshairEl.style.left = crosshairState.screenX + 'px';
  crosshairEl.style.top = crosshairState.screenY + 'px';
});

// ==================== 启动 ====================
spawnWave();
updateHUD();
animate();
</script>
</body>
</html>
