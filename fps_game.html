<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 第一人称射击游戏 - 自由瞄准</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#crosshair {
  position: absolute;
  top: 0px;
  left: 0px;
  width: 32px;
  height: 32px;
  pointer-events: none;
  z-index: 10;
  transition: none;
}
#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.85);
}
#crosshair::before { top: 14px; left: 0; width: 32px; height: 4px; }
#crosshair::after  { top: 0; left: 14px; width: 4px; height: 32px; }
#crosshair .dot {
  position: absolute;
  top: 14px; left: 14px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(255,50,50,0.9);
}

#hud {
  position: absolute; top: 16px; left: 16px; color: #fff; font-size: 16px;
  z-index: 20; pointer-events: none; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
  line-height: 1.6;
}
#hud .health-bar {
  width: 200px; height: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.3);
  margin: 4px 0; border-radius: 2px; overflow: hidden;
}
#hud .health-fill { height: 100%; background: #e74c3c; transition: width 0.3s; }
#hud .ammo { color: #f1c40f; }

#message {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: #fff; font-size: 28px; z-index: 30; pointer-events: none;
  text-align: center; text-shadow: 2px 2px 6px rgba(0,0,0,0.9); display: none;
}

#overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 25;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-size: 20px;
}
#overlay button {
  margin-top: 20px; padding: 12px 36px; font-size: 20px; cursor: pointer;
  background: #e74c3c; color: #fff; border: none; border-radius: 4px;
}
#overlay button:hover { background: #c0392b; }
</style>
</head>
<body>

<div id="crosshair"><div class="dot"></div></div>

<div id="hud">
  <div>❤️ 生命值</div>
  <div class="health-bar"><div class="health-fill" style="width:100%"></div></div>
  <div>🔫 击杀: <span id="killCount">0</span></div>
  <div>🌊 波次: <span id="waveNum">1</span></div>
  <div>⭐ Lv.<span id="levelNum">1</span> 经验: <span id="expBar">0</span>/<span id="expMax">100</span></div>
  <div>🔧 <span id="gunName">步枪</span> Lv.<span id="gunLevel">1</span></div>
  <div style="font-size:13px;color:#aaa;">1/2/3/4/5/6切枪 | V切换视角</div>
</div>

<div id="message">按鼠标左键开始</div>
<div id="overlay">
  <div style="font-size:36px;margin-bottom:12px;">🎯 3D 第一人称射击</div>
  <div style="margin-bottom:8px;">自由准心模式 | 10波挑战 | 每波敌人更强 | 枪械自动升级</div>
  <div style="font-size:14px;color:#aaa;margin-bottom:6px;">WASD 移动 | 鼠标瞄准 | 左键射击 | 空格跳跃 | 拾取掉落补给</div>
  <button id="startBtn">开始游戏</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ==================== DOM 元素 ====================
const crosshairEl = document.getElementById('crosshair');
const messageEl  = document.getElementById('message');
const overlayEl  = document.getElementById('overlay');
const startBtn   = document.getElementById('startBtn');
const healthFill = document.querySelector('.health-fill');
const killCountEl = document.getElementById('killCount');
const waveNumEl   = document.getElementById('waveNum');
// 无限子弹模式，移除弹药相关DOM
const gunLevelEl   = document.getElementById('gunLevel');

// ==================== 常量 ====================
const PLAYER_RADIUS = 0.4;
const PLAYER_HEIGHT = 1.6;
const PLAYER_SPEED = 14;
const MOUSE_SENSITIVITY = 0.002;
const GRAVITY = 20;
const JUMP_VELOCITY = 8;
const ENEMY_SPEED = 3.5;
const SPAWN_RADIUS_MIN = 12;
const SPAWN_RADIUS_MAX = 25;
const GROUND_Y = 0;
const EDGE_MARGIN = 80;
const EDGE_ROTATE_SPEED = 0.02;
const MAP_BOUNDARY = 55;
const EXP_PER_KILL = 35;
const EXP_PER_LEVEL = 60;
const PICKUP_HEAL_AMOUNT = 25;
const PICKUP_DROP_CHANCE = 0.35;

// ==================== 枪械配置 ====================
const GUN_TYPES = {
  pistol: { name: '🔫 手枪', fireRate: 0.18, damage: 22, spread: 0.008, bulletsPerShot: 1, color: 0x888888, range: 60 },
  rifle: { name: '🔧 步枪', fireRate: 0.07, damage: 16, spread: 0.015, bulletsPerShot: 1, color: 0x3366cc, range: 80 },
  shotgun: { name: '💥 霰弹枪', fireRate: 0.35, damage: 14, spread: 0.07, bulletsPerShot: 6, color: 0xcc6633, range: 40 },
  smg: { name: '⚡ 冲锋枪', fireRate: 0.05, damage: 11, spread: 0.025, bulletsPerShot: 1, color: 0x66cc33, range: 50 },
  sniper: { name: '🎯 狙击枪', fireRate: 0.8, damage: 60, spread: 0.002, bulletsPerShot: 1, color: 0x9944cc, range: 120 },
  rocket: { name: '🚀 火箭炮', fireRate: 1.2, damage: 80, spread: 0.005, bulletsPerShot: 1, color: 0xff4422, range: 100, explosiveRadius: 5 },
};
const GUN_KEYS = Object.keys(GUN_TYPES);

// 火箭炮系统
const ROCKET_SPEED = 35;
const ROCKET_EXPLOSION_RADIUS = 5;
const rockets = [];
const particles = [];

// 安全据点
const SAFE_ZONE_CENTER = new THREE.Vector3(0, 0, 0);
const SAFE_ZONE_RADIUS = 3.0;
const SAFE_ZONE_HEAL_PER_SEC = 3;

// ==================== 游戏状态 ====================
const playerState = {
  health: 100,
  maxHealth: 100,
  kills: 0,
  wave: 1,
  score: 0,
  level: 1,
  exp: 0,
  alive: true,
  velocity: new THREE.Vector3(),
  onGround: true,
  fireCooldown: 0,
  currentGun: 'rifle',
  gunLevel: 1,
  isThirdPerson: false,
  waveSpawning: false,
  unlockedGuns: ['pistol', 'rifle', 'shotgun', 'smg', 'sniper', 'rocket'],
  playerPos: new THREE.Vector3(0, PLAYER_HEIGHT, 0),
};

const crosshairState = {
  x: window.innerWidth / 2,
  y: window.innerHeight / 2,
  rawX: window.innerWidth / 2,
  rawY: window.innerHeight / 2,
  enabled: false,
  minX: EDGE_MARGIN,
  minY: EDGE_MARGIN,
  maxX: window.innerWidth - EDGE_MARGIN,
  maxY: window.innerHeight - EDGE_MARGIN,
};

// 移动输入
const keys = {};

// ==================== Three.js 初始化 ====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, PLAYER_HEIGHT, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// 光照
const ambientLight = new THREE.AmbientLight(0x8899bb, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
sunLight.position.set(30, 40, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.left = -50;
sunLight.shadow.camera.right = 50;
sunLight.shadow.camera.top = 50;
sunLight.shadow.camera.bottom = -50;
sunLight.shadow.camera.far = 100;
scene.add(sunLight);

// ==================== 地面与地形 ====================
// 移除旧的单一地面和格子线，创建多个颜色区块 terrainTiles
const terrainTiles = [];
const tileSize = 12;
const gridHalf = 5; // 网格半径？从 -5*12 到 +5*12 覆盖约 60x60 范围
const terrainColors = [
  0x4a8c4a, // 深绿
  0x6b8e23, // 橄榄绿
  0x8b7355, // 土黄
  0x778899, // 灰石
  0x3b7a3b, // 另一种绿
  0x9b8c6b, // 浅褐
];
for (let i = -gridHalf; i <= gridHalf; i++) {
  for (let j = -gridHalf; j <= gridHalf; j++) {
    const color = terrainColors[Math.floor(Math.random() * terrainColors.length)];
    const geo = new THREE.PlaneGeometry(tileSize, tileSize);
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.9 });
    const tile = new THREE.Mesh(geo, mat);
    tile.rotation.x = -Math.PI / 2;
    tile.position.set(i * tileSize, 0.005, j * tileSize);
    tile.receiveShadow = true;
    scene.add(tile);
    terrainTiles.push(tile);
  }
}

// ==================== 树木和岩石装饰（无碰撞，仅视觉） ====================
function createTree(x, z) {
  const treeGroup = new THREE.Group();
  // 树干
  const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 2.0, 8);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.8 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 1.0;
  trunk.castShadow = true;
  trunk.receiveShadow = true;
  treeGroup.add(trunk);
  // 树冠（多层球体）
  const crownMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.7 });
  const crown1 = new THREE.Mesh(new THREE.SphereGeometry(0.7, 8, 6), crownMat);
  crown1.position.y = 2.0;
  crown1.castShadow = true;
  treeGroup.add(crown1);
  const crown2 = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 6), crownMat);
  crown2.position.y = 2.6;
  crown2.castShadow = true;
  treeGroup.add(crown2);
  treeGroup.position.set(x, 0, z);
  scene.add(treeGroup);
  return treeGroup;
}

function createRock(x, z) {
  const scale = 0.5 + Math.random() * 0.8;
  const geo = new THREE.IcosahedronGeometry(0.5, 0);
  const mat = new THREE.MeshStandardMaterial({ color: 0x808080, roughness: 0.8 });
  const rock = new THREE.Mesh(geo, mat);
  rock.position.set(x, 0.3 * scale, z);
  rock.scale.set(scale, scale * 0.6, scale);
  rock.castShadow = true;
  rock.receiveShadow = true;
  scene.add(rock);
  return rock;
}

// 散布树木和岩石
for (let i = 0; i < 20; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 8 + Math.random() * 18;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist;
  createTree(x, z);
}
for (let i = 0; i < 25; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 10 + Math.random() * 20;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist;
  createRock(x, z);
}

// ==================== 障碍物（增至30，添加树木和岩石类型） ====================
const obstacles = [];
const obstacleGeos = [
  { kind: 'box', geo: new THREE.BoxGeometry(2, 3, 2) },
  { kind: 'box', geo: new THREE.BoxGeometry(3, 1.5, 1.5) },
  { kind: 'cylinder', geo: new THREE.CylinderGeometry(0.5, 0.5, 3, 8) },
  { kind: 'icosahedron', geo: new THREE.IcosahedronGeometry(0.8, 0) }, // 岩石
  { kind: 'cone', geo: new THREE.ConeGeometry(0.6, 2.5, 8) }, // 石笋
];

function createObstacle(x, z, configIndex) {
  const config = obstacleGeos[configIndex % obstacleGeos.length];
  const mat = new THREE.MeshStandardMaterial({
    color: config.kind === 'icosahedron' || config.kind === 'cone' ? 0x707070 : new THREE.Color().setHSL(Math.random() * 0.1 + 0.05, 0.3, 0.4 + Math.random() * 0.3),
    roughness: 0.7
  });
  const mesh = new THREE.Mesh(config.geo, mat);
  const height = config.kind === 'icosahedron' ? 1.0 : (config.geo.parameters.height || 1.5);
  mesh.position.set(x, height / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = {
    isObstacle: true,
    radius: Math.max(
      (config.geo.parameters.width || 0.8) / 2,
      (config.geo.parameters.depth || 0.8) / 2,
      0.5
    ) * 1.3
  };
  scene.add(mesh);
  obstacles.push(mesh);
  return mesh;
}

// 生成30个障碍物
for (let i = 0; i < 30; i++) {
  const angle = (i / 30) * Math.PI * 2 + Math.random() * 0.5;
  const dist = 10 + Math.random() * 20;
  createObstacle(Math.cos(angle) * dist, Math.sin(angle) * dist, i);
}

// ==================== 安全据点 ====================
const safeZoneGroup = new THREE.Group();
safeZoneGroup.position.copy(SAFE_ZONE_CENTER);
scene.add(safeZoneGroup);

// 底座柱体
const pillarGeo = new THREE.CylinderGeometry(1.8, 2.0, 0.5, 16);
const pillarMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.5, metalness: 0.8 });
const pillar = new THREE.Mesh(pillarGeo, pillarMat);
pillar.position.y = 0.25;
pillar.castShadow = true;
pillar.receiveShadow = true;
safeZoneGroup.add(pillar);

// 顶部半透明穹顶
const domeGeo = new THREE.SphereGeometry(2.0, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
const domeMat = new THREE.MeshStandardMaterial({
  color: 0x66ccff,
  emissive: 0x224466,
  emissiveIntensity: 0.8,
  transparent: true,
  opacity: 0.5,
  roughness: 0.3,
  metalness: 0.2
});
const dome = new THREE.Mesh(domeGeo, domeMat);
dome.position.y = 0.5;
safeZoneGroup.add(dome);

// 光柱效果（竖直圆柱，发光透明）
const beamGeo = new THREE.CylinderGeometry(0.5, 0.5, 8, 8);
const beamMat = new THREE.MeshBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3 });
const beam = new THREE.Mesh(beamGeo, beamMat);
beam.position.y = 4.5;
safeZoneGroup.add(beam);

// 顶部光点
const lightPointGeo = new THREE.SphereGeometry(0.4, 8, 8);
const lightPointMat = new THREE.MeshBasicMaterial({ color: 0xaaddff });
const lightPoint = new THREE.Mesh(lightPointGeo, lightPointMat);
lightPoint.position.y = 8.5;
safeZoneGroup.add(lightPoint);

// ==================== 武器模型 ====================
const gunGroup = new THREE.Group();
camera.add(gunGroup);
gunGroup.position.set(0.35, -0.28, -0.6);

const gunBodyGeo = new THREE.BoxGeometry(0.08, 0.15, 0.4);
const gunBodyMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.8 });
const gunBody = new THREE.Mesh(gunBodyGeo, gunBodyMat);
gunBody.position.y = 0.05;
gunGroup.add(gunBody);

const gunBarrelGeo = new THREE.CylinderGeometry(0.02, 0.025, 0.25, 8);
const gunBarrelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.9 });
const gunBarrel = new THREE.Mesh(gunBarrelGeo, gunBarrelMat);
gunBarrel.rotation.x = Math.PI / 2;
gunBarrel.position.set(0, 0.08, -0.3);
gunBarrel.name = 'gunBarrel';
gunGroup.add(gunBarrel);

const gunGripGeo = new THREE.BoxGeometry(0.05, 0.12, 0.08);
const gunGripMat = new THREE.MeshStandardMaterial({ color: 0x2a1f0e, roughness: 0.8 });
const gunGrip = new THREE.Mesh(gunGripGeo, gunGripMat);
gunGrip.position.set(0, -0.1, 0.02);
gunGrip.rotation.x = 0.2;
gunGroup.add(gunGrip);

// 枪口闪光
const muzzleFlashGeo = new THREE.SphereGeometry(0.04, 8, 8);
const muzzleFlashMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0 });
const muzzleFlash = new THREE.Mesh(muzzleFlashGeo, muzzleFlashMat);
muzzleFlash.position.set(0, 0.08, -0.42);
gunGroup.add(muzzleFlash);

// ==================== 掉落物系统 ====================
const pickups = [];

// ==================== 敌人系统 ====================
const enemies = [];
const flyingEnemies = [];
// 提升段数为 (8, 16)
const enemyGeo = new THREE.CapsuleGeometry(0.35, 1.2, 8, 16);
const enemyMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.6 });

// 敌人弹孔效果
const hitGeo = new THREE.SphereGeometry(0.08, 4, 4);
const hitMat = new THREE.MeshBasicMaterial({ color: 0xff4400 });

function spawnEnemy() {
  const angle = Math.random() * Math.PI * 2;
  const dist = SPAWN_RADIUS_MIN + Math.random() * (SPAWN_RADIUS_MAX - SPAWN_RADIUS_MIN);
  const x = camera.position.x + Math.cos(angle) * dist;
  const z = camera.position.z + Math.sin(angle) * dist;

  // 安全据点排斥检查
  if (Math.sqrt(x * x + z * z) < SAFE_ZONE_RADIUS + 1) return;

  for (const obs of obstacles) {
    const dx = x - obs.position.x;
    const dz = z - obs.position.z;
    if (Math.sqrt(dx * dx + dz * dz) < obs.userData.radius + 1) return;
  }

  const waveScale = playerState.wave;
  const mat = enemyMat.clone();
  // 递进颜色：从红色到橙色到紫红
  const hue = (0.0 - (waveScale - 1) * 0.05) % 1;
  mat.color.setHSL((hue + 1) % 1, 0.7, 0.3 + waveScale * 0.02);

  // 体型微调：每波增大 3%
  const scaleFactor = 1.0 + waveScale * 0.03;

  const enemy = new THREE.Mesh(enemyGeo, mat);
  enemy.position.set(x, 0.9, z);
  enemy.scale.set(scaleFactor, scaleFactor, scaleFactor);
  enemy.castShadow = true;
  enemy.userData = {
    health: 80 + waveScale * 30,
    maxHealth: 80 + waveScale * 30,
    speed: ENEMY_SPEED + Math.random() * 1.5 + waveScale * 0.5,
    damage: 6 + waveScale * 3,
    attackCooldown: 0,
    attackRate: Math.max(0.3, 0.8 - waveScale * 0.04),
  };

  // 添加眼睛
  const eyeGeo = new THREE.SphereGeometry(0.08, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
  leftEye.position.set(-0.15, 1.35, 0.3);
  enemy.add(leftEye);
  const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
  rightEye.position.set(0.15, 1.35, 0.3);
  enemy.add(rightEye);
  // 瞳孔（小黑球）
  const pupilGeo = new THREE.SphereGeometry(0.04, 4, 4);
  const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
  leftPupil.position.set(-0.15, 1.35, 0.36);
  enemy.add(leftPupil);
  const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
  rightPupil.position.set(0.15, 1.35, 0.36);
  enemy.add(rightPupil);

  // 添加手臂
  const armGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.6, 6);
  const armMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.7 });
  const leftArm = new THREE.Mesh(armGeo, armMat);
  leftArm.position.set(-0.4, 1.1, 0);
  leftArm.rotation.z = -0.3;
  enemy.add(leftArm);
  const rightArm = new THREE.Mesh(armGeo, armMat);
  rightArm.position.set(0.4, 1.1, 0);
  rightArm.rotation.z = 0.3;
  enemy.add(rightArm);

  scene.add(enemy);
  enemies.push(enemy);
}

function spawnFlyingEnemy() {
  const angle = Math.random() * Math.PI * 2;
  const dist = SPAWN_RADIUS_MIN + Math.random() * (SPAWN_RADIUS_MAX - SPAWN_RADIUS_MIN);
  const x = camera.position.x + Math.cos(angle) * dist;
  const z = camera.position.z + Math.sin(angle) * dist;

  // 安全据点排斥检查
  if (Math.sqrt(x * x + z * z) < SAFE_ZONE_RADIUS + 1) return;

  const waveScale = playerState.wave;
  const bodyGeo = new THREE.SphereGeometry(0.5, 8, 8);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(0.15, 0.8, 0.4 + waveScale * 0.02),
    roughness: 0.4,
    emissive: 0x442200,
    emissiveIntensity: 0.3,
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.set(x, 3 + Math.random() * 4, z);
  body.castShadow = true;

  // 翅膀
  const wingGeo = new THREE.PlaneGeometry(1.2, 0.4);
  const wingMat = new THREE.MeshStandardMaterial({
    color: 0xcc8844,
    transparent: true,
    opacity: 0.7,
    side: THREE.DoubleSide,
  });
  const leftWing = new THREE.Mesh(wingGeo, wingMat);
  leftWing.position.set(-0.6, 0, 0);
  leftWing.rotation.z = 0.3;
  body.add(leftWing);
  const rightWing = new THREE.Mesh(wingGeo, wingMat);
  rightWing.position.set(0.6, 0, 0);
  rightWing.rotation.z = -0.3;
  body.add(rightWing);

  // 眼睛
  const eyeGeo = new THREE.SphereGeometry(0.1, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff4400 });
  const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
  leftEye.position.set(-0.2, 0.1, 0.45);
  body.add(leftEye);
  const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
  rightEye.position.set(0.2, 0.1, 0.45);
  body.add(rightEye);

  const scaleFactor = 1.0 + waveScale * 0.03;
  body.scale.set(scaleFactor, scaleFactor, scaleFactor);
  body.userData = {
    health: 60 + waveScale * 20,
    maxHealth: 60 + waveScale * 20,
    speed: 2.5 + Math.random() * 1.5 + waveScale * 0.3,
    damage: 5 + waveScale * 2,
    attackCooldown: 0,
    attackRate: Math.max(0.5, 1.0 - waveScale * 0.03),
    isFlying: true,
    flyAmplitude: 0.3 + Math.random() * 0.3,
    flySpeed: 1.0 + Math.random() * 0.5,
    baseY: body.position.y,
  };

  scene.add(body);
  flyingEnemies.push(body);
}

function spawnWave() {
  // 无限模式：无最大波次限制
  const groundCount = 2 + playerState.wave * 1;
  for (let i = 0; i < groundCount; i++) {
    spawnEnemy();
  }
  // 空中怪物：每波至少1个，波次越高越多
  const flyingCount = 1 + Math.floor(playerState.wave / 2);
  for (let i = 0; i < flyingCount; i++) {
    spawnFlyingEnemy();
  }
  showMessage(`🌊 第 ${playerState.wave} 波！${groundCount}个地面 + ${flyingCount}个空中敌人`, 2500);
  updateHUD();
}

// ==================== 掉落物生成 ====================
function spawnPickup(pos, type) {
  const geo = type === 'heal'
    ? new THREE.SphereGeometry(0.5, 8, 8)  // 半径从 0.3 增大到 0.5
    : new THREE.BoxGeometry(0.5, 0.2, 0.5); // 尺寸增大
  const mat = new THREE.MeshStandardMaterial({
    color: type === 'heal' ? 0x44ff44 : 0xffcc00,
    emissive: type === 'heal' ? 0x44ff44 : 0xff8800, // 治疗包 emissive 改为亮绿，弹药包改为橙色
    emissiveIntensity: 2.0,
    roughness: 0.3
  });
  const pickup = new THREE.Mesh(geo, mat);
  pickup.position.set(pos.x, 0.5, pos.z);
  pickup.castShadow = true;
  pickup.userData = {
    type: type,
    bobOffset: Math.random() * Math.PI * 2,
    lifetime: 25,
  };
  scene.add(pickup);
  pickups.push(pickup);
}

// ==================== 碰撞检测 ====================
function checkObstacleCollision(x, z, radius) {
  for (const obs of obstacles) {
    const dx = x - obs.position.x;
    const dz = z - obs.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < obs.userData.radius + radius) {
      return { hit: true, pushX: dx / dist * (obs.userData.radius + radius - dist), pushZ: dz / dist * (obs.userData.radius + radius - dist) };
    }
  }
  return { hit: false };
}

function checkEnemyObstacleCollision(enemy, dx, dz) {
  const newX = enemy.position.x + dx;
  const newZ = enemy.position.z + dz;
  for (const obs of obstacles) {
    const ox = newX - obs.position.x;
    const oz = newZ - obs.position.z;
    if (Math.sqrt(ox * ox + oz * oz) < obs.userData.radius + 0.5) return true;
  }
  for (const other of enemies) {
    if (other === enemy) continue;
    const ex = newX - other.position.x;
    const ez = newZ - other.position.z;
    if (Math.sqrt(ex * ex + ez * ez) < 0.8) return true;
  }
  return false;
}

// ==================== 准心状态与边界更新 ====================
function updateCrosshairBounds() {
  const sx = window.innerWidth;
  const sy = window.innerHeight;
  crosshairState.minX = EDGE_MARGIN;
  crosshairState.minY = EDGE_MARGIN;
  crosshairState.maxX = sx - EDGE_MARGIN;
  crosshairState.maxY = sy - EDGE_MARGIN;
  crosshairState.x = Math.max(crosshairState.minX, Math.min(crosshairState.maxX, crosshairState.x));
  crosshairState.y = Math.max(crosshairState.minY, Math.min(crosshairState.maxY, crosshairState.y));
}

function updateCrosshairPosition() {
  crosshairEl.style.left = (crosshairState.x - 16) + 'px';
  crosshairEl.style.top = (crosshairState.y - 16) + 'px';
}

// ==================== 准心与镜头更新（自由移动 + 边缘转动） ====================
function updateCrosshairAndCamera() {
  if (!crosshairState.enabled || !playerState.alive) return;

  const sx = window.innerWidth;
  const sy = window.innerHeight;
  const margin = EDGE_MARGIN;

  let nx = (crosshairState.x - sx / 2) / (sx / 2);
  let ny = (crosshairState.y - sy / 2) / (sy / 2);
  nx = Math.max(-1, Math.min(1, nx));
  ny = Math.max(-1, Math.min(1, ny));

  // 边缘转动: 使用 rawX/rawY 计算边缘距离（真实鼠标位置）
  const edgeDistX = Math.max(0, Math.abs(crosshairState.rawX - sx / 2) - (sx / 2 - margin)) / margin;
  const edgeDistY = Math.max(0, Math.abs(crosshairState.rawY - sy / 2) - (sy / 2 - margin)) / margin;

  if (edgeDistX > 0) {
    const sign = crosshairState.rawX > sx / 2 ? 1 : -1;
    const speed = edgeDistX * EDGE_ROTATE_SPEED;
    camera.rotation.y -= sign * speed;
  }
  if (edgeDistY > 0) {
    const sign = crosshairState.rawY > sy / 2 ? -1 : 1;
    const speed = edgeDistY * EDGE_ROTATE_SPEED;
    camera.rotation.x += sign * speed;
    camera.rotation.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, camera.rotation.x));
  }

  updateCrosshairBounds();
  updateCrosshairPosition();
}

// ==================== 射线命中 ====================
function raycasterHitTest(origin, direction, maxDist = 100) {
  const raycaster = new THREE.Raycaster(origin, direction, 0.1, maxDist);
  const allEnemyTargets = [...enemies, ...flyingEnemies];
  const enemyIntersects = raycaster.intersectObjects(allEnemyTargets);
  if (enemyIntersects.length > 0) {
    return { type: 'enemy', object: enemyIntersects[0].object, point: enemyIntersects[0].point };
  }
  const obstacleIntersects = raycaster.intersectObjects(obstacles);
  if (obstacleIntersects.length > 0) {
    return { type: 'obstacle', point: obstacleIntersects[0].point };
  }
  return null;
}

// ==================== HUD 更新 ====================
function updateHUD() {
  healthFill.style.width = (playerState.health / playerState.maxHealth * 100) + '%';
  killCountEl.textContent = playerState.kills;
  waveNumEl.textContent = playerState.wave;
  document.getElementById('levelNum').textContent = playerState.level;

// ==================== 显示消息 ====================
let messageTimeout;
function showMessage(text, duration = 2000) {
  messageEl.textContent = text;
  messageEl.style.display = 'block';
  clearTimeout(messageTimeout);
  messageTimeout = setTimeout(() => { messageEl.style.display = 'none'; }, duration);

// ==================== 射击（无限子弹，多枪械） ====================
function shoot() {
  if (!playerState.alive || playerState.fireCooldown > 0) return;

  const gun = GUN_TYPES[playerState.currentGun];
  const levelBonus = (playerState.gunLevel - 1) * 5;
  playerState.fireCooldown = gun.fireRate;

  // 枪口闪光
  muzzleFlash.material.opacity = 1;
  setTimeout(() => { muzzleFlash.material.opacity = 0; }, 50);

  // 火箭炮 - 发射弹丸
  if (playerState.currentGun === 'rocket') {
    const sx = window.innerWidth;
    const sy = window.innerHeight;
    const ndcX = (crosshairState.x / sx) * 2 - 1;
    const ndcY = -(crosshairState.y / sy) * 2 + 1;
    const aimOrigin = playerState.isThirdPerson ? playerState.playerPos.clone() : camera.position.clone();
    const dir = new THREE.Vector3(ndcX, ndcY, -1).unproject(camera).sub(camera.position).normalize();
    spawnRocket(aimOrigin, dir, gun.damage + levelBonus);
    return;
  }

  const sx = window.innerWidth;
  const sy = window.innerHeight;

  for (let b = 0; b < gun.bulletsPerShot; b++) {
    const ndcX = ((crosshairState.x) / sx) * 2 - 1 + (Math.random() - 0.5) * gun.spread * 2;
    const ndcY = -((crosshairState.y) / sy) * 2 + 1 + (Math.random() - 0.5) * gun.spread * 2;
    const aimOrigin = playerState.isThirdPerson ? playerState.playerPos.clone() : camera.position.clone();
    const dir = new THREE.Vector3(ndcX, ndcY, -1).unproject(camera).sub(camera.position).normalize();
    const hit = raycasterHitTest(aimOrigin, dir);
    if (hit) {
      if (hit.type === 'enemy') {
        const enemy = hit.object;
        enemy.userData.health -= gun.damage + levelBonus;
        const hitMark = new THREE.Mesh(hitGeo, hitMat);
        hitMark.position.copy(hit.point);
        scene.add(hitMark);
        setTimeout(() => scene.remove(hitMark), 300);

        if (enemy.userData.health <= 0) {
          const dropRoll = Math.random();
          if (dropRoll < PICKUP_DROP_CHANCE) {
            spawnPickup(enemy.position.clone(), 'heal');
          }
          scene.remove(enemy);
          if (enemy.material) enemy.material.dispose();
          if (enemy.userData.isFlying) {
            const fidx = flyingEnemies.indexOf(enemy);
            if (fidx !== -1) flyingEnemies.splice(fidx, 1);
          } else {
            const idx = enemies.indexOf(enemy);
            if (idx !== -1) enemies.splice(idx, 1);
          }
          playerState.kills++;
          playerState.score += 100 * playerState.wave;
          // 杀怪获得经验
          playerState.exp += EXP_PER_KILL;
          checkLevelUp();
          updateHUD();
        }
      } else if (hit.type === 'obstacle') {
        const hitMark = new THREE.Mesh(hitGeo, hitMat);
        hitMark.position.copy(hit.point);
        scene.add(hitMark);
        setTimeout(() => scene.remove(hitMark), 300);
      }
    }
  }
}

// ==================== 火箭炮系统 ====================
function spawnRocket(origin, direction, damage) {
  const rocketGeo = new THREE.CylinderGeometry(0.08, 0.14, 0.5, 8);
  const rocketMat = new THREE.MeshStandardMaterial({
    color: 0xff4422,
    emissive: 0xff2200,
    emissiveIntensity: 0.5,
    roughness: 0.3,
  });
  const rocket = new THREE.Mesh(rocketGeo, rocketMat);
  rocket.position.copy(origin);
  const lookTarget = origin.clone().add(direction);
  rocket.lookAt(lookTarget);
  rocket.rotateX(Math.PI / 2);
  // 尾焰光晕
  const glowGeo = new THREE.SphereGeometry(0.12, 6, 6);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xff6600 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.set(0, -0.35, 0);
  rocket.add(glow);
  scene.add(rocket);
  rocket.userData = {
    velocity: direction.clone().multiplyScalar(ROCKET_SPEED),
    damage: damage,
    lifetime: 3.0,
  };
  rockets.push(rocket);
}

function createExplosion(position, radius, damage) {
  // 爆炸视觉 - 膨胀火球
  const expGeo = new THREE.SphereGeometry(0.5, 12, 12);
  const expMat = new THREE.MeshBasicMaterial({
    color: 0xff6600,
    transparent: true,
    opacity: 1,
  });
  const explosion = new THREE.Mesh(expGeo, expMat);
  explosion.position.copy(position);
  scene.add(explosion);
  const startTime = Date.now();
  const expDuration = 400;
  function animExplosion() {
    const t = (Date.now() - startTime) / expDuration;
    if (t >= 1) { scene.remove(explosion); expMat.dispose(); expGeo.dispose(); return; }
    const s = 1 + t * radius * 2;
    explosion.scale.set(s, s, s);
    expMat.opacity = 1 - t;
    requestAnimationFrame(animExplosion);
  }
  animExplosion();
  // 粒子碎片
  for (let i = 0; i < 15; i++) {
    const pGeo = new THREE.SphereGeometry(0.06, 4, 4);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
    const p = new THREE.Mesh(pGeo, pMat);
    p.position.copy(position);
    const a1 = Math.random() * Math.PI * 2;
    const a2 = Math.random() * Math.PI;
    const spd = 5 + Math.random() * 8;
    p.userData = {
      velocity: new THREE.Vector3(
        Math.cos(a1) * Math.sin(a2) * spd,
        Math.cos(a2) * spd,
        Math.sin(a1) * Math.sin(a2) * spd,
      ),
      life: 0.6 + Math.random() * 0.3,
    };
    scene.add(p);
    particles.push(p);
  }
  // 范围伤害
  const allTargets = [...enemies, ...flyingEnemies];
  const toRemove = [];
  for (const enemy of allTargets) {
    const dist = position.distanceTo(enemy.position);
    if (dist < radius) {
      const dmgMul = 1 - (dist / radius) * 0.5;
      enemy.userData.health -= damage * dmgMul;
      if (enemy.userData.health <= 0) {
        toRemove.push(enemy);
      }
    }
  }
  // 批量击杀处理
  for (const enemy of toRemove) {
    const dropRoll = Math.random();
    if (dropRoll < PICKUP_DROP_CHANCE) {
      spawnPickup(enemy.position.clone(), 'heal');
    }
    scene.remove(enemy);
    if (enemy.material) enemy.material.dispose();
    if (enemy.userData.isFlying) {
      const idx = flyingEnemies.indexOf(enemy);
      if (idx !== -1) flyingEnemies.splice(idx, 1);
    } else {
      const idx = enemies.indexOf(enemy);
      if (idx !== -1) enemies.splice(idx, 1);
    }
    playerState.kills++;
    playerState.score += 100 * playerState.wave;
    playerState.exp += EXP_PER_KILL;
  }
  if (toRemove.length > 0) {
    checkLevelUp();
    updateHUD();
  }
}

// ==================== 升级检查 ====================
function checkLevelUp() {
  const expNeeded = playerState.level * EXP_PER_LEVEL;
  while (playerState.exp >= expNeeded && playerState.alive) {
    playerState.exp -= expNeeded;
    playerState.level++;
    // 每升一级自动升级枪械和生命值
    playerState.gunLevel = playerState.level;
    playerState.maxHealth = 100 + (playerState.level - 1) * 10;
    playerState.health = Math.min(playerState.health + 30, playerState.maxHealth);
    showMessage(`⭐ 升级！Lv.${playerState.level} 枪械 Lv.${playerState.gunLevel} 生命 ${playerState.maxHealth}`, 2000);
    updateHUD();
  }
}

// ==================== 窗口resize ====================
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);

// ==================== 游戏循环 ====================
const clock = new THREE.Clock();

function updatePlayerMovement(delta) {
  if (!playerState.alive) return;

  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  forward.y = 0;
  forward.normalize();
  const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
  right.y = 0;
  right.normalize();

  const moveVec = new THREE.Vector3();
  if (keys['w']) moveVec.add(forward);
  if (keys['s']) moveVec.sub(forward);
  if (keys['a']) moveVec.sub(right);
  if (keys['d']) moveVec.add(right);

  if (moveVec.length() > 0) {
    moveVec.normalize().multiplyScalar(PLAYER_SPEED * delta);
  }

  // 垂直速度（重力/跳跃）
  playerState.velocity.y -= GRAVITY * delta;
  if (keys[' '] && playerState.onGround) {
    playerState.velocity.y = JUMP_VELOCITY;
    playerState.onGround = false;
  }

  moveVec.y = playerState.velocity.y * delta;

  let newX = camera.position.x + moveVec.x;
  let newZ = camera.position.z + moveVec.z;

  // 地图边界锁定
  newX = Math.max(-MAP_BOUNDARY, Math.min(MAP_BOUNDARY, newX));
  newZ = Math.max(-MAP_BOUNDARY, Math.min(MAP_BOUNDARY, newZ));

  const collision = checkObstacleCollision(newX, newZ, PLAYER_RADIUS);
  if (collision.hit) {
    newX += collision.pushX;
    newZ += collision.pushZ;
    // 边界再次锁定（防止碰撞推出边界）
    newX = Math.max(-MAP_BOUNDARY, Math.min(MAP_BOUNDARY, newX));
    newZ = Math.max(-MAP_BOUNDARY, Math.min(MAP_BOUNDARY, newZ));
  }

  camera.position.x = newX;
  camera.position.z = newZ;
  camera.position.y += moveVec.y;
  playerState.playerPos.copy(camera.position);

  if (camera.position.y <= PLAYER_HEIGHT) {
    camera.position.y = PLAYER_HEIGHT;
    playerState.velocity.y = 0;
    playerState.onGround = true;
    playerState.playerPos.copy(camera.position);
  }

  // 更新地面敌人
  for (const enemy of enemies) {
    const toPlayer = new THREE.Vector3().subVectors(camera.position, enemy.position);
    toPlayer.y = 0;
    const dist = toPlayer.length();
    if (dist > 0.5) {
      const dir = toPlayer.clone().normalize().multiplyScalar(enemy.userData.speed * delta);
      // 安全据点排斥
      const toSafe = enemy.position.clone();
      toSafe.y = 0;
      const distToSafe = toSafe.length();
      if (distToSafe < SAFE_ZONE_RADIUS) {
        const pushAway = toSafe.clone().normalize();
        enemy.position.x += pushAway.x * delta * 5;
        enemy.position.z += pushAway.z * delta * 5;
        continue;
      }
      if (!checkEnemyObstacleCollision(enemy, dir.x, dir.z)) {
        enemy.position.x += dir.x;
        enemy.position.z += dir.z;
      }
    }
    enemy.userData.attackCooldown -= delta;
    if (dist < 2 && enemy.userData.attackCooldown <= 0) {
      playerState.health -= enemy.userData.damage;
      enemy.userData.attackCooldown = enemy.userData.attackRate;
      updateHUD();
      if (playerState.health <= 0) {
        playerState.health = 0;
        playerState.alive = false;
        showMessage('💀 你死了！按 F5 重新开始', 999999);
      }
    }
    // 看向玩家
    enemy.lookAt(camera.position.x, enemy.position.y, camera.position.z);
  }

  // 更新空中怪物
  for (const fly of flyingEnemies) {
    const toPlayer = new THREE.Vector3().subVectors(camera.position, fly.position);
    const dist = toPlayer.length();
    // 飞行浮动
    fly.position.y = fly.userData.baseY + Math.sin(Date.now() * 0.001 * fly.userData.flySpeed) * fly.userData.flyAmplitude;
    if (dist > 0.5) {
      const dir = toPlayer.clone().normalize().multiplyScalar(fly.userData.speed * delta);
      fly.position.x += dir.x;
      fly.position.z += dir.z;
      // 高度追踪玩家
      fly.userData.baseY = Math.max(2, Math.min(6, fly.userData.baseY + (camera.position.y + 2 - fly.userData.baseY) * delta * 0.3));
    }
    fly.userData.attackCooldown -= delta;
    if (dist < 2.5 && fly.userData.attackCooldown <= 0) {
      playerState.health -= fly.userData.damage;
      fly.userData.attackCooldown = fly.userData.attackRate;
      updateHUD();
      if (playerState.health <= 0) {
        playerState.health = 0;
        playerState.alive = false;
        showMessage('💀 你死了！按 F5 重新开始', 999999);
      }
    }
    // 看向玩家
    fly.lookAt(camera.position.x, fly.position.y, camera.position.z);
  }
}

function gameLoop() {
  const delta = Math.min(clock.getDelta(), 0.05);

  // 安全据点回血
  if (playerState.alive && playerState.health < playerState.maxHealth) {
    const dx = camera.position.x - SAFE_ZONE_CENTER.x;
    const dz = camera.position.z - SAFE_ZONE_CENTER.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < SAFE_ZONE_RADIUS) {
      playerState.health = Math.min(playerState.maxHealth, playerState.health + SAFE_ZONE_HEAL_PER_SEC * delta);
      updateHUD();
    }
  }

  

  // 射击冷却
  if (playerState.fireCooldown > 0) playerState.fireCooldown -= delta;

  updatePlayerMovement(delta);
  updateCrosshairAndCamera();

  // 更新火箭弹
  for (let i = rockets.length - 1; i >= 0; i--) {
    const r = rockets[i];
    r.userData.lifetime -= delta;
    if (r.userData.lifetime <= 0) {
      createExplosion(r.position, ROCKET_EXPLOSION_RADIUS, r.userData.damage * 0.3);
      scene.remove(r);
      r.material.dispose();
      r.geometry.dispose();
      rockets.splice(i, 1);
      continue;
    }
    r.position.add(r.userData.velocity.clone().multiplyScalar(delta));
    // 障碍物碰撞
    let hitObstacle = false;
    for (const obs of obstacles) {
      if (r.position.distanceTo(obs.position) < obs.userData.radius + 0.5) { hitObstacle = true; break; }
    }
    if (hitObstacle) {
      createExplosion(r.position, ROCKET_EXPLOSION_RADIUS, r.userData.damage);
      scene.remove(r); r.material.dispose(); r.geometry.dispose();
      rockets.splice(i, 1);
      continue;
    }
    // 敌人碰撞
    const allTargets = [...enemies, ...flyingEnemies];
    let hitEnemy = false;
    for (const enemy of allTargets) {
      if (r.position.distanceTo(enemy.position) < 1.5) { hitEnemy = true; break; }
    }
    if (hitEnemy) {
      createExplosion(r.position, ROCKET_EXPLOSION_RADIUS, r.userData.damage);
      scene.remove(r); r.material.dispose(); r.geometry.dispose();
      rockets.splice(i, 1);
      continue;
    }
    // 边界检查
    if (Math.abs(r.position.x) > MAP_BOUNDARY || Math.abs(r.position.z) > MAP_BOUNDARY) {
      createExplosion(r.position, ROCKET_EXPLOSION_RADIUS, r.userData.damage * 0.3);
      scene.remove(r); r.material.dispose(); r.geometry.dispose();
      rockets.splice(i, 1);
    }
  }

  // 更新粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.userData.life -= delta;
    if (p.userData.life <= 0) {
      scene.remove(p); p.material.dispose(); p.geometry.dispose();
      particles.splice(i, 1);
      continue;
    }
    p.position.add(p.userData.velocity.clone().multiplyScalar(delta));
    p.userData.velocity.multiplyScalar(0.96);
  }

  // 空中视角 - 相机抬高拉远，便于观察和攻击空中怪物
  if (playerState.isThirdPerson) {
    const airOffset = new THREE.Vector3(0, 4, 5);
    airOffset.applyQuaternion(camera.quaternion);
    const airPos = playerState.playerPos.clone().add(airOffset);
    camera.position.copy(airPos);
    camera.lookAt(playerState.playerPos.x, playerState.playerPos.y + 1.5, playerState.playerPos.z);
    renderer.domElement.style.pointerEvents = 'none';
  } else {
    renderer.domElement.style.pointerEvents = 'auto';
  }

  // 更新掉落物
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.userData.lifetime -= delta;
    if (p.userData.lifetime <= 0) {
      scene.remove(p);
      p.material.dispose();
      p.geometry.dispose();
      pickups.splice(i, 1);
      continue;
    }
    // 增强漂浮动画幅度
    p.position.y = 0.5 + Math.sin(Date.now() * 0.003 + p.userData.bobOffset) * 0.3;
    p.rotation.y += delta * 2;
    const dx = camera.position.x - p.position.x;
    const dz = camera.position.z - p.position.z;
    if (Math.sqrt(dx * dx + dz * dz) < 1.5 && Math.abs(camera.position.y - p.position.y) < 1.0) {
      if (p.userData.type === 'heal') {
        playerState.health = Math.min(playerState.maxHealth, playerState.health + PICKUP_HEAL_AMOUNT);
        showMessage('💚 +' + PICKUP_HEAL_AMOUNT + ' HP', 1000);
      }
      scene.remove(p);
      p.material.dispose();
      p.geometry.dispose();
      pickups.splice(i, 1);
      updateHUD();
    }
  }

  // 旋转光柱和动态效果
  beam.rotation.y += delta * 0.5;
  dome.material.opacity = 0.3 + Math.sin(Date.now() * 0.002) * 0.15;

  // 波次检查（无限模式：无最大波次限制，清除所有敌人后进入下一波）
  if (playerState.alive && enemies.length === 0 && flyingEnemies.length === 0 && !playerState.waveSpawning) {
    playerState.waveSpawning = true;
    playerState.wave++;
    // 每升一级提升枪械等级和生命上限
    playerState.gunLevel = playerState.wave;
    playerState.maxHealth = 100 + (playerState.wave - 1) * 10;
    playerState.health = Math.min(playerState.health + 20, playerState.maxHealth);
    showMessage(`⚡ 第 ${playerState.wave} 波！枪械升级 Lv.${playerState.gunLevel}，生命上限 ${playerState.maxHealth}`, 2500);
    setTimeout(() => {
      spawnWave();
      playerState.waveSpawning = false;
    }, 1800);
  }

  // 自动索敌并看向最近敌人方向
  if (playerState.alive && enemies.length > 0) {
    let nearest = null;
    let nearDist = Infinity;
    for (const enemy of enemies) {
      const d = camera.position.distanceTo(enemy.position);
      if (d < nearDist) { nearDist = d; nearest = enemy; }
    }
    if (nearest) {
      const dir = new THREE.Vector3().subVectors(nearest.position, camera.position).normalize();
      // 仅用于敌人更新方向
    }
  }

  renderer.render(scene, camera);
  requestAnimationFrame(gameLoop);
}

// ==================== 开始游戏 ====================
startBtn.addEventListener('click', () => {
  overlayEl.style.display = 'none';
  crosshairState.enabled = true;
  crosshairState.x = window.innerWidth / 2;
  crosshairState.y = window.innerHeight / 2;
  playerState.wave = 1;
  playerState.gunLevel = 1;
  playerState.health = playerState.maxHealth;
  playerState.kills = 0;
  playerState.score = 0;
  playerState.alive = true;
  playerState.waveSpawning = false;
  updateCrosshairBounds();
  updateCrosshairPosition();
  updateHUD();
  spawnWave();
  gameLoop();
});

console.log('🎯 自由准心模式已加载 — 鼠标自由移动瞄准，屏幕边缘转动镜头');
</script>
