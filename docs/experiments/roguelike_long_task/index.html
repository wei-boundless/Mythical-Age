<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roguelike Dungeon Tower</title>
<style>
  body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
  canvas { border: 1px solid #333; image-rendering: pixelated; }
  #ui-overlay { position: absolute; top: 10px; left: 10px; color: white; font-size: 14px; pointer-events: none; display: none; }
  .upgrade-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 2px solid #0cf; padding: 20px; color: white; display: none; flex-direction: column; gap: 10px; z-index: 10; }
  .upgrade-panel button { background: #333; color: #0cf; border: 1px solid #0cf; padding: 8px 16px; cursor: pointer; font-family: monospace; }
  .upgrade-panel button:hover { background: #0cf; color: #000; }
  #error-overlay { position: absolute; top: 10px; left: 10px; color: red; font-size: 16px; pointer-events: none; display: none; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<div id="ui-overlay"></div>
<div id="error-overlay">⚠ Image load failed. Please refresh.</div>
<div id="upgradePanel" class="upgrade-panel">
  <h3>Choose an Upgrade</h3>
  <button onclick="selectUpgrade('hp')">+20 Max HP</button>
  <button onclick="selectUpgrade('atk')">+5 Attack</button>
  <button onclick="selectUpgrade('spd')">+1 Speed</button>
</div>

<script>
// ==================== GLOBAL STATE ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const TILE = 32;

// Asset images
const ASSETS = {
  player: { src: 'assets/player.png', img: null },
  skeleton_warrior: { src: 'assets/skeleton_warrior.png', img: null },
  skeleton_archer: { src: 'assets/skeleton_archer.png', img: null },
  shadow_assassin: { src: 'assets/shadow_assassin.png', img: null },
  boss: { src: 'assets/boss.png', img: null },
  tile_floor: { src: 'assets/tile_floor.png', img: null },
};

let assetsLoaded = false;
let loadFailed = false;

let player = null;
let enemies = [];
let rooms = [];
let currentFloor = 1;
let floorScale = 1.0;
let levelUpChoices = [];
let gameOver = false;
let gameOverMessage = '';
let upgradePending = false;

// Add overlay references
const uiOverlay = document.getElementById('ui-overlay');
const errorOverlay = document.getElementById('error-overlay');
const upgradePanel = document.getElementById('upgradePanel');

// ==================== LOAD ASSETS ====================
function loadAssets() {
  const promises = Object.entries(ASSETS).map(([key, asset]) => {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        asset.img = img;
        console.log(`✅ Loaded: ${asset.src}`);
        resolve();
      };
      img.onerror = () => {
        console.error(`❌ Failed to load: ${asset.src}`);
        reject(new Error(`Failed to load ${asset.src}`));
      };
      img.src = asset.src;
    });
  });

  return Promise.all(promises).then(() => {
    assetsLoaded = true;
    console.log('All assets loaded successfully.');
  }).catch(err => {
    console.error(err.message);
    loadFailed = true;
    errorOverlay.style.display = 'block';
  });
}

// ==================== ENTITY CLASSES ====================
class Entity {
  constructor(x, y, w, h, hp, atk, imageKey) {
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h;
    this.hp = hp;
    this.maxHp = hp;
    this.atk = atk;
    this.imageKey = imageKey;
    this.image = ASSETS[imageKey] ? ASSETS[imageKey].img : null;
  }

  draw(ctx) {
    if (this.image && ctx) {
      ctx.drawImage(this.image, this.x, this.y, this.w, this.h);
    } else {
      // Error fallback: magenta rect to indicate missing image (not a stealth fallback)
      ctx.fillStyle = '#ff00ff';
      ctx.fillRect(this.x, this.y, this.w, this.h);
    }
  }

  drawHpBar(ctx) {
    const barW = this.w;
    const barH = 4;
    const ratio = Math.max(0, this.hp / this.maxHp);
    ctx.fillStyle = 'red';
    ctx.fillRect(this.x, this.y - 6, barW, barH);
    ctx.fillStyle = 'lime';
    ctx.fillRect(this.x, this.y - 6, barW * ratio, barH);
  }
}

class Player extends Entity {
  constructor(x, y) {
    super(x, y, TILE, TILE, 100, 10, 'player');
    this.isPlayer = true;
    this.speed = 3;
    this.level = 1;
    this.exp = 0;
    this.expToNext = 50;
  }

  move(dx, dy) {
    this.x += dx * this.speed;
    this.y += dy * this.speed;
    // keep inside rooms
    this.x = Math.max(0, this.x);
    this.y = Math.max(0, this.y);
    this.x = Math.min(W - this.w, this.x);
    this.y = Math.min(H - this.h, this.y);
  }

  gainExp(amount) {
    this.exp += amount;
    if (this.exp >= this.expToNext) {
      this.level++;
      this.exp -= this.expToNext;
      this.expToNext = Math.floor(this.expToNext * 1.5);
      this.maxHp += 10;
      this.hp = this.maxHp;
      this.atk += 2;
      showUpgradePanel();
    }
  }
}

class Enemy extends Entity {
  constructor(x, y, type, floorScale) {
    let w, h, hp, atk, imageKey;
    switch(type) {
      case 'warrior':
        w = TILE; h = TILE; hp = 60; atk = 8; imageKey = 'skeleton_warrior'; break;
      case 'archer':
        w = TILE; h = TILE; hp = 40; atk = 12; imageKey = 'skeleton_archer'; break;
      case 'assassin':
        w = TILE; h = TILE; hp = 50; atk = 15; imageKey = 'shadow_assassin'; break;
      default:
        w = TILE; h = TILE; hp = 30; atk = 5; imageKey = 'skeleton_warrior';
    }
    super(x, y, w, h, hp * floorScale, atk * floorScale, imageKey);
    this.isEnemy = true;
    this.type = type;
    this.state = 'patrol';
    this.patrolTarget = { x: x + Math.random()*100-50, y: y + Math.random()*100-50 };
    this.attackTimer = 0;
    this.maxAttackTimer = type === 'archer' ? 60 : 40;
    this.speed = type === 'assassin' ? 2 : 1;
  }

  update() {
    if (gameOver) return;
    this.attackTimer++;
    const dx = player.x - this.x;
    const dy = player.y - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 200) {
      this.state = 'chase';
    } else {
      this.state = 'patrol';
    }
    if (this.state === 'chase') {
      const normX = dx / dist;
      const normY = dy / dist;
      this.x += normX * this.speed;
      this.y += normY * this.speed;
      if (dist < 24 && this.attackTimer >= this.maxAttackTimer) {
        player.hp -= this.atk;
        this.attackTimer = 0;
        if (player.hp <= 0) {
          player.hp = 0;
          gameOver = true;
          gameOverMessage = 'You died! Press R to restart.';
        }
      }
    } else {
      const pdx = this.patrolTarget.x - this.x;
      const pdy = this.patrolTarget.y - this.y;
      const pdist = Math.sqrt(pdx*pdx + pdy*pdy);
      if (pdist < 5) {
        this.patrolTarget = { x: this.x + Math.random()*100-50, y: this.y + Math.random()*100-50 };
      } else {
        this.x += pdx / pdist * this.speed;
        this.y += pdy / pdist * this.speed;
      }
    }
    this.x = Math.max(0, Math.min(W - this.w, this.x));
    this.y = Math.max(0, Math.min(H - this.h, this.y));
  }

  draw(ctx) {
    super.draw(ctx);
    this.drawHpBar(ctx);
  }
}

class Boss extends Entity {
  constructor(x, y, floorScale) {
    super(x, y, TILE*2, TILE*2, 200 * floorScale, 20 * floorScale, 'boss');
    this.isEnemy = true;
    this.type = 'boss';
    this.attackTimer = 0;
    this.maxAttackTimer = 80;
    this.phase = 0;
  }

  update() {
    if (gameOver) return;
    this.attackTimer++;
    const dx = player.x - this.x;
    const dy = player.y - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const normX = dx / (dist || 1);
    const normY = dy / (dist || 1);
    this.x += normX * 1.5;
    this.y += normY * 1.5;
    if (dist < 40 && this.attackTimer >= this.maxAttackTimer) {
      player.hp -= this.atk;
      this.attackTimer = 0;
      if (player.hp <= 0) {
        gameOver = true;
        gameOverMessage = 'Slain by the Boss! Press R to restart.';
      }
    }
    if (this.hp < this.maxHp * 0.5 && this.phase === 0) {
      this.phase = 1;
      this.atk *= 1.3;
    }
    this.x = Math.max(0, Math.min(W - this.w, this.x));
    this.y = Math.max(0, Math.min(H - this.h, this.y));
  }

  draw(ctx) {
    super.draw(ctx);
    this.drawHpBar(ctx);
  }
}

// ==================== MAP GENERATION ====================
function generateDungeon(floor) {
  rooms = [];
  enemies = [];
  const numRooms = 5 + Math.floor(floor / 2);
  for (let i = 0; i < numRooms; i++) {
    const rw = 6 + Math.floor(Math.random() * 5);
    const rh = 5 + Math.floor(Math.random() * 4);
    const rx = Math.floor(Math.random() * (W / TILE - rw - 2)) * TILE + TILE;
    const ry = Math.floor(Math.random() * (H / TILE - rh - 2)) * TILE + TILE;
    rooms.push({ x: rx, y: ry, w: rw * TILE, h: rh * TILE });
    const numEnemies = 1 + Math.floor(Math.random() * 2);
    for (let j = 0; j < numEnemies; j++) {
      const ex = rx + TILE + Math.random() * (rw - 2) * TILE;
      const ey = ry + TILE + Math.random() * (rh - 2) * TILE;
      const types = ['warrior', 'archer', 'assassin'];
      const type = types[Math.floor(Math.random() * types.length)];
      enemies.push(new Enemy(ex, ey, type, floorScale));
    }
  }
  // Place player in first room
  const startRoom = rooms[0];
  player.x = startRoom.x + startRoom.w / 2;
  player.y = startRoom.y + startRoom.h / 2;
  // Boss on floors multiple of 5
  if (floor % 5 === 0 && rooms.length > 1) {
    const bossRoom = rooms[rooms.length-1];
    const bx = bossRoom.x + bossRoom.w / 2 - TILE;
    const by = bossRoom.y + bossRoom.h / 2 - TILE;
    enemies.push(new Boss(bx, by, floorScale));
  }
}

// ==================== GAME LOOP ====================
function update() {
  if (gameOver || upgradePending) return;
  enemies.forEach(e => e.update());
  // Check if all enemies dead -> next floor
  const alive = enemies.filter(e => e.hp > 0);
  if (alive.length === 0) {
    currentFloor++;
    floorScale = 1 + currentFloor * 0.2;
    generateDungeon(currentFloor);
    player.hp = player.maxHp; // heal on floor clear
    uiOverlay.style.display = 'none';
  }
}

function render() {
  // Clear
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  if (loadFailed) {
    ctx.fillStyle = 'red';
    ctx.font = '20px monospace';
    ctx.fillText('⚠ Image load failed.', 250, 300);
    return;
  }

  if (!assetsLoaded) {
    ctx.fillStyle = 'white';
    ctx.font = '20px monospace';
    ctx.fillText('Loading assets...', 300, 300);
    return;
  }

  // Draw floor tiles inside rooms
  if (ASSETS.tile_floor.img) {
    rooms.forEach(room => {
      for (let tx = room.x; tx < room.x + room.w; tx += TILE) {
        for (let ty = room.y; ty < room.y + room.h; ty += TILE) {
          if (tx + TILE <= W && ty + TILE <= H) {
            ctx.drawImage(ASSETS.tile_floor.img, tx, ty, TILE, TILE);
          }
        }
      }
    });
  } else {
    // tile image missing - indicate error
    ctx.fillStyle = '#ff00ff';
    rooms.forEach(room => ctx.fillRect(room.x, room.y, room.w, room.h));
  }

  // Draw player
  if (player && player.image) {
    player.draw(ctx);
  } else if (player) {
    ctx.fillStyle = '#ff00ff';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = 'red';
    ctx.font = '12px monospace';
    ctx.fillText('Player img missing', player.x, player.y - 10);
  }

  // Draw enemies
  enemies.forEach(e => {
    if (e.hp <= 0) return;
    e.draw(ctx);
  });

  // Draw UI / HUD
  ctx.fillStyle = 'white';
  ctx.font = '14px monospace';
  ctx.fillText(`Floor ${currentFloor}`, 10, 20);
  ctx.fillText(`HP: ${Math.ceil(player.hp)}/${player.maxHp}`, 10, 40);
  ctx.fillText(`ATK: ${player.atk}`, 10, 60);
  ctx.fillText(`EXP: ${player.exp}/${player.expToNextNext || player.expToNext}`, 10, 80);
  // Actually expToNext was used earlier
  ctx.clearRect(0, 70, 200, 20);
  ctx.fillText(`EXP: ${player.exp}/${player.expToNext}`, 10, 80);

  // HP bar player
  const barW = 200;
  const ratio = player.hp / player.maxHp;
  ctx.fillStyle = 'red';
  ctx.fillRect(W - barW - 10, 10, barW, 12);
  ctx.fillStyle = 'lime';
  ctx.fillRect(W - barW - 10, 10, barW * ratio, 12);
  ctx.strokeStyle = 'white';
  ctx.strokeRect(W - barW - 10, 10, barW, 12);

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff3333';
    ctx.font = '28px monospace';
    ctx.fillText(gameOverMessage, 200, 300);
  }

  if (upgradePending) {
    ctx.fillStyle = 'cyan';
    ctx.font = '18px monospace';
    ctx.fillText('Choose an upgrade above!', 250, 320);
  }
}

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ==================== INPUT ====================
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'r' && gameOver) {
    restartGame();
  }
});
document.addEventListener('keyup', e => keys[e.key] = false);

function processInput() {
  if (gameOver || upgradePending) return;
  let dx = 0, dy = 0;
  if (keys['ArrowUp'] || keys['w']) dy -= 1;
  if (keys['ArrowDown'] || keys['s']) dy += 1;
  if (keys['ArrowLeft'] || keys['a']) dx -= 1;
  if (keys['ArrowRight'] || keys['d']) dx += 1;
  if (dx !== 0 || dy !== 0) {
    player.move(dx, dy);
  }
  // Attack
  if (keys[' '] && !player.attackCooldown) {
    enemies.forEach(e => {
      const dist = Math.hypot(e.x - player.x, e.y - player.y);
      if (dist < 48) {
        e.hp -= player.atk;
        if (e.hp > 0) {
          // knockback
          e.x += (e.x - player.x) * 0.3;
          e.y += (e.y - player.y) * 0.3;
        } else {
          player.gainExp(e.expValue || 20);
        }
      }
    });
    player.attackCooldown = true;
    setTimeout(() => player.attackCooldown = false, 300);
  }
  requestAnimationFrame(processInput);
}

// ==================== UPGRADE SYSTEM ====================
function showUpgradePanel() {
  upgradePending = true;
  upgradePanel.style.display = 'flex';
}

function selectUpgrade(type) {
  if (type === 'hp') {
    player.maxHp += 20;
    player.hp = player.maxHp;
  } else if (type === 'atk') {
    player.atk += 5;
  } else if (type === 'spd') {
    player.speed += 1;
  }
  upgradePending = false;
  upgradePanel.style.display = 'none';
}

// Expose to global for onclick
window.selectUpgrade = selectUpgrade;

// ==================== RESTART ====================
function restartGame() {
  player = new Player(W/2, H/2);
  currentFloor = 1;
  floorScale = 1;
  gameOver = false;
  gameOverMessage = '';
  upgradePending = false;
  upgradePanel.style.display = 'none';
  generateDungeon(currentFloor);
  player.expToNext = 50;
  player.exp = 0;
  player.level = 1;
}

// ==================== INIT ====================
loadAssets().then(() => {
  player = new Player(W/2, H/2);
  generateDungeon(currentFloor);
  gameLoop();
  processInput();
});

// Fallback: if script runs before load? No
</script>
</body>
</html>
