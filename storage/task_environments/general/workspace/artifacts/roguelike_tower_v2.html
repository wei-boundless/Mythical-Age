<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五层地下塔 · 肉鸽地牢 v2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0a0f;color:#c8c8d0;font-family:'Segoe UI','Noto Sans SC',system-ui,sans-serif;
  display:flex;justify-content:center;align-items:center;min-height:100vh;
  overflow-x:hidden;
}
#game-shell{
  display:flex;gap:14px;padding:16px;background:#111118;border-radius:12px;
  box-shadow:0 0 30px rgba(0,180,255,0.15);max-width:960px;width:100%;
  flex-wrap:wrap;justify-content:center;
}
#dungeon-area{
  position:relative;display:flex;flex-direction:column;align-items:center;
}
#dungeon-grid{
  display:grid;gap:1px;background:#1a1a2e;padding:4px;border-radius:8px;
  user-select:none;font-family:'Courier New',monospace;font-size:16px;
  line-height:1.2;
}
.cell{width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  background:#161625;color:#555;transition:background 0.1s, color 0.1s;
  border-radius:2px;position:relative;
}
.cell.wall{background:#0d0d1a;color:#222;}
.cell.floor{background:#1e1e32;color:#666;}
.cell.player{background:#2a4a6a;color:#8cf;font-weight:bold;}
.cell.enemy{background:#4a1a1a;color:#f66;}
.cell.item{background:#1a4a1a;color:#8f8;}
.cell.stairs{background:#3a2a1a;color:#fa0;}
.cell.trap{background:#2a1a3a;color:#f0f;}
.cell.shrine{background:#1a3a3a;color:#0ff;}
.cell.chest_mimic{background:#1a4a1a;color:#8f8;}
.cell.explored{background:#111;color:#333;}
.cell.flash_white{background:#fff!important;color:#000!important;}
#side-panel{
  display:flex;flex-direction:column;gap:10px;min-width:200px;max-width:240px;flex:1;
}
.panel-box{
  background:#1a1a28;border:1px solid #2a2a3e;border-radius:8px;padding:10px;
}
.panel-box h3{font-size:14px;color:#aab;margin-bottom:6px;border-bottom:1px solid #333;padding-bottom:4px;}
.stat-row{display:flex;justify-content:space-between;font-size:12px;margin:3px 0;}
.skill-slot{
  display:flex;align-items:center;gap:8px;padding:6px 8px;margin:4px 0;
  background:#222236;border-radius:6px;cursor:pointer;border:2px solid transparent;
  transition: border-color 0.2s;
}
.skill-slot.selected{border-color:#4af;}
.skill-slot.on-cooldown{opacity:0.5;cursor:not-allowed;}
.skill-icon{font-size:20px;width:28px;text-align:center;}
.skill-info{flex:1;font-size:10px;color:#99a;}
.skill-cd{font-size:12px;color:#f88;font-weight:bold;}
#msg-log{
  max-height:120px;overflow-y:auto;font-size:10px;line-height:1.5;background:#0d0d18;
  border-radius:6px;padding:6px;
}
#msg-log div{margin:2px 0;}
.msg-damage{color:#f66;}
.msg-heal{color:#8f8;}
.msg-info{color:#aaf;}
.msg-warn{color:#fa0;}
.msg-loot{color:#ff0;}
#mini-map{
  width:100%;height:120px;border:1px solid #333;border-radius:4px;
  background:#0a0a14;image-rendering:pixelated;
}
button{
  background:#2a2a44;color:#ccd;border:1px solid #444;padding:6px 12px;
  border-radius:6px;cursor:pointer;font-size:12px;margin:2px;
  transition:background 0.2s;
}
button:hover{background:#3a3a5a;}
button:active{background:#4a4a6a;}
.btn-row{display:flex;gap:4px;flex-wrap:wrap;}
.damage-float{
  position:absolute;font-size:12px;font-weight:bold;color:#f44;
  pointer-events:none;animation:floatUp 0.8s ease-out forwards;
  z-index:10;text-shadow:0 0 4px #000;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-20px);}
}
@media(max-width:700px){
  #game-shell{flex-direction:column;align-items:center;}
  #side-panel{max-width:100%;width:100%;}
  #mini-map{height:80px;}
  .cell{width:20px;height:20px;font-size:12px;}
}
</style>
</head>
<body>
<div id="game-shell">
  <div id="dungeon-area">
    <div id="dungeon-grid"></div>
  </div>
  <div id="side-panel">
    <div class="panel-box">
      <h3>🗡️ 状态</h3>
      <div class="stat-row"><span>楼层</span><span id="floor-num">1/5</span></div>
      <div class="stat-row"><span>HP</span><span id="hp-display">30/30</span></div>
      <div class="stat-row"><span>ATK</span><span id="atk-display">8</span></div>
      <div class="stat-row"><span>DEF</span><span id="def-display">2</span></div>
      <div class="stat-row"><span>EXP</span><span id="exp-display">0</span></div>
    </div>
    <div class="panel-box">
      <h3>⚡ 技能 (空格释放)</h3>
      <div id="skill-panel">
        <div class="skill-slot selected" data-skill="fire">
          <span class="skill-icon">🔥</span>
          <div class="skill-info">火焰冲击<br>AOE伤害</div>
          <span class="skill-cd" id="cd-fire">0</span>
        </div>
        <div class="skill-slot" data-skill="heal">
          <span class="skill-icon">💚</span>
          <div class="skill-info">治疗术<br>恢复HP</div>
          <span class="skill-cd" id="cd-heal">0</span>
        </div>
        <div class="skill-slot" data-skill="shield">
          <span class="skill-icon">🛡️</span>
          <div class="skill-info">护盾<br>减伤2回合</div>
          <span class="skill-cd" id="cd-shield">0</span>
        </div>
      </div>
      <div style="font-size:10px;color:#777;margin-top:4px;">1/2/3切换技能 · 空格释放</div>
    </div>
    <div class="panel-box">
      <h3>🗺️ 小地图</h3>
      <canvas id="mini-map" width="120" height="120"></canvas>
    </div>
    <div class="panel-box">
      <h3>📜 消息</h3>
      <div id="msg-log"></div>
    </div>
    <div class="btn-row">
      <button onclick="saveGame()">💾 手动存档</button>
      <button onclick="loadGame()">📂 读档</button>
      <button onclick="restartGame()">🔄 重开</button>
    </div>
    <div style="font-size:10px;color:#555;">方向键移动 · 空格放技能</div>
  </div>
</div>

<script>
// ========== 游戏状态 ==========
const MAP_W = 21, MAP_H = 15;
const TOTAL_FLOORS = 5;
let game = {
  floor: 1,
  map: [],
  explored: [],
  player: { x: 1, y: 1, hp: 30, maxHp: 30, atk: 8, def: 2, exp: 0 },
  enemies: [],
  items: [],
  traps: [],
  shrines: [],
  chestMimics: [],
  msgLog: [],
  turn: 0,
  gameOver: false,
  victory: false,
  skills: {
    fire: { cooldown: 0, maxCd: 6 },
    heal: { cooldown: 0, maxCd: 8 },
    shield: { cooldown: 0, maxCd: 10, active: 0 }
  },
  selectedSkill: 'fire',
  stairPos: null
};

// ========== 帮助函数 ==========
function rng(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function addMsg(text, cls) {
  game.msgLog.unshift({ text, cls });
  if (game.msgLog.length > 40) game.msgLog.pop();
  renderMsgLog();
}

function renderMsgLog() {
  const el = document.getElementById('msg-log');
  el.innerHTML = game.msgLog.slice(0, 20).map(m => `<div class="${m.cls || ''}">${m.text}</div>`).join('');
}

// ========== 地图生成 ==========
function generateDungeon() {
  let map = Array.from({ length: MAP_H }, () => Array(MAP_W).fill('#'));
  // 生成房间
  let rooms = [];
  const roomAttempts = 25;
  for (let i = 0; i < roomAttempts; i++) {
    let w = rng(3, 7), h = rng(3, 5);
    let x = rng(1, MAP_W - w - 2), y = rng(1, MAP_H - h - 2);
    let overlap = false;
    for (let ry = y - 1; ry <= y + h; ry++) {
      for (let rx = x - 1; rx <= x + w; rx++) {
        if (ry >= 0 && ry < MAP_H && rx >= 0 && rx < MAP_W && map[ry][rx] === '.') {
          overlap = true;
        }
      }
    }
    if (!overlap) {
      rooms.push({ x, y, w, h, cx: Math.floor(x + w / 2), cy: Math.floor(y + h / 2) });
      for (let ry = y; ry < y + h; ry++) {
        for (let rx = x; rx < x + w; rx++) {
          map[ry][rx] = '.';
        }
      }
    }
  }
  if (rooms.length < 3) {
    // 保底房间
    map[Math.floor(MAP_H/2)][Math.floor(MAP_W/2)] = '.';
    rooms.push({ x: Math.floor(MAP_W/2)-1, y: Math.floor(MAP_H/2)-1, w: 3, h: 3, cx: Math.floor(MAP_W/2), cy: Math.floor(MAP_H/2) });
  }
  // 连接房间
  for (let i = 1; i < rooms.length; i++) {
    let a = rooms[i - 1], b = rooms[i];
    carveCorridor(map, a.cx, a.cy, b.cx, b.cy);
  }
  // 封闭回路：连接最后一个与第一个
  if (rooms.length >= 3) {
    carveCorridor(map, rooms[rooms.length - 1].cx, rooms[rooms.length - 1].cy, rooms[0].cx, rooms[0].cy);
  }
  return { map, rooms };
}

function carveCorridor(map, x1, y1, x2, y2) {
  let x = x1, y = y1;
  while (x !== x2 || y !== y2) {
    if (x < x2) x++; else if (x > x2) x--;
    else if (y < y2) y++; else if (y > y2) y--;
    if (y >= 0 && y < MAP_H && x >= 0 && x < MAP_W) map[y][x] = '.';
  }
}

function placeEntities(rooms) {
  game.enemies = [];
  game.items = [];
  game.traps = [];
  game.shrines = [];
  game.chestMimics = [];
  // 宝箱怪
  const mimicCount = rng(0, 2);
  for (let i = 0; i < mimicCount; i++) {
    let r = rooms[rng(0, rooms.length - 1)];
    let x = rng(r.x + 1, r.x + r.w - 2);
    let y = rng(r.y + 1, r.y + r.h - 2);
    if (game.map[y][x] === '.' && !(x === game.player.x && y === game.player.y)) {
      game.chestMimics.push({ x, y, hp: 10 + game.floor * 2, atk: 4 + game.floor, def: 1, exp: 8 });
    }
  }
  // 陷阱
  const trapCount = rng(2, 4);
  for (let i = 0; i < trapCount; i++) {
    let r = rooms[rng(0, rooms.length - 1)];
    let x = rng(r.x + 1, r.x + r.w - 2);
    let y = rng(r.y + 1, r.y + r.h - 2);
    if (game.map[y][x] === '.' && !(x === game.player.x && y === game.player.y)) {
      game.traps.push({ x, y });
    }
  }
  // 祭坛
  const shrineCount = rng(0, 1);
  for (let i = 0; i < shrineCount; i++) {
    let r = rooms[rng(0, rooms.length - 1)];
    let x = rng(r.x + 1, r.x + r.w - 2);
    let y = rng(r.y + 1, r.y + r.h - 2);
    if (game.map[y][x] === '.' && !(x === game.player.x && y === game.player.y)) {
      game.shrines.push({ x, y, used: false });
    }
  }
  // 敌人
  const enemyCount = rng(3, 6) + game.floor;
  for (let i = 0; i < enemyCount; i++) {
    let r = rooms[i % rooms.length];
    let x = rng(r.x + 1, r.x + r.w - 2);
    let y = rng(r.y + 1, r.y + r.h - 2);
    if (game.map[y][x] === '.' && !(x === game.player.x && y === game.player.y)) {
      let type = rng(0, 2);
      let name, hp, atk, def, exp;
      if (type === 0) { name = '骷髅'; hp = 6 + game.floor * 2; atk = 3 + game.floor; def = 1; exp = 5; }
      else if (type === 1) { name = '史莱姆'; hp = 4 + game.floor * 2; atk = 2 + game.floor; def = 0; exp = 3; }
      else { name = '暗影'; hp = 8 + game.floor * 2; atk = 5 + game.floor; def = 2; exp = 7; }
      game.enemies.push({ x, y, name, hp, maxHp: hp, atk, def, exp });
    }
  }
  // 物品
  const itemCount = rng(3, 5);
  for (let i = 0; i < itemCount; i++) {
    let r = rooms[rng(0, rooms.length - 1)];
    let x = rng(r.x + 1, r.x + r.w - 2);
    let y = rng(r.y + 1, r.y + r.h - 2);
    if (game.map[y][x] === '.' && !(x === game.player.x && y === game.player.y)) {
      let kind = rng(0, 3);
      let name, effect;
      if (kind === 0) { name = '生命药水'; effect = 'heal'; }
      else if (kind === 1) { name = '力量卷轴'; effect = 'atk'; }
      else if (kind === 2) { name = '护甲碎片'; effect = 'def'; }
      else { name = '经验宝珠'; effect = 'exp'; }
      game.items.push({ x, y, name, effect });
    }
  }
}

// ========== 生成楼层 ==========
function generateFloor() {
  let { map, rooms } = generateDungeon();
  game.map = map;
  game.explored = Array.from({ length: MAP_H }, () => Array(MAP_W).fill(false));
  // 放置玩家
  let startRoom = rooms[0];
  game.player.x = startRoom.cx;
  game.player.y = startRoom.cy;
  game.explored[game.player.y][game.player.x] = true;
  // 楼梯
  let endRoom = rooms[rooms.length - 1];
  game.stairPos = { x: endRoom.cx, y: endRoom.cy };
  // 放置实体
  placeEntities(rooms);
}

// ========== UI 渲染 ==========
function renderDungeon() {
  const grid = document.getElementById('dungeon-grid');
  grid.style.gridTemplateColumns = `repeat(${MAP_W}, 24px)`;
  grid.style.gridTemplateRows = `repeat(${MAP_H}, 24px)`;
  grid.innerHTML = '';
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${x}-${y}`;
      if (!game.explored[y][x]) {
        cell.className += ' unexplored';
        cell.textContent = ' ';
      } else if (game.map[y][x] === '#') {
        cell.className += ' wall';
        cell.textContent = '#';
      } else {
        cell.className += ' floor';
        // 检查玩家
        if (game.player.x === x && game.player.y === y) {
          cell.className += ' player';
          cell.textContent = '@';
        }
        // 楼梯
        else if (game.stairPos && game.stairPos.x === x && game.stairPos.y === y) {
          cell.className += ' stairs';
          cell.textContent = '>';
        }
        // 祭坛
        else if (game.shrines.some(s => s.x === x && s.y === y)) {
          cell.className += ' shrine';
          cell.textContent = '✝';
        }
        // 陷阱
        else if (game.traps.some(t => t.x === x && t.y === y)) {
          cell.className += ' trap';
          cell.textContent = '!';
        }
        // 宝箱怪
        else if (game.chestMimics.some(m => m.x === x && m.y === y)) {
          cell.className += ' chest_mimic';
          cell.textContent = '$';
        }
        // 物品
        else if (game.items.some(it => it.x === x && it.y === y)) {
          cell.className += ' item';
          cell.textContent = '$';
        }
        // 敌人
        else if (game.enemies.some(e => e.x === x && e.y === y)) {
          cell.className += ' enemy';
          cell.textContent = 'E';
        } else {
          cell.textContent = '.';
        }
      }
      grid.appendChild(cell);
    }
  }
  renderStatus();
  renderSkills();
  renderMiniMap();
}

function renderStatus() {
  document.getElementById('floor-num').textContent = `${game.floor}/${TOTAL_FLOORS}`;
  document.getElementById('hp-display').textContent = `${game.player.hp}/${game.player.maxHp}`;
  document.getElementById('atk-display').textContent = game.player.atk;
  document.getElementById('def-display').textContent = game.player.def;
  document.getElementById('exp-display').textContent = game.player.exp;
}

function renderSkills() {
  document.getElementById('cd-fire').textContent = game.skills.fire.cooldown > 0 ? game.skills.fire.cooldown : '✓';
  document.getElementById('cd-heal').textContent = game.skills.heal.cooldown > 0 ? game.skills.heal.cooldown : '✓';
  document.getElementById('cd-shield').textContent = game.skills.shield.cooldown > 0 ? game.skills.shield.cooldown : '✓';
  document.querySelectorAll('.skill-slot').forEach(el => {
    let sk = el.dataset.skill;
    el.classList.toggle('selected', sk === game.selectedSkill);
    el.classList.toggle('on-cooldown', game.skills[sk].cooldown > 0);
  });
}

function renderMiniMap() {
  const canvas = document.getElementById('mini-map');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cw = canvas.width, ch = canvas.height;
  const cellW = cw / MAP_W, cellH = ch / MAP_H;
  ctx.clearRect(0, 0, cw, ch);
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (!game.explored[y][x]) {
        ctx.fillStyle = '#080812';
        ctx.fillRect(x * cellW, y * cellH, cellW, cellH);
      } else {
        if (game.map[y][x] === '#') {
          ctx.fillStyle = '#1a1a2e';
        } else {
          ctx.fillStyle = '#2a2a4a';
        }
        ctx.fillRect(x * cellW, y * cellH, cellW, cellH);
      }
    }
  }
  // 绘制玩家位置
  ctx.fillStyle = '#4af';
  ctx.fillRect(game.player.x * cellW + 1, game.player.y * cellH + 1, cellW - 2, cellH - 2);
  // 绘制楼梯
  if (game.stairPos && game.explored[game.stairPos.y] && game.explored[game.stairPos.y][game.stairPos.x]) {
    ctx.fillStyle = '#fa0';
    ctx.fillRect(game.stairPos.x * cellW + 2, game.stairPos.y * cellH + 2, cellW - 4, cellH - 4);
  }
}

// ========== 战斗动画 ==========
function flashCell(x, y) {
  const cell = document.getElementById(`cell-${x}-${y}`);
  if (!cell) return;
  cell.classList.add('flash_white');
  setTimeout(() => cell.classList.remove('flash_white'), 150);
}

function spawnDamageFloat(x, y, dmg, color = '#f44') {
  const grid = document.getElementById('dungeon-grid');
  const cell = document.getElementById(`cell-${x}-${y}`);
  if (!cell || !grid) return;
  const rect = cell.getBoundingClientRect();
  const gridRect = grid.getBoundingClientRect();
  const float = document.createElement('span');
  float.className = 'damage-float';
  float.textContent = dmg;
  float.style.color = color;
  float.style.left = (rect.left - gridRect.left + rect.width / 2) + 'px';
  float.style.top = (rect.top - gridRect.top) + 'px';
  grid.appendChild(float);
  float.addEventListener('animationend', () => float.remove());
}

// ========== 冷却更新 ==========
function reduceCooldowns() {
  for (let k in game.skills) {
    if (game.skills[k].cooldown > 0) game.skills[k].cooldown--;
  }
  if (game.skills.shield.active > 0) game.skills.shield.active--;
}

// ========== 主动技能 ==========
function useSkill(skillName) {
  if (game.gameOver || game.victory) return;
  const sk = game.skills[skillName];
  if (sk.cooldown > 0) { addMsg('技能冷却中...', 'msg-warn'); return; }
  if (skillName === 'fire') {
    // 火焰冲击：AOE 周围3x3
    let count = 0;
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        let tx = game.player.x + dx, ty = game.player.y + dy;
        let enemy = game.enemies.find(e => e.x === tx && e.y === ty);
        if (enemy) {
          let dmg = Math.max(1, game.player.atk + 2 - enemy.def);
          enemy.hp -= dmg;
          flashCell(tx, ty);
          spawnDamageFloat(tx, ty, `-${dmg}`, '#f84');
          count++;
        }
      }
    }
    addMsg(`🔥 火焰冲击命中 ${count} 个敌人！`, 'msg-damage');
    sk.cooldown = sk.maxCd;
  } else if (skillName === 'heal') {
    let heal = rng(6, 12);
    let oldHp = game.player.hp;
    game.player.hp = Math.min(game.player.maxHp, game.player.hp + heal);
    let actual = game.player.hp - oldHp;
    addMsg(`💚 治疗了 ${actual} 点生命！`, 'msg-heal');
    spawnDamageFloat(game.player.x, game.player.y, `+${actual}`, '#8f8');
    sk.cooldown = sk.maxCd;
  } else if (skillName === 'shield') {
    sk.active = 2;
    addMsg('🛡️ 护盾激活，2回合内减少伤害！', 'msg-info');
    sk.cooldown = sk.maxCd;
  }
  renderSkills();
  // 清理死亡敌人
  game.enemies = game.enemies.filter(e => {
    if (e.hp <= 0) {
      addMsg(`${e.name} 被击败！获得 ${e.exp} EXP`, 'msg-loot');
      game.player.exp += e.exp;
      return false;
    }
    return true;
  });
  renderDungeon();
}

// ========== 玩家移动与回合 ==========
function handlePlayerMove(dx, dy) {
  if (game.gameOver || game.victory) return;
  let nx = game.player.x + dx, ny = game.player.y + dy;
  if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) return;
  if (game.map[ny][nx] === '#') return;
  
  // 标记探索
  game.explored[ny][nx] = true;
  // 揭示周围一格
  for (let dy2 = -1; dy2 <= 1; dy2++) {
    for (let dx2 = -1; dx2 <= 1; dx2++) {
      let ex = nx + dx2, ey = ny + dy2;
      if (ex >= 0 && ex < MAP_W && ey >= 0 && ey < MAP_H) {
        game.explored[ey][ex] = true;
      }
    }
  }
  
  // 检查宝箱怪
  let mimic = game.chestMimics.find(m => m.x === nx && m.y === ny);
  if (mimic) {
    addMsg('宝箱突然变成怪物！宝箱怪袭击！', 'msg-warn');
    game.chestMimics = game.chestMimics.filter(m => m.x !== nx || m.y !== ny);
    game.enemies.push({ x: nx, y: ny, name: '宝箱怪', hp: mimic.hp, maxHp: mimic.hp, atk: mimic.atk, def: mimic.def, exp: mimic.exp });
    combat(nx, ny);
    endTurn();
    return;
  }
  
  // 检查陷阱
  let trap = game.traps.find(t => t.x === nx && t.y === ny);
  if (trap) {
    let dmg = rng(3, 7);
    if (game.skills.shield.active > 0) dmg = Math.max(1, dmg - 2);
    game.player.hp -= dmg;
    addMsg(`💥 踩到陷阱！受到 ${dmg} 点伤害`, 'msg-damage');
    spawnDamageFloat(nx, ny, `-${dmg}`, '#f0f');
    flashCell(nx, ny);
    game.traps = game.traps.filter(t => t.x !== nx || t.y !== ny);
    if (game.player.hp <= 0) { playerDeath(); return; }
  }
  
  // 检查祭坛
  let shrine = game.shrines.find(s => s.x === nx && s.y === ny);
  if (shrine && !shrine.used) {
    shrine.used = true;
    let blessing = rng(0, 2);
    if (blessing === 0) { game.player.atk += 1 + Math.floor(game.floor / 2); addMsg('✨ 祝福祭坛：攻击力提升！', 'msg-heal'); }
    else if (blessing === 1) { game.player.def += 1; addMsg('✨ 祝福祭坛：防御力提升！', 'msg-heal'); }
    else { game.player.maxHp += 4; game.player.hp = Math.min(game.player.maxHp, game.player.hp + 4); addMsg('✨ 祝福祭坛：最大生命提升！', 'msg-heal'); }
  }
  
  // 检查物品
  let itemIdx = game.items.findIndex(it => it.x === nx && it.y === ny);
  if (itemIdx >= 0) {
    let item = game.items[itemIdx];
    game.items.splice(itemIdx, 1);
    if (item.effect === 'heal') { game.player.hp = Math.min(game.player.maxHp, game.player.hp + 8); addMsg(`使用 ${item.name}，恢复8HP`, 'msg-heal'); }
    else if (item.effect === 'atk') { game.player.atk += 1; addMsg(`使用 ${item.name}，ATK+1`, 'msg-loot'); }
    else if (item.effect === 'def') { game.player.def += 1; addMsg(`使用 ${item.name}，DEF+1`, 'msg-loot'); }
    else if (item.effect === 'exp') { game.player.exp += 5; addMsg(`使用 ${item.name}，EXP+5`, 'msg-loot'); }
  }
  
  // 移动玩家
  game.player.x = nx;
  game.player.y = ny;
  
  // 检查敌人
  let enemy = game.enemies.find(e => e.x === nx && e.y === ny);
  if (enemy) {
    combat(nx, ny);
  }
  
  // 楼梯
  if (game.stairPos && nx === game.stairPos.x && ny === game.stairPos.y) {
    if (game.floor < TOTAL_FLOORS) {
      autoSave();
      game.floor++;
      addMsg(`⬆ 进入第 ${game.floor} 层`, 'msg-info');
      generateFloor();
      renderDungeon();
      renderMsgLog();
      return;
    } else {
      game.victory = true;
      addMsg('🏆 恭喜！你征服了五层地下塔！', 'msg-heal');
      renderDungeon();
      return;
    }
  }
  
  endTurn();
}

function combat(tx, ty) {
  let enemy = game.enemies.find(e => e.x === tx && e.y === ty);
  if (!enemy) return;
  // 玩家攻击
  let dmg = Math.max(1, game.player.atk - enemy.def);
  enemy.hp -= dmg;
  flashCell(tx, ty);
  spawnDamageFloat(tx, ty, `-${dmg}`, '#f44');
  addMsg(`你攻击${enemy.name}，造成 ${dmg} 伤害`, 'msg-damage');
  if (enemy.hp <= 0) {
    addMsg(`${enemy.name} 被击败！获得 ${enemy.exp} EXP`, 'msg-loot');
    game.player.exp += enemy.exp;
    game.enemies = game.enemies.filter(e => e !== enemy);
    return;
  }
  // 敌人反击
  let edmg = Math.max(1, enemy.atk - game.player.def);
  if (game.skills.shield.active > 0) edmg = Math.max(1, edmg - 2);
  game.player.hp -= edmg;
  flashCell(game.player.x, game.player.y);
  spawnDamageFloat(game.player.x, game.player.y, `-${edmg}`, '#f44');
  addMsg(`${enemy.name} 反击，对你造成 ${edmg} 伤害`, 'msg-damage');
  if (game.player.hp <= 0) { playerDeath(); }
}

function endTurn() {
  reduceCooldowns();
  game.turn++;
  renderDungeon();
}

function playerDeath() {
  game.gameOver = true;
  addMsg('💀 你死了...', 'msg-damage');
  renderDungeon();
  document.getElementById('dungeon-grid').style.opacity = '0.4';
}

// ========== 存档系统 ==========
function saveGame() {
  try {
    const data = {
      floor: game.floor,
      player: { ...game.player },
      map: game.map,
      explored: game.explored,
      enemies: game.enemies.map(e => ({ ...e })),
      items: game.items.map(i => ({ ...i })),
      traps: game.traps.map(t => ({ ...t })),
      shrines: game.shrines.map(s => ({ ...s })),
      chestMimics: game.chestMimics.map(c => ({ ...c })),
      skills: {
        fire: { ...game.skills.fire },
        heal: { ...game.skills.heal },
        shield: { ...game.skills.shield }
      },
      selectedSkill: game.selectedSkill,
      stairPos: game.stairPos ? { ...game.stairPos } : null,
      turn: game.turn,
      timestamp: new Date().toISOString()
    };
    localStorage.setItem('roguelike_tower_v2_save', JSON.stringify(data));
    addMsg('💾 游戏已存档', 'msg-info');
  } catch (e) {
    addMsg('存档失败: ' + e.message, 'msg-warn');
  }
}

function autoSave() {
  try {
    const data = {
      floor: game.floor,
      player: { ...game.player },
      map: game.map,
      explored: game.explored,
      enemies: game.enemies.map(e => ({ ...e })),
      items: game.items.map(i => ({ ...i })),
      traps: game.traps.map(t => ({ ...t })),
      shrines: game.shrines.map(s => ({ ...s })),
      chestMimics: game.chestMimics.map(c => ({ ...c })),
      skills: {
        fire: { ...game.skills.fire },
        heal: { ...game.skills.heal },
        shield: { ...game.skills.shield }
      },
      selectedSkill: game.selectedSkill,
      stairPos: game.stairPos ? { ...game.stairPos } : null,
      turn: game.turn,
      timestamp: new Date().toISOString()
    };
    localStorage.setItem('roguelike_tower_v2_save', JSON.stringify(data));
  } catch (e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem('roguelike_tower_v2_save');
    if (!raw) { addMsg('没有找到存档', 'msg-warn'); return; }
    const data = JSON.parse(raw);
    game.floor = data.floor;
    game.player = data.player;
    game.map = data.map;
    game.explored = data.explored;
    game.enemies = data.enemies;
    game.items = data.items;
    game.traps = data.traps || [];
    game.shrines = data.shrines || [];
    game.chestMimics = data.chestMimics || [];
    game.skills = data.skills;
    game.selectedSkill = data.selectedSkill || 'fire';
    game.stairPos = data.stairPos;
    game.turn = data.turn || 0;
    game.gameOver = false;
    game.victory = false;
    addMsg(`📂 已读取存档 (${new Date(data.timestamp).toLocaleString()})`, 'msg-info');
    document.getElementById('dungeon-grid').style.opacity = '1';
    renderDungeon();
    renderMsgLog();
  } catch (e) {
    addMsg('读档失败: ' + e.message, 'msg-warn');
  }
}

// ========== 重开 ==========
function restartGame() {
  game.floor = 1;
  game.player = { x: 1, y: 1, hp: 30, maxHp: 30, atk: 8, def: 2, exp: 0 };
  game.enemies = [];
  game.items = [];
  game.traps = [];
  game.shrines = [];
  game.chestMimics = [];
  game.msgLog = [];
  game.turn = 0;
  game.gameOver = false;
  game.victory = false;
  game.skills = {
    fire: { cooldown: 0, maxCd: 6 },
    heal: { cooldown: 0, maxCd: 8 },
    shield: { cooldown: 0, maxCd: 10, active: 0 }
  };
  game.selectedSkill = 'fire';
  generateFloor();
  document.getElementById('dungeon-grid').style.opacity = '1';
  addMsg('🔄 游戏已重置', 'msg-info');
  renderDungeon();
  renderMsgLog();
  renderSkills();
}

// ========== 初始化 ==========
function initGame() {
  generateFloor();
  renderDungeon();
  renderMsgLog();
  addMsg('欢迎来到五层地下塔！方向键移动，空格放技能，1/2/3切换技能', 'msg-info');
}

// ========== 事件绑定 ==========
document.addEventListener('keydown', (e) => {
  if (game.gameOver || game.victory) {
    if (e.key === 'r' || e.key === 'R') { restartGame(); }
    return;
  }
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); handlePlayerMove(0, -1); break;
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); handlePlayerMove(0, 1); break;
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); handlePlayerMove(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); handlePlayerMove(1, 0); break;
    case ' ': e.preventDefault(); useSkill(game.selectedSkill); break;
    case '1': e.preventDefault(); game.selectedSkill = 'fire'; renderSkills(); break;
    case '2': e.preventDefault(); game.selectedSkill = 'heal'; renderSkills(); break;
    case '3': e.preventDefault(); game.selectedSkill = 'shield'; renderSkills(); break;
  }
});

document.querySelectorAll('.skill-slot').forEach(el => {
  el.addEventListener('click', () => {
    game.selectedSkill = el.dataset.skill;
    renderSkills();
  });
});

// 启动
initGame();
</script>
