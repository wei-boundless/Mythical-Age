<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五层地下塔 · 肉鸽地牢</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0a0f;color:#c8c8d0;font-family:'Segoe UI','Noto Sans SC',system-ui,sans-serif;
  display:flex;justify-content:center;align-items:center;min-height:100vh;
  overflow:hidden;
}
#game-shell{
  display:flex;gap:14px;padding:16px;background:#111118;border:2px solid #2a2a3a;
  border-radius:12px;box-shadow:0 0 40px rgba(100,80,200,0.25);
  align-items:stretch;
}
#canvas-wrap{
  border:2px solid #3a3050;border-radius:6px;
  background:#0d0d14;overflow:hidden;
  line-height:0;
}
canvas{display:block;image-rendering:pixelated}
#side-panel{
  width:220px;display:flex;flex-direction:column;gap:10px;
  font-size:14px;user-select:none;
}
.panel-box{
  background:#181820;border:1px solid #2e2e40;border-radius:8px;
  padding:12px;
}
.panel-box h2{
  font-size:13px;text-transform:uppercase;letter-spacing:2px;
  color:#9080c0;margin-bottom:8px;border-bottom:1px solid #2e2e40;padding-bottom:4px;
}
.stat-row{display:flex;justify-content:space-between;padding:3px 0}
.stat-row .val{color:#e0d8ff;font-weight:bold}
.hp-bar-wrap{background:#2a1a1a;border-radius:4px;height:8px;margin:4px 0;overflow:hidden}
.hp-bar-fill{background:#c04040;height:100%;transition:width 0.2s}
#msg-log{
  flex:1;overflow-y:auto;font-size:12px;line-height:1.5;
  max-height:180px;color:#b0a8c0;
}
#msg-log .msg-combat{color:#e08080}
#msg-log .msg-pickup{color:#80d080}
#msg-log .msg-level{color:#ffd080}
#msg-log .msg-death{color:#ff4444}
.btn-row{display:flex;gap:8px}
button{
  flex:1;padding:8px 0;border:none;border-radius:6px;
  font-size:13px;font-weight:bold;cursor:pointer;letter-spacing:1px;
  transition:0.15s;
}
button:hover{filter:brightness(1.2)}
button:active{transform:scale(0.97)}
#btn-restart{background:#6030a0;color:#e0d0ff}
#btn-restart:hover{background:#7040b8}
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;justify-content:center;align-items:center;
  background:rgba(0,0,0,0.75);z-index:10;
}
.overlay-box{
  background:#1a1a28;border:2px solid #5a4a80;border-radius:16px;
  padding:32px 40px;text-align:center;max-width:420px;
}
.overlay-box h1{font-size:28px;margin-bottom:12px}
.overlay-box p{color:#b0a8c0;margin:6px 0;font-size:15px}
.overlay-box button{
  margin-top:18px;padding:10px 32px;font-size:16px;
  background:#c04040;color:#fff;border:none;border-radius:8px;cursor:pointer;
}
.overlay-box button:hover{background:#d05050}
.victory h1{color:#ffd700}
.victory button{background:#4a9040!important}
.victory button:hover{background:#5ab050!important}
.floor-indicator{
  text-align:center;font-size:20px;font-weight:bold;
  color:#c0a0ff;padding:4px 0;letter-spacing:2px;
}
</style>
</head>
<body>

<div id="game-shell">
  <div id="canvas-wrap"><canvas id="game-canvas"></canvas></div>
  <div id="side-panel">
    <div class="floor-indicator" id="floor-label">⚒️ 地下 1 层</div>
    <div class="panel-box">
      <h2>🧝 勇者</h2>
      <div class="stat-row"><span>❤️ 生命</span><span class="val" id="s-hp">30/30</span></div>
      <div class="hp-bar-wrap"><div class="hp-bar-fill" id="hp-bar" style="width:100%"></div></div>
      <div class="stat-row"><span>⚔️ 攻击</span><span class="val" id="s-atk">8</span></div>
      <div class="stat-row"><span>🛡️ 防御</span><span class="val" id="s-def">3</span></div>
      <div class="stat-row"><span>💰 金币</span><span class="val" id="s-gold">0</span></div>
      <div class="stat-row"><span>👣 步数</span><span class="val" id="s-steps">0</span></div>
    </div>
    <div class="panel-box" id="msg-log">
      <div class="msg-level">⚒️ 欢迎来到地下塔！</div>
      <div>使用方向键移动，探索五层地牢。</div>
      <div>到达第5层出口即可胜利！</div>
    </div>
    <div class="btn-row">
      <button id="btn-restart" title="重新开始">🔄 新游戏</button>
    </div>
    <div style="font-size:11px;color:#5a5060;text-align:center">
      移动: ↑↓←→ · 战斗: 碰撞攻击
    </div>
  </div>
</div>

<div id="overlay" class="overlay" style="display:none"></div>

<script>
// ============ 五层地下塔肉鸽游戏 ============

const MAP_W = 55;
const MAP_H = 35;
const TILE = 16;
const MAX_FLOOR = 5;

const TILE_FLOOR = 0;
const TILE_WALL = 1;
const TILE_STAIRS = 2;

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
canvas.width = MAP_W * TILE;
canvas.height = MAP_H * TILE;

// ----- 游戏状态 -----
let game = null;

function createGame() {
  return {
    floor: 1,
    player: { x: 1, y: 1, hp: 30, maxHp: 30, atk: 8, def: 3, gold: 0, steps: 0 },
    map: [],
    enemies: [],
    items: [],
    messages: [],
    gameOver: false,
    victory: false,
    rooms: []
  };
}

// ----- 消息系统 -----
function addMsg(text, cls) {
  if (!game) return;
  game.messages.push({ text, cls: cls || '' });
  if (game.messages.length > 50) game.messages.shift();
  const log = document.getElementById('msg-log');
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = text;
  log.appendChild(div);
  while (log.children.length > 40) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

// ----- 地牢生成 -----
function generateDungeon(g) {
  // 初始化全墙
  g.map = [];
  for (let y = 0; y < MAP_H; y++) {
    g.map[y] = new Uint8Array(MAP_W).fill(TILE_WALL);
  }

  // 随机房间
  const roomCount = 7 + Math.floor(Math.random() * 5); // 7-11 rooms
  g.rooms = [];
  const attempts = 200;
  for (let i = 0; i < attempts && g.rooms.length < roomCount; i++) {
    const rw = 4 + Math.floor(Math.random() * 7); // 4-10
    const rh = 3 + Math.floor(Math.random() * 6); // 3-8
    const rx = 2 + Math.floor(Math.random() * (MAP_W - rw - 3));
    const ry = 2 + Math.floor(Math.random() * (MAP_H - rh - 3));

    let overlap = false;
    for (const rm of g.rooms) {
      if (rx < rm.x + rm.w + 1 && rx + rw + 1 > rm.x &&
          ry < rm.y + rm.h + 1 && ry + rh + 1 > rm.y) {
        overlap = true;
        break;
      }
    }
    if (!overlap) {
      const room = { x: rx, y: ry, w: rw, h: rh, cx: Math.floor(rx + rw / 2), cy: Math.floor(ry + rh / 2) };
      g.rooms.push(room);
      // 挖空房间
      for (let y = ry; y < ry + rh; y++)
        for (let x = rx; x < rx + rw; x++)
          g.map[y][x] = TILE_FLOOR;
    }
  }

  // 连接房间（最近邻走廊）
  const connected = new Set([0]);
  while (connected.size < g.rooms.length) {
    let bestDist = Infinity;
    let bestA = -1, bestB = -1;
    for (const a of connected) {
      for (let b = 0; b < g.rooms.length; b++) {
        if (connected.has(b)) continue;
        const ra = g.rooms[a], rb = g.rooms[b];
        const dx = ra.cx - rb.cx, dy = ra.cy - rb.cy;
        const dist = dx * dx + dy * dy;
        if (dist < bestDist) { bestDist = dist; bestA = a; bestB = b; }
      }
    }
    if (bestB >= 0) {
      connected.add(bestB);
      carveCorridor(g, g.rooms[bestA].cx, g.rooms[bestA].cy, g.rooms[bestB].cx, g.rooms[bestB].cy);
    }
  }

  // 放置楼梯（最后一个房间）
  const stairRoom = g.rooms[g.rooms.length - 1];
  g.stairX = stairRoom.cx;
  g.stairY = stairRoom.cy;
  g.map[g.stairY][g.stairX] = TILE_STAIRS;

  // 放置玩家（第一个房间）
  const startRoom = g.rooms[0];
  g.player.x = startRoom.cx;
  g.player.y = startRoom.cy;

  // 生成敌人
  g.enemies = [];
  for (let i = 1; i < g.rooms.length; i++) {
    const rm = g.rooms[i];
    const enemyCount = 1 + Math.floor(Math.random() * 3);
    for (let e = 0; e < enemyCount; e++) {
      const ex = rm.x + 1 + Math.floor(Math.random() * (rm.w - 2));
      const ey = rm.y + 1 + Math.floor(Math.random() * (rm.h - 2));
      if (g.map[ey][ex] === TILE_FLOOR && !(ex === g.player.x && ey === g.player.y) && !(ex === g.stairX && ey === g.stairY)) {
        const tier = g.floor;
        const types = [
          { name: '🐀 巨鼠', emoji: '🐀', hp: 6 + tier * 3, atk: 3 + tier, def: 1, gold: 3 + tier * 2 },
          { name: '🦇 蝙蝠', emoji: '🦇', hp: 4 + tier * 2, atk: 4 + tier, def: 0, gold: 2 + tier * 2 },
          { name: '👾 史莱姆', emoji: '👾', hp: 8 + tier * 4, atk: 2 + tier, def: 2 + tier, gold: 5 + tier * 2 },
          { name: '💀 骷髅', emoji: '💀', hp: 10 + tier * 4, atk: 5 + tier, def: 2 + tier, gold: 8 + tier * 3 },
          { name: '👹 恶魔', emoji: '👹', hp: 14 + tier * 5, atk: 7 + tier, def: 3 + tier, gold: 12 + tier * 3 },
        ];
        const idx = Math.min(Math.floor(Math.random() * (tier + 2)), types.length - 2);
        const t = types[Math.floor(Math.random() <= 0.3 ? types.length - 1 : idx)];
        g.enemies.push({ x: ex, y: ey, ...t, maxHp: t.hp });
      }
    }
  }

  // 生成物品
  g.items = [];
  for (const rm of g.rooms) {
    const itemCount = 1 + Math.floor(Math.random() * 3);
    for (let i = 0; i < itemCount; i++) {
      const ix = rm.x + 1 + Math.floor(Math.random() * (rm.w - 2));
      const iy = rm.y + 1 + Math.floor(Math.random() * (rm.h - 2));
      if (g.map[iy][ix] === TILE_FLOOR && !(ix === g.player.x && iy === g.player.y) && !(ix === g.stairX && iy === g.stairY)) {
        const roll = Math.random();
        let item;
        if (roll < 0.30) item = { type: 'potion', emoji: '❤️', name: '生命药水', effect: 'heal', value: 8 + g.floor * 3 };
        else if (roll < 0.50) item = { type: 'atk_up', emoji: '⚔️', name: '攻击卷轴', effect: 'atk', value: 1 + Math.floor(g.floor / 2) };
        else if (roll < 0.65) item = { type: 'def_up', emoji: '🛡️', name: '防御卷轴', effect: 'def', value: 1 + Math.floor(g.floor / 2) };
        else if (roll < 0.80) item = { type: 'big_potion', emoji: '💖', name: '大生命药水', effect: 'heal', value: 16 + g.floor * 5 };
        else item = { type: 'gold', emoji: '💰', name: '金币堆', effect: 'gold', value: 8 + Math.floor(Math.random() * 15) + g.floor * 3 };
        g.items.push({ x: ix, y: iy, ...item });
      }
    }
  }
}

function carveCorridor(g, x1, y1, x2, y2) {
  // L形走廊
  if (Math.random() < 0.5) {
    carveH(g, x1, x2, y1);
    carveV(g, y1, y2, x2);
  } else {
    carveV(g, y1, y2, x1);
    carveH(g, x1, x2, y2);
  }
}

function carveH(g, x1, x2, y) {
  for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
    if (x >= 0 && x < MAP_W && y >= 0 && y < MAP_H) g.map[y][x] = TILE_FLOOR;
  }
}

function carveV(g, y1, y2, x) {
  for (let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {
    if (x >= 0 && x < MAP_W && y >= 0 && y < MAP_H) g.map[y][x] = TILE_FLOOR;
  }
}

// ----- 渲染 -----
function render(g) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 绘制地图
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const tile = g.map[y][x];
      if (tile === TILE_WALL) {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
        ctx.fillStyle = '#252540';
        ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
      } else {
        ctx.fillStyle = '#181820';
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
        if ((x + y) % 2 === 0) {
          ctx.fillStyle = '#1a1a24';
          ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
        }
      }
    }
  }

  // 绘制楼梯
  const stairsEmoji = g.floor >= MAX_FLOOR ? '🏆' : '🕳️';
  drawEmoji(g.stairX, g.stairY, stairsEmoji, '#ffd700');

  // 绘制物品
  for (const item of g.items) {
    drawEmoji(item.x, item.y, item.emoji, '#80ff80');
  }

  // 绘制敌人
  for (const enemy of g.enemies) {
    drawEmoji(enemy.x, enemy.y, enemy.emoji, '#ff6666');
    // 血条
    const hpRatio = enemy.hp / enemy.maxHp;
    const barW = TILE - 4;
    ctx.fillStyle = '#300000';
    ctx.fillRect(enemy.x * TILE + 2, enemy.y * TILE - 2, barW, 2);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(enemy.x * TILE + 2, enemy.y * TILE - 2, barW * hpRatio, 2);
  }

  // 绘制玩家
  drawEmoji(g.player.x, g.player.y, '🧝', '#ffffff');

  // 更新UI
  document.getElementById('floor-label').textContent =
    g.floor >= MAX_FLOOR ? '👑 最终层 · 出口' : `⚒️ 地下 ${g.floor} 层`;
  document.getElementById('s-hp').textContent = `${g.player.hp}/${g.player.maxHp}`;
  document.getElementById('hp-bar').style.width = `${(g.player.hp / g.player.maxHp) * 100}%`;
  document.getElementById('s-atk').textContent = g.player.atk;
  document.getElementById('s-def').textContent = g.player.def;
  document.getElementById('s-gold').textContent = g.player.gold;
  document.getElementById('s-steps').textContent = g.player.steps;

  // HP条颜色
  const hpBar = document.getElementById('hp-bar');
  const hpPct = g.player.hp / g.player.maxHp;
  if (hpPct < 0.3) hpBar.style.background = '#e03030';
  else if (hpPct < 0.6) hpBar.style.background = '#e0a030';
  else hpBar.style.background = '#40a040';
}

function drawEmoji(x, y, emoji, glowColor) {
  ctx.save();
  ctx.font = `${TILE - 1}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (glowColor) {
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 3;
  }
  ctx.fillText(emoji, x * TILE + TILE / 2, y * TILE + TILE / 2 + 1);
  ctx.restore();
}

// ----- 玩家移动 -----
function movePlayer(g, dx, dy) {
  if (g.gameOver || g.victory) return;

  const nx = g.player.x + dx;
  const ny = g.player.y + dy;

  if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) return;
  if (g.map[ny][nx] === TILE_WALL) return;

  // 检查敌人
  const enemyIdx = g.enemies.findIndex(e => e.x === nx && e.y === ny);
  if (enemyIdx >= 0) {
    combat(g, enemyIdx);
    g.player.steps++;
    updateUI(g);
    render(g);
    return;
  }

  // 移动
  g.player.x = nx;
  g.player.y = ny;
  g.player.steps++;

  // 检查物品
  const itemIdx = g.items.findIndex(it => it.x === nx && it.y === ny);
  if (itemIdx >= 0) {
    pickupItem(g, itemIdx);
  }

  // 检查楼梯
  if (nx === g.stairX && ny === g.stairY) {
    if (g.floor >= MAX_FLOOR) {
      g.victory = true;
      addMsg('🎉 你找到了出口！你胜利了！', 'msg-level');
      showOverlay('victory', '🏆 你胜利了！',
        `成功突破五层地下塔！<br>金币: ${g.player.gold} · 步数: ${g.player.steps}`);
    } else {
      descendFloor(g);
    }
  }

  updateUI(g);
  render(g);
}

function combat(g, enemyIdx) {
  const enemy = g.enemies[enemyIdx];
  const dmgToEnemy = Math.max(1, g.player.atk - enemy.def);
  enemy.hp -= dmgToEnemy;
  addMsg(`⚔️ 你攻击 ${enemy.name}，造成 ${dmgToEnemy} 点伤害！`, 'msg-combat');

  if (enemy.hp <= 0) {
    addMsg(`💀 ${enemy.name} 被击败！获得 ${enemy.gold} 金币。`, 'msg-combat');
    g.player.gold += enemy.gold;
    g.enemies.splice(enemyIdx, 1);
    return;
  }

  // 敌人反击
  const dmgToPlayer = Math.max(1, enemy.atk - g.player.def);
  g.player.hp -= dmgToPlayer;
  addMsg(`💥 ${enemy.name} 反击，对你造成 ${dmgToPlayer} 点伤害！`, 'msg-combat');

  if (g.player.hp <= 0) {
    g.player.hp = 0;
    g.gameOver = true;
    addMsg('💀 你倒下了……', 'msg-death');
    showOverlay('death', '💀 你倒下了',
      `在第 ${g.floor} 层阵亡<br>金币: ${g.player.gold} · 步数: ${g.player.steps}`);
  }
}

function pickupItem(g, itemIdx) {
  const item = g.items[itemIdx];
  switch (item.effect) {
    case 'heal':
      const healed = Math.min(item.value, g.player.maxHp - g.player.hp);
      g.player.hp += healed;
      addMsg(`💚 拾取 ${item.name}，恢复 ${healed} 生命！`, 'msg-pickup');
      break;
    case 'atk':
      g.player.atk += item.value;
      addMsg(`⚔️ 拾取 ${item.name}，攻击力 +${item.value}！`, 'msg-pickup');
      break;
    case 'def':
      g.player.def += item.value;
      addMsg(`🛡️ 拾取 ${item.name}，防御力 +${item.value}！`, 'msg-pickup');
      break;
    case 'gold':
      g.player.gold += item.value;
      addMsg(`💰 拾取 ${item.name}，获得 ${item.value} 金币！`, 'msg-pickup');
      break;
  }
  g.items.splice(itemIdx, 1);
}

function descendFloor(g) {
  g.floor++;
  addMsg(`🕳️ 你下到了地下 ${g.floor} 层……`, 'msg-level');
  // 恢复一些生命
  const healAmt = Math.floor(g.player.maxHp * 0.2);
  g.player.hp = Math.min(g.player.maxHp, g.player.hp + healAmt);
  if (healAmt > 0) addMsg(`💚 休息恢复 ${healAmt} 生命。`, 'msg-pickup');
  generateDungeon(g);
  updateUI(g);
  render(g);
}

function updateUI(g) {
  // UI已在render中更新，这里做额外更新
  document.getElementById('s-hp').textContent = `${g.player.hp}/${g.player.maxHp}`;
  document.getElementById('hp-bar').style.width = `${Math.max(0,(g.player.hp/g.player.maxHp)*100)}%`;
  document.getElementById('s-atk').textContent = g.player.atk;
  document.getElementById('s-def').textContent = g.player.def;
  document.getElementById('s-gold').textContent = g.player.gold;
  document.getElementById('s-steps').textContent = g.player.steps;
}

// ----- Overlay -----
function showOverlay(kind, title, body) {
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `
    <div class="overlay-box ${kind}">
      <h1>${title}</h1>
      <p>${body}</p>
      <button id="ov-btn">${kind === 'victory' ? '🏆 再来一局' : '🔄 重新开始'}</button>
    </div>
  `;
  document.getElementById('ov-btn').addEventListener('click', restartGame);
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// ----- 重新开始 -----
function restartGame() {
  hideOverlay();
  document.getElementById('msg-log').innerHTML = '';
  game = createGame();
  generateDungeon(game);
  addMsg('⚒️ 欢迎来到地下塔！', 'msg-level');
  addMsg('使用方向键移动，探索五层地牢。');
  addMsg('到达第5层出口即可胜利！');
  updateUI(game);
  render(game);
}

// ----- 事件监听 -----
document.addEventListener('keydown', (e) => {
  if (!game) return;
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { e.preventDefault(); movePlayer(game, 0, -1); }
  else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { e.preventDefault(); movePlayer(game, 0, 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { e.preventDefault(); movePlayer(game, -1, 0); }
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { e.preventDefault(); movePlayer(game, 1, 0); }
});

document.getElementById('btn-restart').addEventListener('click', restartGame);

// 触屏支持：在canvas上滑动
let touchStart = null;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
});
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!touchStart || !game) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  const threshold = 20;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > threshold) movePlayer(game, 1, 0);
    else if (dx < -threshold) movePlayer(game, -1, 0);
  } else {
    if (dy > threshold) movePlayer(game, 0, 1);
    else if (dy < -threshold) movePlayer(game, 0, -1);
  }
  touchStart = null;
});

// 移动端按钮
canvas.addEventListener('click', (e) => {
  if (!game || !touchStart) return;
  // 单击不作为移动
});

// ----- 初始化 -----
game = createGame();
generateDungeon(game);
addMsg('⚒️ 欢迎来到地下塔！', 'msg-level');
addMsg('使用方向键 ↑↓←→ 或 WASD 移动。', '');
addMsg('碰撞敌人即战斗，踩到物品自动拾取。', '');
addMsg('找到 🕳️ 下到更深层，第5层找到 🏆 出口即胜利！', 'msg-level');
updateUI(game);
render(game);
</script>
